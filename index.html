              padding: 6px 0; border-bottom: 1px solid rgba(120,180,255,0.07); }
  .ord-track {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 4px; margin: 10px 0;
  }
  .ord-step { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }
  .ord-step .ord-dot {
    width: 12px; height: 12px; border-radius: 50%;
    border: 1.5px solid rgba(120,180,255,0.3); background: rgba(8,20,42,0.7);
    transition: all 0.3s;
  }
  .ord-step.on .ord-dot { background: #7eebb4; border-color: #7eebb4; box-shadow: 0 0 8px rgba(126,235,180,0.5); }
  .ord-step.now .ord-dot { animation: ord-pulse 1.4s ease-in-out infinite; }
  .ord-step .ord-lbl {
    font-size: 7px; letter-spacing: 0.12em; color: #6a8aaf;
    text-align: center; max-width: 60px;
  }
  .ord-step.on .ord-lbl { color: #7eebb4; }
  .ord-line-h { flex: 1; height: 1px; background: rgba(120,180,255,0.18); margin: 0 4px; margin-bottom: 20px; }
  @keyframes ord-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.5); box-shadow: 0 0 14px rgba(126,235,180,0.8); }
  }

  /* ============================================================
     Fallback / error
     ============================================================ */
  #fatal {
    position: fixed; inset: 0; display: none;
    align-items: center; justify-content: center; flex-direction: column;
    background: #000; z-index: 200; padding: 40px; text-align: center;
  }
  #fatal.visible { display: flex; }
  #fatal h1 { font-size: 14px; letter-spacing: 0.4em; color: #ff6b6b;
              text-transform: uppercase; margin: 0 0 12px; }
  #fatal p  { font-size: 13px; color: #8aa; max-width: 400px; line-height: 1.5; }

  /* ============================================================
     Vendor / Place tile — rich business panel
     ============================================================ */
  .place-hero { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 18px; }
  .place-icon {
    width: 52px; height: 52px; border-radius: 14px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    font-family: "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",serif;
    border: 1.5px solid currentColor; position: relative;
    background: rgba(6,14,28,0.9);
  }
  .place-icon::after {
    content: ''; position: absolute; inset: -5px; border-radius: 19px;
    border: 1px solid currentColor; opacity: 0.22; pointer-events: none;
  }
  .place-head { flex: 1; min-width: 0; }
  .place-name { font-size: 16px; font-weight: 600; color: #e6f1ff; line-height: 1.2;
                margin-bottom: 5px; word-break: break-word; }
  .place-badge {
    display: inline-block; font-size: 8px; letter-spacing: 0.14em;
    text-transform: uppercase; padding: 2px 9px; border-radius: 999px;
    border: 1px solid currentColor; margin-bottom: 7px;
  }
  .place-addr { font-size: 12px; color: #6a8aaf; }

  /* 5-button action strip */
  .place-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 18px; }
  .place-act {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    padding: 10px 2px 8px; border-radius: 12px; cursor: pointer;
    border: 1px solid rgba(120,180,255,0.13);
    background: rgba(120,180,255,0.04);
    transition: background 0.18s, border-color 0.18s;
    -webkit-tap-highlight-color: transparent;
  }
  .place-act:active { background: rgba(120,180,255,0.14); border-color: rgba(120,180,255,0.35); }
  .place-act-icon { font-size: 16px; }
  .place-act-lbl { font-size: 7px; letter-spacing: 0.12em; text-transform: uppercase; color: #6a8aaf; }

  /* Tab bar */
  .place-tabs {
    display: flex; border-bottom: 1px solid rgba(120,180,255,0.1); margin-bottom: 14px;
  }
  .place-tab {
    padding: 7px 14px; font-size: 8px; letter-spacing: 0.16em; text-transform: uppercase;
    color: #6a8aaf; cursor: pointer; border-bottom: 2px solid transparent;
    margin-bottom: -1px; transition: all 0.2s; flex: 1; text-align: center;
  }
  .place-tab.active { color: #7eb4ff; border-bottom-color: #7eb4ff; }
  .place-tab-body { min-height: 60px; }

  /* Info rows inside tab body */
  .pl-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 9px 0; border-bottom: 1px solid rgba(120,180,255,0.07); font-size: 13px;
  }
  .pl-row:last-child { border-bottom: 0; }
  .pl-key { color: #6a8aaf; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }
  .pl-val { color: #a8c8ee; text-align: right; max-width: 68%; word-break: break-word; }

  /* ACI ask button at bottom of place panel */
  .place-aci {
    margin-top: 14px; padding: 13px 16px; border-radius: 14px;
    border: 1px solid rgba(0,212,255,0.28); background: rgba(0,212,255,0.04);
    display: flex; align-items: center; gap: 10px; cursor: pointer;
    transition: background 0.18s; -webkit-tap-highlight-color: transparent;
  }
  .place-aci:active { background: rgba(0,212,255,0.1); }
  .place-aci-g { font-size: 17px; color: #00d4ff; }
  .place-aci-t { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #00d4ff; }
</style>
</head>
<body>

<div id="cesiumContainer"></div>

<!-- APP NAME — always-present anchor (§1b). Tap = diagnostic + hard refresh. -->
<div id="app-name" onclick="appNameReload()" title="AstranoV — The Global Operating System · tap to heal & reload">ASTRANOV<span class="app-tag">GLOBAL OPERATING SYSTEM</span></div>

<!-- Me spotlight — a line from the on-screen Me orb to the user's location. -->
<svg id="me-spotlight"><line id="me-spot-line" x1="0" y1="0" x2="0" y2="0"></line></svg>

<!-- Boot veil (fades out when Cesium ready) -->
<div id="boot">
  <div class="cosmos">
    <div class="ring">
      <span class="seat" style="--i:0"></span><span class="seat" style="--i:1"></span>
      <span class="seat" style="--i:2"></span><span class="seat" style="--i:3"></span>
      <span class="seat" style="--i:4"></span><span class="seat" style="--i:5"></span>
      <span class="seat" style="--i:6"></span><span class="seat" style="--i:7"></span>
      <span class="seat" style="--i:8"></span><span class="seat" style="--i:9"></span>
      <span class="seat" style="--i:10"></span><span class="seat" style="--i:11"></span>
      <span class="seat crown" style="--i:12"></span>
    </div>
    <div class="core"></div>
  </div>
  <div class="name">ASTRANOV</div>
</div>

<!-- Always-visible UI: AICYCLE ring only -->
<div id="aicycle-float" title="Collective Intelligence">
  <canvas class="gfx-canvas" id="gfx-ai" width="64" height="64"></canvas>
  <div class="ring"></div>
  <div class="node"></div>
  <div class="provider" id="aicycle-provider">AI</div>
</div>

<!-- Transient UI -->
<div id="imagery-source"></div>
<div id="tray-trigger"></div>
<div id="tray"></div>

<!-- Four corner agents — tap opens the bottom agent sheet; long-press = primary action -->
<div class="corner-gadget" id="g-discover" title="Discover agent"
     onpointerdown="gadgetPress('discover',event)" onpointerup="gadgetRelease('discover',event)">
  <canvas class="gfx-canvas" id="gfx-discover" width="76" height="76"></canvas>
  <div class="cg-glyph">◈</div>
  <div class="cg-label">Discover</div>
</div>
<div class="corner-gadget" id="g-me" title="Identity agent"
     onpointerdown="gadgetPress('me',event)" onpointerup="gadgetRelease('me',event)">
  <canvas class="gfx-canvas" id="gfx-me" width="76" height="76"></canvas>
  <div class="cg-glyph" id="g-me-glyph">◉</div>
  <div class="cg-label">Me</div>
  <div class="cg-badge" id="g-me-badge"></div>
</div>
<div id="drive-hud"><span class="dh-emoji">🚗</span><span>Driving</span><span class="dh-sp" id="dh-sp">0 km/h</span></div>

<!-- Pilot lifeboat — the always-reachable warp-home gesture at non-global
     tiers. Hidden at global (the orbital Pilot orb takes over). -->
<div id="pilot-mini" title="Pilot — warp to home orbit" onclick="pilotHome()">🌍</div>

<!-- Showcase tile strip — tiny muted-video-feel tiles of feeds/news/offers,
     auto-scoping to GLOBAL / NATIONAL / LOCAL as the camera descends. -->
<div id="tile-strip" aria-label="Showcase feeds"></div>

<!-- City-level CATEGORY orbs — general groupings (Dining, Hotels, Rentals…)
     shown at the PERSONAL tier. Tap one to see the real options + filter. -->
<div id="city-cats" aria-label="Categories"></div>

<!-- Volume slider — mirrors the brightness slider on the right edge.
     Controls Astranov's voice loudness. Visible only at the global tier. -->
<div id="vol-wrap" title="Voice volume">
  <span class="vol-ico">🔊</span>
  <input id="vol-slider" type="range" min="0" max="1" step="0.02" value="1" aria-label="Voice volume">
</div>

<!-- Depth slider removed (§5j v2) — replaced by tap+hold gestures on the
     sky around Earth. See _wireDepthGesture below. -->

<!-- Brightness slider — left edge. Controls map luminosity live. -->
<div id="bright-wrap" title="Map brightness">
  <span class="bright-ico">☀</span>
  <input id="bright-slider" type="range" min="0.5" max="3" step="0.05" value="1.45" aria-label="Map brightness">
</div>

<!-- Universal agent bottom sheet — replaces the radial fan -->
<div id="agent-sheet" aria-hidden="true">
  <div id="agent-handle"></div>
  <div id="agent-header">
    <div id="agent-glyph">◈</div>
    <div id="agent-title-wrap">
      <div id="agent-title">Agent</div>
      <div id="agent-sub">READY</div>
    </div>
    <div id="agent-close" onclick="closeAgentSheet()">✕</div>
  </div>
  <div id="agent-body">
    <div id="agent-actions"></div>
    <div id="agent-chat">
      <div id="agent-chat-log"></div>
    </div>
  </div>
  <form id="agent-input-row" onsubmit="event.preventDefault(); _agentChatSend();">
    <input id="agent-input" placeholder="Ask the agent…" autocomplete="off">
    <button type="submit" id="agent-send">◈</button>
  </form>
</div>
<!-- Locate orb — bottom-left corner gadget -->
<div id="locate-orb" title="Locate"
     onpointerdown="gadgetPress('locate',event)" onpointerup="gadgetRelease('locate',event)">
  <canvas class="gfx-canvas" id="gfx-locate" width="76" height="76"></canvas>
  <span class="locate-g">⊕</span>
  <span class="locate-lbl">Locate</span>
</div>
<div id="panel"></div>
<div id="aicycle-chat">
  <div id="aicycle-drag-handle"><span id="aicycle-title">ASTRANOV COLLECTIVE INTELLIGENCE</span></div>

function _diagPush(kind, detail) {

    if (window._diag.length > 60) window._diag.shift();
  } catch (_) {}
}

});

});

// from any stale or broken build, and the feedback channel that makes
// breakage self-correcting (§1b, ONASIS §0h).
window.appNameReload = async function () {

    errors: window._diag || [],
    url: location.href,
    tier: (typeof currentLevel !== 'undefined') ? currentLevel : '?',
    ua: navigator.userAgent,
    lang: navigator.language,
    screen: (screen.width + 'x' + screen.height),
    sw: !!(navigator.serviceWorker && navigator.serviceWorker.controller),
    signed_in: (typeof session !== 'undefined' && !!session),
    ts: new Date().toISOString(),

    await fetch(SUPABASE_URL + '/functions/v1/diag', {
      method: 'POST', keepalive: true,

      body: JSON.stringify(payload),
    });

  try {
    if (navigator.serviceWorker) {

      await Promise.all(regs.map(r => r.unregister().catch(() => {})));

};

      animation: false,
      baseLayerPicker: false,
      fullscreenButton: false,
      vrButton: false,
      geocoder: false,
      homeButton: false,
      infoBox: false,
      sceneModePicker: false,
      selectionIndicator: false,
      timeline: false,
      navigationHelpButton: false,
      navigationInstructionsInitiallyVisible: false,
      // Render continuously — requestRenderMode:true was leaving a frozen,
      // half-painted frame on boot (the "blurry beige" globe-that-never-draws).
      requestRenderMode: false,
      // No default imagery — the imagery cycle manages this
      baseLayer: false,
      // Allow both 3D and 2D
      scene3DOnly: false,
      // Skybox + atmosphere look
      skyAtmosphere: new Cesium.SkyAtmosphere(),
    });

    // Hide credit overlay (Ion's required attribution still serves via tile metadata)
    if (viewer.cesiumWidget?.creditContainer) {
      viewer.cesiumWidget.creditContainer.style.display = 'none';
    }

    // IMAGERY LAW §3 — real imagery only:
    //   globe-tier: NASA BMNG day + Black Marble night, blended by terminator.
    //   city-tier:  user-selectable real-cartography providers via #layer-switch.
    await bootImageryGlobeTier();
    await setCityImagery(0);   // default OSM, hidden until below GLOBAL

    // Zoom + LOD settings — allow the user to zoom all the way down to
    // street level, and demand high-detail tile loads.
    const cc = viewer.scene.screenSpaceCameraController;
    cc.minimumZoomDistance = 5;            // 5 m above ground
    cc.maximumZoomDistance = 2_000_000_000; // 2 M km — pull back into the stars (cosmic tier)
    cc.enableTilt = true; cc.enableRotate = true;
    viewer.scene.globe.maximumScreenSpaceError = 1.66; // sharper than default
    viewer.scene.globe.preloadSiblings = true;
    viewer.scene.globe.tileCacheSize = 1500;            // keep more tiles in RAM
    viewer.resolutionScale = Math.min(2, window.devicePixelRatio || 1);

    // Glowing blue major-city beacons — click to dive into a city
    buildCityBeacons();

    // Open camera at GLOBAL altitude over Europe (close to astranov.eu)
    // Open on the GLOBE itself — far enough out that Earth sits in black
    // space (Zero-UI §1: the globe and space are always on screen). 12,000 km
    // was too close and filled the frame like a flat map.
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(20, 35, 28_000_000),
      duration: 0,
    });

    // Camera height drives the navigation level
    viewer.camera.moveEnd.addEventListener(onCameraSettled);
    viewer.camera.moveEnd.addEventListener(() => _scheduleTileRefresh());
    onCameraSettled();
    renderTileStrip();

    // Globe auto-spins gently around Earth's polar axis on load. It's a true
    // planetary rotation (UNIT_Z), not a camera-drift. Stops permanently the
    // moment any other camera motion or user gesture begins.
    window._autoSpin = true;
    const stopSpin = () => { window._autoSpin = false; };
    viewer.scene.canvas.addEventListener('pointerdown', stopSpin);
    viewer.scene.canvas.addEventListener('wheel',       stopSpin);
    viewer.scene.canvas.addEventListener('touchstart',  stopSpin);
    viewer.clock.onTick.addEventListener(() => {
      if (!window._autoSpin) return;
      if (currentLevel !== 'global') return;
      if (viewer.scene.mode !== Cesium.SceneMode.SCENE3D) return;
      try { viewer.scene.camera.rotate(Cesium.Cartesian3.UNIT_Z, -0.0008); } catch (_) {}
    });
    // Any programmatic camera motion (flyTo / setView, called by locate, click-
    // to-descend, fly-to-city, etc.) must kill the auto-spin so they don't fight.
    const _origFlyTo = viewer.camera.flyTo.bind(viewer.camera);
    viewer.camera.flyTo = (...args) => { window._autoSpin = false; return _origFlyTo(...args); };
    const _origSetView = viewer.camera.setView.bind(viewer.camera);
    viewer.camera.setView = (...args) => { window._autoSpin = false; return _origSetView(...args); };

    // Pin picking
    const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    handler.setInputAction(onCanvasClick, Cesium.ScreenSpaceEventType.LEFT_CLICK);

    // TWO-FINGER DRAG ZOOM (binding) — Cesium's default touch model uses

    // wants drag-down = zoom in, drag-up = zoom out, and a sudden BIG
    // drag = skip tiers entirely (global ↔ city in one gesture).
    // We disable Cesium's tilt + look on two-finger drag and install
    // our own touch handler on the canvas.
    try {
      const ssc = viewer.scene.screenSpaceCameraController;
      // Drop the two-finger drag tilt — we'll own that gesture.
      ssc.tiltEventTypes = ssc.tiltEventTypes ? [] : [];
      ssc.lookEventTypes = ssc.lookEventTypes ? [] : [];
    } catch (_) {}
    _wireTwoFingerZoom(viewer.scene.canvas);
    _wireDepthGesture(viewer.scene.canvas);

    // Hide boot veil
    setTimeout(() => $('boot').classList.add('gone'), 400);
  } catch (e) {
    fatal(e.message || String(e));
  }
}

// TWO-FINGER DRAG ZOOM
//   • While two fingers are down, track the average Y of their midpoint.
//   • Per-frame Δy (positive = moved down on screen) → camera moves DOWN
//     (zoom in / get closer). Negative Δy → camera moves UP (zoom out).
//   • If TOTAL Δy during the gesture exceeds ~⅓ of the viewport height
//     (i.e. a big swipe), on touchend we skip a tier: global → personal
//     (city), or personal → global, in one flight.
function _wireTwoFingerZoom(canvas) {
  if (!canvas || canvas.__twoFingerWired) return;
  canvas.__twoFingerWired = true;
  let lastMidY = null;
  let startMidY = null;
  let startTime = 0;
  let cumulativeDy = 0;
  let active = false;

  function midY(touches) {
    let s = 0; for (let i = 0; i < touches.length; i++) s += touches[i].clientY;
    return s / touches.length;
  }
  function adjustAltitude(factor) {
    try {
      const c = viewer.camera.positionCartographic;
      const newH = Math.max(80, Math.min(50_000_000, c.height * factor));
      viewer.camera.setView({
        destination: Cesium.Cartesian3.fromRadians(c.longitude, c.latitude, newH),
        orientation: { heading: viewer.camera.heading, pitch: viewer.camera.pitch, roll: 0 },
      });
    } catch (_) {}
  }
  function skipFlight() {
    try {
      const h = viewer.camera.positionCartographic.height;
      const lat = Cesium.Math.toDegrees(viewer.camera.positionCartographic.latitude);
      const lng = Cesium.Math.toDegrees(viewer.camera.positionCartographic.longitude);
      // Started high → dive straight to city. Started low → fly to global.
      // The threshold for "high" is the global LEVEL boundary.
      if (h > LEVEL_THRESHOLDS.global) {
        // Big down-swipe (cumulative dy positive) goes to city; big up-swipe
        // is unusual at this altitude — just go national.
        const target = cumulativeDy > 0 ? 6_000 : 700_000;
        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(lng, lat, target),
          duration: 1.6,
          orientation: { heading: 0, pitch: Cesium.Math.toRadians(target < 10_000 ? -65 : -90), roll: 0 },
        });
      } else if (h < LEVEL_THRESHOLDS.national * 1.2) {
        // From city/personal, a big up-swipe goes straight to global.
        if (cumulativeDy < 0) {
          viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(lng, 20, 28_000_000),
            duration: 1.8,
            orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 },
          });
        }
      }
    } catch (_) {}
  }

  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      active = true;
      lastMidY = midY(e.touches);
      startMidY = lastMidY;
      startTime = performance.now();
      cumulativeDy = 0;
      e.preventDefault();
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    if (!active || e.touches.length !== 2) return;
    const my = midY(e.touches);
    const dy = my - lastMidY;
    lastMidY = my;
    cumulativeDy += dy;
    // Per-frame altitude factor: drag-down (dy > 0) → factor < 1 → zoom in.
    // 1px ≈ 0.4% altitude change feels natural.
    const factor = Math.pow(0.996, dy);
    adjustAltitude(factor);
    e.preventDefault();
  }, { passive: false });

  function end(e) {
    if (!active) return;
    active = false;
    // BIG-DRAG TIER SKIP — if the gesture covered > 1/3 of the viewport in
    // < 600ms, treat it as a decisive global ↔ city jump.
    const dt = performance.now() - startTime;
    const big = Math.abs(cumulativeDy) > (window.innerHeight * 0.33) && dt < 600;
    if (big) skipFlight();
    lastMidY = null; startMidY = null; cumulativeDy = 0;
  }
  canvas.addEventListener('touchend',    end);
  canvas.addEventListener('touchcancel', end);
}

async function bootImageryGlobeTier() {
  if (!viewer) return;
  // Real day/night terminator — mandatory under Imagery Law §3.
  viewer.scene.globe.enableLighting = true;
  viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString('#02060d');

  // POST-PROCESS — bloom is GPU-expensive and was the dominant cost on
  // boot. Disabled by default; the orb plasma shaders already do their
  // own bloom in-shader. Owner can re-enable via window.toggleBloom().
  try {
    const bloom = viewer.scene.postProcessStages.bloom;
    if (bloom) {
      bloom.enabled = false;
    }
    window.toggleBloom = function() {
      const b = viewer.scene.postProcessStages.bloom;
      if (b) { b.enabled = !b.enabled; viewer.scene.requestRender(); return b.enabled; }
    };
    // FXAA on top — cheap antialiasing that smooths the bloom-blown rim.
    if (viewer.scene.postProcessStages.fxaa) viewer.scene.postProcessStages.fxaa.enabled = true;
  } catch (e) { console.warn('[bloom]', e); }

  // GUARANTEED BASE — Cesium's bundled Natural Earth II ships with the CDN
  // build, so the globe ALWAYS renders even if NASA GIBS is slow or blocked.
  try {
    const base = await Cesium.TileMapServiceImageryProvider.fromUrl(
      Cesium.buildModuleUrl('Assets/Textures/NaturalEarthII')
    );
    baseLayer = viewer.imageryLayers.addImageryProvider(base);
  } catch (e) { console.warn('[imagery] Natural Earth base failed', e); }

  // DAY: NASA Blue Marble Next Generation via GIBS WMTS (layered on top).
  try {
    const dayProvider = new Cesium.UrlTemplateImageryProvider({
      url: 'https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/BlueMarble_NextGeneration/default/2004-08-01/GoogleMapsCompatible_Level8/{z}/{y}/{x}.jpeg',
      maximumLevel: 8,
      credit: 'NASA EOSDIS GIBS · Blue Marble Next Generation',
    });
    dayLayer = viewer.imageryLayers.addImageryProvider(dayProvider);
  } catch (e) { console.warn('[imagery] BMNG day failed', e); }

  // NIGHT: NASA Black Marble — layered above day, day-side fully transparent.
  try {
    const nightProvider = new Cesium.UrlTemplateImageryProvider({
      url: 'https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/VIIRS_Black_Marble/default/2016-01-01/GoogleMapsCompatible_Level8/{z}/{y}/{x}.png',
      maximumLevel: 8,
      credit: 'NASA EOSDIS GIBS · VIIRS Black Marble',
    });
    nightLayer = viewer.imageryLayers.addImageryProvider(nightProvider);
    nightLayer.dayAlpha = 0.0;
    nightLayer.nightAlpha = 1.0;
  } catch (e) { console.warn('[imagery] Black Marble night failed', e); }

  if (viewer) viewer.scene.requestRender();
}

// Live map brightness — controls the city layer if present, else the globe day layer.
window._brightness = 1.45;
function applyBrightness(v) {
  window._brightness = v;
  try {
    if (cityLayer && cityLayer.show) cityLayer.brightness = v;
    else if (dayLayer) dayLayer.brightness = Math.max(0.8, v * 0.85);
    viewer && viewer.scene.requestRender();
  } catch (_) {}
}
(function wireBright() {
  const s = $('bright-slider'); if (!s) return setTimeout(wireBright, 100);
  s.addEventListener('input', e => applyBrightness(parseFloat(e.target.value)));
})();

async function setCityImagery(index) {
  if (!viewer) return;
  if (cityLayer) {
    try { viewer.imageryLayers.remove(cityLayer, true); } catch (_) {}
    cityLayer = null;
  }
  cityProviderIndex = Math.max(0, Math.min(index, CITY_PROVIDERS.length - 1));
  const p = CITY_PROVIDERS[cityProviderIndex];
  try {
    const provider = await p.init();
    cityLayer = viewer.imageryLayers.addImageryProvider(provider);
    // BMNG/Black Marble are hidden at non-global, so the city layer renders
    // CARTO Dark Matter is dark BY DESIGN — at neutral the streets are
    // invisible. We boost brightness + contrast so streets read clearly
    // even though BMNG/Black Marble underneath are now hidden.
    if (p.id === 'carto-dark') {
      cityLayer.brightness = window._brightness ?? 1.55;
      cityLayer.contrast   = 1.20;
      cityLayer.gamma      = 0.85;
      cityLayer.saturation = 1.05;
    } else {
      cityLayer.brightness = window._brightness ?? 1.0;
      cityLayer.contrast   = 1.0;
      cityLayer.gamma      = 1.0;
      cityLayer.saturation = 1.0;
    }
    // City tiles must sit ON TOP of the NASA globe layers.
    try { viewer.imageryLayers.raiseToTop(cityLayer); } catch (_) {}
    cityLayer.show = currentLevel !== 'global';
    renderLayerSwitch();
    updateImagerySourceBadge();
    if (viewer) viewer.scene.requestRender();
  } catch (e) {
    console.warn('[imagery]', p.id, 'failed, advancing', e);
    if (cityProviderIndex < CITY_PROVIDERS.length - 1) {
      return setCityImagery(cityProviderIndex + 1);
    }
    emitTelemetry('imagery.city_providers_exhausted', 'error', {
      failedProvider: p.id,
      error: normalizeTelemetryError(e),
    });
  }
}

function renderLayerSwitch() {
  const el = $('layer-switch');
  if (!el) return;
  const cur = CITY_PROVIDERS[cityProviderIndex] || CITY_PROVIDERS[0];
  el.innerHTML = `
    <div id="layer-pill" onclick="toggleLayerMenu(event)">
      <span class="pill-emoji">${cur.emoji}</span>
      <span class="pill-lbl">${cur.label}</span>
      <span class="pill-arrow">▼</span>
    </div>
    <div id="layer-menu">
      ${CITY_PROVIDERS.map((p, i) => `
        <div class="layer-opt${i === cityProviderIndex ? ' active' : ''}"
             onclick="setCityImagery(${i});closeLayerMenu()">
          <span class="lo-e">${p.emoji}</span>
          <span class="lo-l">${p.label}</span>
          <span class="lo-dot"></span>
        </div>`).join('')}
    </div>`;
}

function toggleLayerMenu(e) {
  if (e) e.stopPropagation();
  const el = $('layer-switch');
  if (el) el.classList.toggle('open');
}

function closeLayerMenu() {
  const el = $('layer-switch');
  if (el) el.classList.remove('open');
}

function updateLayerSwitchVisibility() {
  const el = $('layer-switch');
  if (!el) return;
  const show = currentLevel !== 'global';
  el.classList.toggle('visible', show);
  if (!show) closeLayerMenu();
  if (cityLayer) cityLayer.show = show;
  updateImagerySourceBadge();
}

function updateImagerySourceBadge() {
  const el = $('imagery-source');
  if (!el) return;
  if (currentLevel === 'global') {
    el.textContent = 'BMNG · BLACK MARBLE';
  } else if (cityLayer && CITY_PROVIDERS[cityProviderIndex]) {
    el.textContent = 'VIA ' + CITY_PROVIDERS[cityProviderIndex].label.toUpperCase();
  } else {
    el.textContent = 'NO LAYER';
  }
  // Visible briefly after each level transition; auto-fades from level badge.
  el.classList.add('visible');
  clearTimeout(updateImagerySourceBadge._t);
  updateImagerySourceBadge._t = setTimeout(() => el.classList.remove('visible'), 2400);
}


/* ==============================================================
   2. Navigation levels — GLOBAL / NATIONAL / PERSONAL
   ============================================================== */
const LEVEL_THRESHOLDS = { global: 5_000_000, national: 500_000 };
let currentLevel = 'global';
// Initialise the body class — at boot we're global, so corner gadgets
// are hidden and the apex-tier orbital agents take over.
try { document.body.classList.add('at-global'); } catch (_) {}
let levelTimer;

function deriveLevel(heightMeters) {
  if (heightMeters > LEVEL_THRESHOLDS.global)   return 'global';
  if (heightMeters > LEVEL_THRESHOLDS.national) return 'national';
  return 'personal';
}

function onCameraSettled() {
  const h = viewer.camera.positionCartographic.height;
  const newLevel = deriveLevel(h);
  if (newLevel === currentLevel) return;
  currentLevel = newLevel;

  // Level + back are folded into #g-discover: tint the gadget by zoom level
  const gd = $('g-discover');
  if (gd) {
    gd.classList.toggle('at-personal', newLevel === 'personal');
    gd.classList.toggle('at-national', newLevel === 'national');
  }
  // Body tier classes drive CSS (e.g. the city category orbs appear at personal).
  document.body.classList.toggle('at-personal', newLevel === 'personal');
  document.body.classList.toggle('at-national', newLevel === 'national');
  if (newLevel === 'personal') { try { renderCityCats(); } catch (_) {} }

  // Globe lighting (day/night terminator) is the GLOBAL aesthetic only.
  // Below global it darkens the street map at night — turn it off so the
  // CARTO street tiles render at full brightness.
  if (viewer) viewer.scene.globe.enableLighting = (newLevel === 'global');

  // BMNG day + Black Marble night are GLOBAL textures. At national/personal
  // we hide them entirely so the street map (cityLayer) covers the visible
  // area without any "satellite at night" bleed-through. They come back
  // when we ascend to global.
  const showGlobeTextures = (newLevel === 'global');
  if (dayLayer)   dayLayer.show   = showGlobeTextures;
  if (nightLayer) nightLayer.show = showGlobeTextures;
  // Also hide the green Natural-Earth fallback below global. If CARTO is
  // slow/blocked, the user then sees the DARK globe (#02060d) with city
  // beacons — never the blurry green "satellite mess" the owner reported.
  if (baseLayer)  baseLayer.show  = showGlobeTextures;

  // At global, the four system agents are orbital (apex tier) and the
  // legacy corner gadgets vanish. At national/personal, the corners
  // reappear so the agents are always reachable.
  document.body.classList.toggle('at-global', newLevel === 'global');

  // City glowing dots + NAME labels: visible at NATIONAL only — the globe
  // stays clean at GLOBAL (orbs do the job), and the streets do at PERSONAL.
  cityDotIndex.forEach(e => { e.primitive.show = (newLevel === 'national'); });
  if (cityLabels) { for (let i = 0; i < cityLabels.length; i++) cityLabels.get(i).show = (newLevel === 'national'); }

  updateLayerSwitchVisibility();
  updateCatFilter();
  // Show delivery pins only at NATIONAL / PERSONAL
  const showDeliveries = newLevel !== 'global';
  deliveryIndex.forEach(e => { e.primitive.show = showDeliveries; });
  // Place-agent billboards (OSM dots) are noise at the global tier — the
  // informant orbs do the job. Only reveal them once we descend.
  if (placeBillboards) placeBillboards.show = showDeliveries;
  // Signal pins on the globe are also noise at GLOBAL — informants and
  // event-binding beams carry signals at that tier. Reveal at NATIONAL+.
  signalIndex.forEach(({ primitive, signal }) => {
    primitive.show = (newLevel !== 'global') && (CAT_FILTER_STATE[signal.category] !== false);
  });
  // Re-scope the showcase tile strip to the new level.
  renderTileStrip();
  if (viewer) viewer.scene.requestRender();
}

/* ==============================================================
   Showcase tile strip — universal feeds/news/offers carrier.
   GLOBAL → planetary signals · NATIONAL → ~country radius ·
   PERSONAL → near the camera. Tiles are ambient muted-video-feel
   cards; tap one to fly to that signal.
   ============================================================== */
function _cameraCenter() {
  if (!viewer) return { lat: 0, lng: 0 };
  try {
    const c = viewer.camera.positionCartographic;
    return { lat: Cesium.Math.toDegrees(c.latitude), lng: Cesium.Math.toDegrees(c.longitude) };
  } catch (_) { return { lat: 0, lng: 0 }; }
}
function _signalsForLevel() {
  if (!signalIndex || !signalIndex.size) return [];
  const center = _cameraCenter();
  const radiusDeg = currentLevel === 'global' ? Infinity
                  : currentLevel === 'national' ? 12 : 0.5;
  const all = [...signalIndex.values()].map(e => e.signal);
  const within = all.filter(s => {
    if (radiusDeg === Infinity) return true;
    if (s.lat == null || s.lng == null) return false;
    const dy = s.lat - center.lat;
    let dx = s.lng - center.lng;
    if (dx > 180) dx -= 360; else if (dx < -180) dx += 360;
    return Math.hypot(dy, dx) <= radiusDeg;
  });
  return within
    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
    .slice(0, 14);
}
// ── LIVING ORB GRAPHICS ENGINE ──────────────────────────────────────────
// Procedural agent visuals.  ONE shared WebGL renderer (_GFX) compiles a
// PBR-flavoured fragment shader once and renders every orb's plasma into
// its own 2D canvas via drawImage.  Per-orb cost is one shader pass + one
// blit, so ~10 orbs at 30fps stays under 1ms of GPU work.
// Fragment shader: hash-noise plasma with domain warp + Lambert diffuse +
// Schlick-Fresnel rim + Phong specular + terminator shadow + outer

// 2D plasma path so the orb still renders.

  h = (h || '#7eb4ff').replace('#', '');

const _GFX = (() => {

  const FS = `precision highp float;
uniform vec2  u_res;
uniform float u_time;
uniform vec3  u_color;
uniform vec3  u_deep;
uniform float u_seed;

// HASH + VALUE NOISE (procedural, no textures).
float h21(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
float n2(vec2 p){
  vec2 i = floor(p), f = fract(p);

  return mix(mix(h21(i + vec2(0,0)), h21(i + vec2(1,0)), u.x),
             mix(h21(i + vec2(0,1)), h21(i + vec2(1,1)), u.x), u.y);
}
// FBM with 7 octaves for finer surface detail.
float fbm(vec2 p){
  float v = 0.0, a = 0.5;
  for (int i = 0; i < 7; i++){ v += a * n2(p); p *= 2.03; a *= 0.5; }
  return v;
}
// CURL-LIKE 2-step domain warp.
vec2 warp(vec2 p, float s){
  return vec2(
    fbm(p + vec2(s * 0.7, -s * 0.3)),
    fbm(p + vec2(-s * 0.4, s * 0.9))
  );
}

// GGX / TROWBRIDGE-REITZ microfacet specular distribution. Real PBR.
float D_GGX(float NdotH, float a){
  float a2 = a * a;
  float d  = (NdotH * a2 - NdotH) * NdotH + 1.0;
  return a2 / (3.14159265 * d * d);
}
// Schlick-Fresnel.
vec3 F_Schlick(float cosT, vec3 F0){
  return F0 + (vec3(1.0) - F0) * pow(1.0 - cosT, 5.0);
}
// ACES filmic tonemap — film-quality colour rolloff.
vec3 aces(vec3 x){
  const float a = 2.51, b = 0.03, c = 2.43, d = 0.59, e = 0.14;
  return clamp((x * (a * x + b)) / (x * (c * x + d) + e), 0.0, 1.0);
}
// Gamma 2.2 → sRGB.
vec3 toSRGB(vec3 c){ return pow(c, vec3(1.0 / 2.2)); }

void main(){
  vec2 uv = (gl_FragCoord.xy / u_res) * 2.0 - 1.0;
  float dist = length(uv);

  // OUTER PARTICLE-DUST RING. Slightly wider + softer than before.
  if (dist > 1.0 && dist < 1.20){
    float ang = atan(uv.y, uv.x);
    vec2 pp = vec2(ang * 4.0, dist * 50.0) + vec2(u_time * 0.28, 0.0);
    float p = smoothstep(0.85, 0.96, n2(pp + u_seed * 100.0));
    float falloff = smoothstep(1.20, 1.01, dist);
    gl_FragColor = vec4(u_color, p * falloff * 0.75);

  }

  float edgeAA = smoothstep(1.0, 0.985, dist);
  if (edgeAA <= 0.0) discard;

  // Sphere normal in screen space (orthographic).
  vec3 N = vec3(uv, sqrt(max(0.0, 1.0 - dist * dist)));

  vec3 Lkey  = normalize(vec3(-0.35,  0.55, 0.75));
  vec3 Lfill = normalize(vec3( 0.55, -0.30, 0.50));
  vec3 V = vec3(0.0, 0.0, 1.0);
  vec3 Hk = normalize(Lkey  + V);
  vec3 Hf = normalize(Lfill + V);

  // not just a single noise field.
  float t = u_time * 0.32 + u_seed * 6.28;
  vec2 puv = uv * 1.6;
  vec2 w1 = warp(puv + vec2(t * 0.15, 0), u_seed * 5.0);
  vec2 w2 = warp(puv * 2.1 + w1 * 1.4 + vec2(0, t * 0.2), u_seed * 9.0);
  float plasma = fbm(puv + w2 * 0.9 + vec2(t * 0.10, t * 0.06));

  // Per-pixel material colour. Hot pockets push to deep complementary tone.
  vec3 base = mix(u_color, u_deep, smoothstep(0.38, 0.88, plasma));

  // Diffuse from both lights.
  float NdotLk = max(0.0, dot(N, Lkey));
  float NdotLf = max(0.0, dot(N, Lfill));
  float diff = 0.18 + 0.70 * NdotLk + 0.18 * NdotLf;

  // SUB-SURFACE WRAP — translucent-sphere glow on the limb away from
  // the key light. Coloured by the agent's own colour.
  float wrap = max(0.0, dot(-N.xy, Lkey.xy)) * 0.5;
  vec3 sss = u_color * wrap * 0.32 * (1.0 - NdotLk);

  // GGX SPECULAR with low roughness (a=0.18) for a glass-orb highlight.
  float a = 0.18;
  float NdotV = max(0.0, dot(N, V));
  float NdotHk = max(0.0, dot(N, Hk));
  float NdotHf = max(0.0, dot(N, Hf));
  float Dk = D_GGX(NdotHk, a);
  float Df = D_GGX(NdotHf, a);
  vec3 F0 = mix(vec3(0.04), u_color, 0.15);   // slight tinted reflectance
  vec3 Fk = F_Schlick(max(0.0, dot(Hk, V)), F0);
  vec3 Ff = F_Schlick(max(0.0, dot(Hf, V)), F0);
  vec3 specK = Dk * Fk * 1.0;
  vec3 specF = Df * Ff * 0.35;

  // SCHLICK-FRESNEL RIM — grazing-angle brightening (real glass-sphere physics).
  vec3 Frim = F_Schlick(NdotV, vec3(0.04)) * 0.85;

  // TERMINATOR — multiply far hemisphere by warm-toned darkness, not pure black.
  float dark = smoothstep(0.10, -0.55, NdotLk);
  vec3 termTint = mix(vec3(1.0), vec3(0.22, 0.16, 0.20), dark * 0.7);

  // Composite linear HDR.
  vec3 col = base * diff;
  col += sss;
  col += specK + specF;
  col += u_color * Frim;
  col *= termTint;

  // ACES filmic tonemap → gamma 2.2 for cinematic colour rolloff.
  col = aces(col * 1.05);
  col = toSRGB(col);

  gl_FragColor = vec4(col, edgeAA);
}`;
  function _compile(src, type){
    const sh = gl.createShader(type);
    gl.shaderSource(sh, src); gl.compileShader(sh);
    if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) { console.warn('[GFX]', gl.getShaderInfoLog(sh)); gl.deleteShader(sh); return null; }

      if (!gl) return false;

      prog = gl.createProgram();
      gl.attachShader(prog, vs); gl.attachShader(prog, fs); gl.linkProgram(prog);
      if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) { console.warn('[GFX]', gl.getProgramInfoLog(prog)); return false; }

      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
      const loc = gl.getAttribLocation(prog, 'a_pos');
      gl.enableVertexAttribArray(loc);
      gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
      gl.useProgram(prog);
      uRes   = gl.getUniformLocation(prog, 'u_res');
      uTime  = gl.getUniformLocation(prog, 'u_time');
      uColor = gl.getUniformLocation(prog, 'u_color');
      uDeep  = gl.getUniformLocation(prog, 'u_deep');
      uSeed  = gl.getUniformLocation(prog, 'u_seed');

      gl.blendFuncSeparate(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA, gl.ONE, gl.ONE_MINUS_SRC_ALPHA);

    const n = Math.min(targetCanvas.width, targetCanvas.height) || 256;
    _ensureSize(n);
    const [r, g, b] = color;
    const dr = Math.min(255, Math.round(r * 0.45 + 90)) / 255;
    const dg = Math.min(255, Math.round(g * 0.45 + 30)) / 255;

    gl.uniform1f(uSeed, seed);
    gl.clearColor(0,0,0,0); gl.clear(gl.COLOR_BUFFER_BIT);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    // Blit to the target 2D canvas.
    const tctx = targetCanvas.getContext('2d');
    if (!tctx) return true;
    tctx.clearRect(0, 0, targetCanvas.width, targetCanvas.height);
    tctx.drawImage(canvas, 0, 0, targetCanvas.width, targetCanvas.height);
    return true;
  }
  const ok = init();
  return { ok, renderTo };
})();

function _initLivingOrb(cv) {
  if (!cv || cv.__inited) return;
  cv.__inited = true;
  cv.__ctx = cv.getContext('2d');
  cv.__rgb = _hexToRgb(cv.dataset.color || '#7eb4ff');
  cv.__seed = parseFloat(cv.dataset.seed || _hashSeed(cv.dataset.name || 'a'));
  _LIVING_ORBS.add(cv);
}
function _drawLivingOrb(cv, t) {
  // Fast path — WebGL renderer (PBR-flavoured shader, ~0.1ms per orb).
  if (_GFX.ok && _GFX.renderTo(cv, cv.__rgb, cv.__seed, t)) return;
  // Fallback path — 2D plasma. Used only if WebGL init failed.

}
function _drawLivingOrb2D(cv, t) {
  const ctx = cv.__ctx; if (!ctx) return;
  const w = cv.width, h = cv.height;
  const cx = w / 2, cy = h / 2, R = Math.min(w, h) / 2;
  const [r, g, b] = cv.__rgb;
  const r2 = Math.round(r * 0.45 + 90);
  const g2 = Math.round(g * 0.45 + 30);
  const b2 = Math.round(b * 0.65 + 80);
  const seed = cv.__seed;

  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.clip();

  ctx.fillStyle = `rgb(3, 7, 15)`;

  // toward the camera-side. Gives the orb genuine volume.

    const sx = cx - R * 0.20, sy = cy - R * 0.20;
    const sss = ctx.createRadialGradient(sx, sy, 0, sx, sy, R * 1.15);
    sss.addColorStop(0,    `rgba(${r}, ${g}, ${b}, 0.55)`);
    sss.addColorStop(0.55, `rgba(${r2}, ${g2}, ${b2}, 0.30)`);
    sss.addColorStop(1,    `rgba(0, 0, 0, 0)`);
    ctx.fillStyle = sss; ctx.fillRect(0, 0, w, h);

  // alternating between the agent's primary colour and the deep
  // complementary tone for chromatic motion.

  for (let i = 0; i < N; i++) {
    const phase = t * (0.28 + i * 0.18) + seed * 6.28 + i * 1.7;
    const radius = R * (0.40 + 0.20 * Math.sin(phase * 1.4));
    const orbitR = R * (0.30 + 0.18 * (i / N));

   so we go AROUND it: orbs are real, physical things. Drag them, fling
   them with momentum, watch them bounce off the screen edges and settle
   back into orbit. Tap (no drag) still opens the orb. This ships the
   "living orbs" feel today; the engine catches up later.
   ============================================================== */
const _orbPhys = new Map();   // el -> { mode:'drag'|'fling', x, y, vx, vy, ... }
let _orbPhysRAF = 0;
function _orbPhysInit() {
  const strip = document.getElementById('tile-strip');
  if (!strip || strip._physWired) return;
  strip._physWired = true;
  strip.addEventListener('pointerdown', _orbPointerDown);
}
function _orbPointerDown(e) {
  const el = e.target.closest && e.target.closest('.informant');
  if (!el) return;
  const rect = el.getBoundingClientRect();
  _orbPhys.set(el, {
    mode: 'drag', x: rect.left, y: rect.top, vx: 0, vy: 0,
    downX: e.clientX, downY: e.clientY, moved: false,
    lastX: e.clientX, lastY: e.clientY, lastT: performance.now(),
  });
  try { el.setPointerCapture(e.pointerId); } catch (_) {}
  el.addEventListener('pointermove', _orbPointerMove);
  el.addEventListener('pointerup', _orbPointerUp);
  el.addEventListener('pointercancel', _orbPointerUp);
}
function _orbPointerMove(e) {
  const el = e.currentTarget; const p = _orbPhys.get(el); if (!p) return;
  if (Math.abs(e.clientX - p.downX) + Math.abs(e.clientY - p.downY) > 6) p.moved = true;
  p.x += e.clientX - p.lastX;
  p.y += e.clientY - p.lastY;
  const now = performance.now(), dt = Math.max(1, now - p.lastT);
  p.vx = (e.clientX - p.lastX) / dt * 16;
  p.vy = (e.clientY - p.lastY) / dt * 16;
  p.lastX = e.clientX; p.lastY = e.clientY; p.lastT = now;
  el.style.transform = `translate3d(${p.x.toFixed(1)}px, ${p.y.toFixed(1)}px, 0) scale(1.12)`;
  el.style.opacity = '1'; el.style.zIndex = '60'; el.style.pointerEvents = 'auto';
  e.preventDefault();
}
function _orbPointerUp(e) {
  const el = e.currentTarget; const p = _orbPhys.get(el); if (!p) return;
  el.removeEventListener('pointermove', _orbPointerMove);
  el.removeEventListener('pointerup', _orbPointerUp);
  el.removeEventListener('pointercancel', _orbPointerUp);
  if (!p.moved) {            // a TAP — let the inline onclick open the orb
    _orbPhys.delete(el); el.style.zIndex = '';
    return;
  }
  // A FLING — suppress the click that would otherwise fire, then coast.
  const suppress = (ev) => { ev.stopPropagation(); ev.preventDefault(); el.removeEventListener('click', suppress, true); };
  el.addEventListener('click', suppress, true);
  setTimeout(() => el.removeEventListener('click', suppress, true), 400);
  p.mode = 'fling';
  if (!_orbPhysRAF) _orbPhysRAF = requestAnimationFrame(_orbPhysTick);
}
function _orbPhysTick() {
  _orbPhysRAF = 0;
  let active = false;
  const W = window.innerWidth, H = window.innerHeight, SZ = 60;
  for (const [el, p] of _orbPhys) {
    if (p.mode !== 'fling') continue;
    active = true;
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.95; p.vy *= 0.95;
    if (p.x < 0) { p.x = 0; p.vx = -p.vx * 0.7; }
    if (p.x > W - SZ) { p.x = W - SZ; p.vx = -p.vx * 0.7; }
    if (p.y < 0) { p.y = 0; p.vy = -p.vy * 0.7; }
    // FLING DOWN past the bottom with real speed → dismiss the orb for now.
    if (p.y > H - SZ && p.vy > 6) {
      el._dismissed = true; el.style.opacity = '0'; el.style.pointerEvents = 'none'; el.style.zIndex = '';
      _orbPhys.delete(el);
      try { toast('Orb dismissed — tap an empty spot to bring orbs back', ''); } catch (_) {}
      continue;
    }
    if (p.y > H - SZ) { p.y = H - SZ; p.vy = -p.vy * 0.7; }
    el.style.transform = `translate3d(${p.x.toFixed(1)}px, ${p.y.toFixed(1)}px, 0) scale(1.06)`;
    if (Math.abs(p.vx) + Math.abs(p.vy) < 0.4) {   // settled → back into orbit
      _orbPhys.delete(el); el.style.zIndex = '';
    }
  }
  if (active) _orbPhysRAF = requestAnimationFrame(_orbPhysTick);
}

// Re-scan the DOM after any panel/orbit render to wire up new orbs.

// ── AGENT SDK ───────────────────────────────────────────────────────────
// Every panel in AstranoV is an agent's home. agentCard renders the unified
// shape: orb header + role chip + status + body + a minimal vertical action
// strip. Used by informants, ME, brain, krypteia, council, and every future
// agent. The body is raw HTML; the actions array is rendered as engage rows.
function agentCard({ emoji = '◈', name, role = '', color = '#7eb4ff', status = '', body = '', actions = [] }) {
  const acts = (actions || []).filter(Boolean).map(a => {
    const tone = a.danger ? 'border-color:rgba(255,100,100,0.32);color:#ff9e9e'
                : a.primary ? `border-color:color-mix(in srgb, ${color} 55%, transparent);color:${color}`
                : '';
    const dot = a.danger ? 'background:#ff9e9e'
              : a.primary ? `background:${color}` : '';
    return `<div class="gadget-engage" onclick="${a.onclick || ''}" style="margin-top:8px;${tone}">
      <span class="verb-glyph" style="${dot}"></span><span>${escapeHtml(a.label || '')}</span>
    </div>`;
  }).join('');
  return `
    <div class="agent-card-header" style="--ac:${color}">
      <div class="agent-card-orb">${livingOrbHTML(emoji, color, _hashSeed(name + role))}</div>
      <div class="agent-card-meta">
        <div class="agent-card-name">${escapeHtml(name || 'Agent')}</div>
        ${role ? `<div class="agent-card-role">${escapeHtml(role)}</div>` : ''}
        ${status ? `<div class="agent-card-status">${escapeHtml(status)}</div>` : ''}
      </div>
    </div>
    <div class="agent-card-body">${body || ''}</div>
    ${acts}`;
}

const _CAT_COLORS = {
  news:'#00d4ff', jobs:'#7cff7c', commerce:'#ffaa00', social:'#ff7edc',
  dating:'#ff3a6e', real_estate:'#b48cff', classifieds:'#bfa073',

  food:'#ff9944', travel:'#6dd0ff',

function _loadInformants() {
  try { const s = JSON.parse(localStorage.getItem('astranov_informants_v2') || 'null'); if (Array.isArray(s) && s.length) return s; } catch (_) {}
  return _INFORMANT_SEED.map(x => ({ ...x }));
}
function _saveInformants(list) { localStorage.setItem('astranov_informants_v2', JSON.stringify(list)); }
// External findings — real, geo-tagged news pulled from informant-feed
// (which queries GDELT). Keyed by informant id. Live for the session.
const _externalFindings = new Map();

function _informantFindings(inf) {
  // 1) External (real-world geo-tagged news from informant-feed) — preferred,
  //    because they carry lat/lng and image previews.
  const ext = _externalFindings.get(inf.id) || [];
  // 2) Local in-app signals (other users' posts in this category), filtered
  //    by topic if set.
  const topic = (inf.topic || '').toLowerCase().trim();
  const inScope = _signalsForLevel();
  const byCat = inf.category ? inScope.filter(s => s.category === inf.category) : inScope;
  const local = topic
    ? byCat.filter(s => (s.title + ' ' + (s.body || '')).toLowerCase().includes(topic))
    : byCat;
  return [...ext, ...local].slice(0, 8);
}

// Pull real news for every user-defined informant from the informant-feed
// Edge Fn. Refreshes every 4 minutes; first poll fires from renderInformants
// shortly after boot, then this interval keeps it warm.
let _feedPollTimer = null;
let _feedInFlight = false;
async function pollInformantFeeds() {
  if (_feedInFlight || !sb) return;
  if (typeof currentLevel !== 'undefined' && currentLevel !== 'global') return;
  const list = (typeof _loadInformants === 'function') ? _loadInformants() : [];
  const informants = list
    .filter(i => i && i.id && i.category)
    .map(i => ({ id: i.id, category: i.category, topic: i.topic || '' }));
  if (!informants.length) return;
  _feedInFlight = true;
  try {
    const { data, error } = await sb.functions.invoke('informant-feed', { body: { informants } });
    if (!error && data && data.findings) {
      let any = false, newSignals = false;
      for (const id of Object.keys(data.findings)) {
        const arr = data.findings[id];
        if (Array.isArray(arr) && arr.length) {
          const prev = _externalFindings.get(id) || [];
          const prevTop = prev[0] && prev[0].id;
          if (arr[0] && arr[0].id !== prevTop) newSignals = true;
          _externalFindings.set(id, arr); any = true;
        }
      }
      // Ping the user — soft tone — when at least one informant got
      // genuinely new news since the last poll. Not on every poll.
      if (newSignals) { try { _pingAgent({ tone: 'soft' }); } catch (_) {} }
      if (any && typeof renderInformants === 'function') renderInformants();
    }

  finally { _feedInFlight = false; }
}
function _startInformantFeedPolling() {
  if (_feedPollTimer) clearInterval(_feedPollTimer);
  _feedPollTimer = setInterval(() => { pollInformantFeeds().catch(() => {}); }, 240000);
  // Kick a first poll immediately (but defer slightly so sb client is ready).
  setTimeout(() => { pollInformantFeeds().catch(() => {}); }, 1500);
}
function renderInformants() {
  const el = $('tile-strip'); if (!el) return;
  try { _orbPhys.clear(); } catch (_) {}   // drop physics state for orbs we're about to rebuild
  if (currentLevel !== 'global') { el.classList.add('hide-orbit'); el.innerHTML = ''; return; }
  el.classList.remove('hide-orbit');
  const list = _loadInformants();
  // KRYPTEIA — owner-only sovereign orb.
  // ANONYMOUS — privacy/anonymity orb shown to everyone EXCEPT the owner.
  // (The owner gets Krypteia, which is the deeper version; users see
  // the Anonymous Service face instead, which never advertises Krypteia's
  // existence.)
  const isOwner = !!(typeof profile !== 'undefined' && profile && profile.is_owner);
  const items = [
    ...(isOwner ? [{ _krypteia: true }] : [{ _anonymous: true }]),
    ...list,
    { _new: true },
  ];
  _refreshOrbAnchors(items);
  const orbs = items.map((inf, i) => {
    if (inf._krypteia) {
      return `<div class="informant krypteia" style="--ic:#ff5a4a;opacity:0" onclick="openKrypteia()" title="Krypteia — the watchtower">
        <div class="orb"><span class="orb-glyph">⬡</span></div>
      </div>`;
    }
    if (inf._anonymous) {
      return `<div class="informant anonymous" style="--ic:#6dd0ff;opacity:0" onclick="openAnonymousService()" title="Anonymous Service — your privacy guardian">
        <div class="orb"><span class="orb-glyph">⊘</span></div>
      </div>`;
    }
    if (inf._new) {
      return `<div class="informant" style="--ic:#7eebb4;opacity:0" onclick="openInformantCreate()" title="Create an agent">
        <div class="orb" style="font-size:26px">${livingOrbHTML('＋', '#7eebb4', i * 0.137)}</div>
      </div>`;
    }
    const found = _informantFindings(inf);
    const has = found.length > 0;
    const color = inf.color || _CAT_COLORS[inf.category] || '#7eb4ff';
    const seed = _hashSeed(inf.id + (inf.name || ''));
    const vurl = _informantVideoURL(inf);
    // If the latest finding has a social-card image, show it as the orb's
    // preview (real news photo). Otherwise fall back to the catalog video.
    const previewImg = (found[0] && typeof found[0].image_url === 'string' && /^https?:/i.test(found[0].image_url))
      ? found[0].image_url : '';
    return `<div class="informant${has ? ' has-news' : ''}" style="--ic:${color};opacity:0" onclick="expandOrb(${JSON.stringify(inf.id)})" title="${escapeHtml(inf.name)} agent">
      <div class="orb">${videoOrbHTML(inf.emoji || '◈', color, seed, vurl, previewImg)}${has ? `<div class="count">${found.length}</div>` : '<div class="count"></div>'}</div>
    </div>`;
  }).join('');
  // Append the four apex-tier system orbs after the informants. Order
  // matters: _orbState is appended in the SAME order in _refreshOrbAnchors.
  const sysOrbs = _SYSTEM_ORB_TIERS.map(tier => {
    // The Me orb shows the user's INITIALS (their face in the cosmos),
    // not a generic glyph.
    const glyph = (tier.id === 'sys-me') ? _meInitials() : tier.emoji;
    const glyphHtml = `<span class="orb-glyph">${escapeHtml(glyph)}</span>`;
    return `<div class="informant ${tier.classes}" style="--ic:${tier.color};opacity:0" onclick="${tier.onclick}" title="${escapeHtml(tier.name)}">
      <div class="orb">${livingOrbHTML('', tier.color, _hashSeed(tier.id))}${glyphHtml}</div>
    </div>`;
  }).join('');
  el.innerHTML = orbs + sysOrbs;

  if (viewer) viewer.scene.requestRender();
}
function _findInformant(id) { return _loadInformants().find(x => x.id === id); }
// EXPAND ORB — first tap on an orb grows it big and plays its video
// UNMUTED (autoplay-with-sound is allowed because the call is in a
// click handler). Tap outside or the close button to dismiss; the
// "Open agent" button drills into the full agentCard panel.
window.expandOrb = function(infId) {
  const inf = _findInformant(infId); if (!inf) return;
  closeExpandOrb();
  const color = inf.color || _CAT_COLORS[inf.category] || '#7eb4ff';
  const vurl = _informantVideoURL(inf);
  const seed = _hashSeed(inf.id + (inf.name || ''));
  const found = _informantFindings(inf);
  const located = found.find(f => typeof f.lat === 'number' && typeof f.lng === 'number');
  const meta = located
    ? `LIVE · ${escapeHtml((located.city || located.country_code || '').toString().toUpperCase())} · ${escapeHtml((located.title || '').slice(0, 60))}`

    ? found[0].image_url : '';

  wrap.innerHTML = `
    <div class="orb-expand-bg"></div>

      <span class="orb-expand-glyph">${inf.emoji || '◈'}</span>
    </div>
    <div class="orb-expand-meta">${meta}</div>
    <div class="orb-expand-actions">
      ${headerArticleUrl ? `<div class="gadget-engage" onclick="event.stopPropagation();window.open(${JSON.stringify(headerArticleUrl)},'_blank','noopener')" style="border-color:color-mix(in srgb, ${color} 70%, transparent);color:#dde9ff"><span class="verb-glyph" style="background:${color}"></span><span>Read article</span></div>` : ''}
      <div class="gadget-engage" onclick="event.stopPropagation();openInformant(${JSON.stringify(infId)});closeExpandOrb()" style="border-color:color-mix(in srgb, ${color} 70%, transparent);color:#dde9ff">
        <span class="verb-glyph" style="background:${color}"></span><span>Open agent</span>

// Tamper listeners — log + warn, never block. Caught events ride the
// /tamper Edge Fn which writes a security_events row tagged with IP,
// UA, identity (if signed in), language, screen, page, and count.
let _tamperCount = 0;
let _tamperReportedKinds = new Set();
function _tamperReport(kind, sample) {
  _tamperCount++;
  // Fire-and-forget POST to /tamper.
  try {
    const auth = (session && session.access_token) ? session.access_token : SUPABASE_ANON;
    fetch(SUPABASE_URL + '/functions/v1/tamper', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON,
        'Authorization': 'Bearer ' + auth,
      },
      body: JSON.stringify({
        kind,
        ts: Date.now(),
        lang: navigator.language,
        screen: `${screen.width}x${screen.height}`,
        page: location.pathname,
        count: _tamperCount,
        sample: sample || undefined,
      }),
      keepalive: true,
    }).catch(() => {});
  } catch (_) {}
  // FIRST attempt: license notice + immediate camera-verification challenge.
  // Lawful path — explicit consent prompt, never silent activation.
  if (_tamperCount === 1) {
    try { toast('Krypteia · this content is licensed under the AstranoV Orbital License (3% / €300). This action has been logged.', 'err'); } catch (_) {}
    setTimeout(() => _krypteiaCameraVerify(), 400);
  } else if (_tamperCount === 5) {
    try { toast('Krypteia · five attempts. The owner has been escalated.', 'err'); } catch (_) {}
  }
}
function _wireKrypteiaTamper() {
  if (window._kryptWired) return;
  window._kryptWired = true;
  document.addEventListener('keydown', (e) => {
    const k = (e.key || '').toLowerCase();
    const mod = e.ctrlKey || e.metaKey;
    if (mod && k === 'a') _tamperReport('select-all');
    else if (mod && k === 'c') _tamperReport('copy');
    else if (mod && k === 's') _tamperReport('save-page');
    else if (mod && k === 'u') _tamperReport('view-source');
    else if (mod && k === 'p') _tamperReport('print');
    else if (e.key === 'F12') _tamperReport('devtools-f12');
    else if (mod && e.shiftKey && k === 'i') _tamperReport('devtools-i');
    else if (mod && e.shiftKey && k === 'c') _tamperReport('devtools-c');
    else if (mod && e.shiftKey && k === 'j') _tamperReport('devtools-j');
  }, true);
  document.addEventListener('contextmenu', () => _tamperReport('contextmenu'));
  document.addEventListener('copy', () => {
    const sel = (window.getSelection && window.getSelection().toString()) || '';
    _tamperReport('copy-event', sel.slice(0, 200));
  });
  // Devtools-open heuristic — large outer/inner-height delta = panels open.
  setInterval(() => {
    try {
      const dh = window.outerHeight - window.innerHeight;
      const dw = window.outerWidth  - window.innerWidth;
      const open = (dh > 220 || dw > 220);
      if (open && !_tamperReportedKinds.has('devtools-open-heuristic')) {
        _tamperReportedKinds.add('devtools-open-heuristic');
        _tamperReport('devtools-open-heuristic');
      }
    } catch (_) {}
  }, 4000);
}
function _krypteiaBootRun() {
  // Heartbeat for every visitor (used for analytics + integrity log).
  try {
    const auth = (session && session.access_token) ? session.access_token : SUPABASE_ANON;
    fetch(SUPABASE_URL + '/functions/v1/tamper', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + auth },
      body: JSON.stringify({ kind: 'krypteia-heartbeat', ts: Date.now(), page: location.pathname, lang: navigator.language, screen: `${screen.width}x${screen.height}`, count: 0 }),
      keepalive: true,
    }).catch(() => {});
  } catch (_) {}
  // For OWNER sessions, also run the full composite scan in silent mode.
  // The verdict panel surfaces only if severity demands it.
  if (profile && profile.is_owner && typeof openKrypteia === 'function') {
    openKrypteia(true);
  }
}
// Camera verification challenge — fires after repeated tamper attempts.
// LAWFUL surface: explicit consent prompt, no silent activation. Decline
// is logged. Accept captures one photo and ships it to security_events.
async function _krypteiaCameraVerify() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
  const ok = confirm(
    'Krypteia anti-fraud check\n\n' +
    'Repeated attempts to bypass the license were detected. AstranoV is asking for a one-time camera snapshot to verify you are not running an automated copy. ' +
    'The snapshot is logged to the owner only. Decline if you do not consent.'
  );
  if (!ok) { _tamperReport('camera-verify-declined'); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240 }, audio: false });
    _tamperReport('camera-verify-accepted');
    const v = document.createElement('video');
    v.srcObject = stream; v.muted = true; v.playsInline = true; await v.play();
    await new Promise(r => setTimeout(r, 600));
    const c = document.createElement('canvas');
    c.width = 320; c.height = 240;
    c.getContext('2d').drawImage(v, 0, 0, 320, 240);
    const dataUrl = c.toDataURL('image/jpeg', 0.6);
    stream.getTracks().forEach(t => t.stop());
    // Send the snapshot via /tamper (kept under sample). Truncated to fit.
    _tamperReport('camera-verify-snapshot', dataUrl.slice(0, 400));
    // Upload the full JPEG to Supabase storage if profile is signed in.
    // NB: fetch() on a data: URL is blocked by our CSP connect-src, so we
    // decode the base64 to a Blob directly instead.
    try {
      if (sb && session && session.user) {
        const b64 = dataUrl.split(',')[1] || '';
        const bin = atob(b64);
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        const blob = new Blob([bytes], { type: 'image/jpeg' });
        const path = `${session.user.id}/${Date.now()}.jpg`;
        await sb.storage.from('tamper-snapshots').upload(path, blob, { contentType: 'image/jpeg', upsert: false }).catch(() => {});
      }
    } catch (_) {}
    toast('Krypteia · verification complete.', '');
  } catch (e) {
    _tamperReport('camera-verify-declined');
  }
}

/* ==============================================================
   Push / Service Worker / Reliability  (§23)
   ============================================================== */
function urlBase64ToUint8Array(b64u) {
  const pad = '='.repeat((4 - b64u.length % 4) % 4);
  const b64  = (b64u + pad).replace(/-/g, '+').replace(/_/g, '/');
  const raw  = atob(b64);
  return Uint8Array.from(raw, c => c.charCodeAt(0));
}

let _swReg = null;

function bootServiceWorker() {
  if (!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).then(reg => {
    _swReg = reg;
    // Force an update check on every page load so users always get the freshest SW.
    try { reg.update(); } catch (_) {}
    // When a new SW takes over, reload once so the page runs the new app code.
    let reloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (reloaded) return; reloaded = true;
      location.reload();
    });
    navigator.serviceWorker.addEventListener('message', e => handleSwMessage(e.data));
  }).catch(err => console.warn('[sw] register failed:', err));
}

async function subscribePush() {
  if (!_swReg || !session || !VAPID_PUBLIC) return;
  try {
    let sub = await _swReg.pushManager.getSubscription();
    if (!sub) {
      sub = await _swReg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC),
      });
    }
    await savePushSubscription(sub);
  } catch (e) {
    console.warn('[push] subscribe failed:', e.message);
  }
}

async function savePushSubscription(sub) {
  if (!sb || !session || !sub) return;
  const j = sub.toJSON();
  await sb.from('push_subscriptions').upsert({
    profile_id:  session.user.id,
    endpoint:    j.endpoint,
    keys_p256dh: j.keys.p256dh,
    keys_auth:   j.keys.auth,
  }, { onConflict: 'endpoint' });
}

async function pushNotify(recipientId, payload) {
  if (!sb || !session || !recipientId || recipientId === session.user.id) return;
  try {
    await sb.functions.invoke('push-notify', { body: { recipient_id: recipientId, payload } });
  } catch (e) {
    console.warn('[push] notify failed:', e.message);
  }
}

function handleSwMessage(msg) {
  if (!msg) return;
  if (msg.type === 'notif-nav') {
    handleNotificationNav(msg.params || {});
  } else if (msg.type === 'call-decline-push') {
    if (currentCall && currentCall.id === msg.callId) declineIncomingCall();
  } else if (msg.type === 'push-resubscribe') {
    if (msg.sub && session) {
      const sub = { toJSON: () => msg.sub };
      savePushSubscription(sub);
    }
  }
}

function handleNotificationNav(p) {
  const type = p.notif;
  if (type === 'call' && p.callId) {
    // Incoming call via push — build a synthetic call state then show UI
    if (!currentCall) {
      currentCall = {
        id:           p.callId,
        peerId:       p.callerId   || '',
        peerName:     p.callerName || 'Caller',
        role:         'callee',
        startedAt:    Date.now(),
        pendingOffer: null, // will arrive via callee-ready handshake
      };
      if ($('call-incoming-name')) $('call-incoming-name').textContent = currentCall.peerName;
      if ($('call-incoming'))      $('call-incoming').classList.add('visible');
      // Subscribe to call channel so we can receive the re-sent offer
      if (sb) {
        callChannel = sb.channel(callChannelName(p.callId));
        callChannel
          .on('broadcast', { event: 'offer'  }, ({ payload }) => {
            if (currentCall) currentCall.pendingOffer = payload.offer;
          })
          .on('broadcast', { event: 'ice' }, ({ payload }) => onIce(payload))
          .on('broadcast', { event: 'bye' }, () => endCall(true))
          .subscribe()
          .then(() => {
            // Signal caller that we're awake and ready for their offer
            callChannel.send({ type: 'broadcast', event: 'callee-ready', payload: { fromId: session?.user.id } });
          });
      }
    }
    if (p.accept === '1') acceptIncomingCall();
  } else if (type === 'message' && p.senderId) {
    openConversation(p.senderId, p.senderName || 'User');
  } else if (type === 'delivery' && p.deliveryId) {
    openDeliveryPanel(Number(p.deliveryId));
  }
}

function clearActiveDelivery() {

function _readOAuthError() {
  const q = new URLSearchParams(location.search);
  const h = new URLSearchParams((location.hash || '').replace(/^#/, ''));
  const desc = q.get('error_description') || h.get('error_description');
  const code = q.get('error_code')       || h.get('error_code');
  const err  = q.get('error')            || h.get('error');
  if (!err && !code) return null;
  return decodeURIComponent((desc || code || err).replace(/\+/g, ' '));
}

function restoreSession() {
  // 0. Surface OAuth errors that landed here as ?error=... or #error=...
  const oauthErr = _readOAuthError();
  if (oauthErr) {
    toast('Sign-in failed: ' + oauthErr, 'err');
    history.replaceState(null, '', '/');
  }
  // 1. URL params injected by push-notification click
  const p = new URLSearchParams(location.search);
  if (p.has('notif')) {
    handleNotificationNav(Object.fromEntries(p));
    // Clean URL without reload
    history.replaceState(null, '', '/');
  }
  // 2. Active delivery from localStorage (runner resume)
  try {
    const raw = localStorage.getItem('astranov_active_delivery');
    if (raw) {
      const d = JSON.parse(raw);
      if (d && d.id) {
        toast('Resuming delivery #' + d.id, 'ok');
        setTimeout(() => openDeliveryPanel(d.id), 800);
      }
    }
  } catch (_) {}
}

/* ==============================================================
   Locate — GPS acquire + globe fly-to
   ============================================================== */
function locateUser() {
  const orb = $('locate-orb'); if (!orb) return;
  if (!navigator.geolocation) return toast('Geolocation not available', 'err');
  orb.classList.remove('locked');
  orb.classList.add('acquiring');
  const g = orb.querySelector('.locate-g');
  if (g) g.textContent = '◎';
  navigator.geolocation.getCurrentPosition(
    pos => {
      orb.classList.remove('acquiring');
      orb.classList.add('locked');
      if (g) g.textContent = '⊕';
      const { latitude: lat, longitude: lng } = pos.coords;
      if (viewer) {
        // Drone top-down view at street-readable altitude. 250m + pitch -90°
        // forces Cesium to request the deepest zoom tiles immediately.
        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(lng, lat, 250),
          duration: 2.8,
          orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 },
        });
      }
      window._userLat = lat; window._userLng = lng; setUserLocation(lat, lng);
      setUserBeacon(lat, lng);
      fetchOSMNearby(lat, lng, 5000);
      setTimeout(() => orb.classList.remove('locked'), 4000);
      startDriveWatch(); // continuous motion tracking from this point
    },
    err => {
      orb.classList.remove('acquiring');
      if (g) g.textContent = '⊕';
      toast('Location denied — ' + err.message, 'err');
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

/* ==============================================================
   Drive mode — continuous motion-aware camera.
   Drone view at rest (pitch -90°, altitude ~600 m). When sustained
   speed > 5 m/s for >3 s → driving view (pitch -25°, altitude ~120 m,
   heading locks to GPS course). When speed < 1 m/s for >5 s → drone.
   ============================================================== */
let _driveWatchId = null;
let _driveMode    = 'drone';      // 'drone' | 'driving'
let _driveBufSpeed = [];          // last speeds, m/s
let _driveLastSwitchAt = 0;
function startDriveWatch() {
  if (_driveWatchId || !navigator.geolocation || !navigator.geolocation.watchPosition) return;
  _driveWatchId = navigator.geolocation.watchPosition(
    pos => _driveTick(pos),
    () => {},
    { enableHighAccuracy: true, maximumAge: 1500, timeout: 15_000 }
  );
}
function stopDriveWatch() {
  if (_driveWatchId) navigator.geolocation.clearWatch(_driveWatchId);
  _driveWatchId = null;
}
function _driveTick(pos) {
  const { latitude: lat, longitude: lng, speed, heading } = pos.coords;
  window._userLat = lat; window._userLng = lng; setUserLocation(lat, lng);
  setUserBeacon(lat, lng);
  const sp = (typeof speed === 'number' && isFinite(speed) && speed >= 0) ? speed : 0;
  _driveBufSpeed.push(sp);
  if (_driveBufSpeed.length > 6) _driveBufSpeed.shift();
  const avg = _driveBufSpeed.reduce((a, b) => a + b, 0) / _driveBufSpeed.length;
  const hud = $('drive-hud'), sps = $('dh-sp');
  if (sps) sps.textContent = Math.round(avg * 3.6) + ' km/h';
  if (hud) hud.classList.toggle('visible', _driveMode === 'driving');

  const now = Date.now();
  const dwell = now - _driveLastSwitchAt;
  // Hysteresis: 5 m/s = 18 km/h to enter, 1 m/s = 3.6 km/h to leave
  if (_driveMode === 'drone' && avg > 5 && dwell > 3000) {
    _driveMode = 'driving'; _driveLastSwitchAt = now;
    _enterDriving(lat, lng, heading);
  } else if (_driveMode === 'driving') {
    if (avg < 1 && dwell > 5000) {
      _driveMode = 'drone'; _driveLastSwitchAt = now;
      _enterDrone(lat, lng);
    } else {
      // Continuously follow while driving
      _followDriving(lat, lng, heading);
    }
  }
}
function _enterDriving(lat, lng, heading) {
  if (!viewer) return;
  const h = (typeof heading === 'number' && !isNaN(heading)) ? heading : 0;
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(lng, lat, 120),
    duration: 1.6,
    orientation: { heading: Cesium.Math.toRadians(h), pitch: Cesium.Math.toRadians(-25), roll: 0 },
  });
  toast('Driving view engaged', 'ok');
}
function _enterDrone(lat, lng) {
  if (!viewer) return;
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(lng, lat, 600),
    duration: 1.8,
    orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 },
  });
  toast('Drone view restored', '');
}
function _followDriving(lat, lng, heading) {
  if (!viewer) return;
  const h = (typeof heading === 'number' && !isNaN(heading)) ? heading : null;
  // Snap camera; cheap each tick, avoids dueling flyTo
  viewer.camera.setView({
    destination: Cesium.Cartesian3.fromDegrees(lng, lat, 120),
    orientation: { heading: h != null ? Cesium.Math.toRadians(h) : viewer.camera.heading,
                   pitch: Cesium.Math.toRadians(-25), roll: 0 },
  });
}

/* ==============================================================
   ROUTING (§13b) — real OSRM driving routes, drawn on the globe.
   The driving profile is built from OSM and RESPECTS one-way tags
   and turn restrictions, so a returned route never sends the user
   the wrong way down a one-way street. We draw the geometry clamped
   to the ground (follows the actual streets on the CARTO layer) and
   surface distance + duration + turn-by-turn. No wrong-way risk is
   introduced client-side: we only render what the profile returns.
   ============================================================== */
const _route = { entities: [], steps: [], dest: null, label: '' };
const OSRM_BASE = 'https://router.project-osrm.org/route/v1/driving/';

function _fmtDist(m) {
  return m >= 1000 ? (m / 1000).toFixed(m >= 10000 ? 0 : 1) + ' km' : Math.round(m) + ' m';
}
function _fmtDur(s) {
  const min = Math.round(s / 60);
  if (min < 60) return min + ' min';
  return Math.floor(min / 60) + ' h ' + (min % 60) + ' min';
}

async function _fetchOSRM(fromLat, fromLng, toLat, toLng) {
  const url = OSRM_BASE
    + fromLng + ',' + fromLat + ';' + toLng + ',' + toLat
    + '?overview=full&geometries=geojson&steps=true&annotations=false';
  const r = await fetch(url);
  if (!r.ok) throw new Error('routing service ' + r.status);
  const j = await r.json();
  if (j.code !== 'Ok' || !j.routes || !j.routes.length) throw new Error(j.message || 'no route found');
  return j.routes[0];
}

function _clearRoute() {
  if (!viewer) return;
  _route.entities.forEach(e => { try { viewer.entities.remove(e); } catch (_) {} });
  _route.entities = [];
  _route.steps = [];
  _route.dest = null;
  try { viewer.scene.requestRender(); } catch (_) {}
}

function _drawRoute(route, fromLat, fromLng, toLat, toLng) {
  if (!viewer) return;
  _clearRoute();
  const coords = route.geometry.coordinates;            // [[lng,lat], ...]
  const flat = [];
  coords.forEach(c => { flat.push(c[0], c[1]); });
  // Glowing line that hugs the street grid on the CARTO layer.
  const line = viewer.entities.add({
    polyline: {
      positions: Cesium.Cartesian3.fromDegreesArray(flat),
      width: 9,
      clampToGround: true,
      material: new Cesium.PolylineGlowMaterialProperty({
        glowPower: 0.22,
        color: Cesium.Color.fromCssColorString('#39e0ff'),
      }),
      zIndex: 999,
    },
  });
  const start = viewer.entities.add({
    position: Cesium.Cartesian3.fromDegrees(fromLng, fromLat),
    point: { pixelSize: 13, color: Cesium.Color.fromCssColorString('#7eebb4'),
             outlineColor: Cesium.Color.BLACK, outlineWidth: 2,
             heightReference: Cesium.HeightReference.CLAMP_TO_GROUND },
  });
  const end = viewer.entities.add({
    position: Cesium.Cartesian3.fromDegrees(toLng, toLat),
    point: { pixelSize: 13, color: Cesium.Color.fromCssColorString('#ff5577'),
             outlineColor: Cesium.Color.BLACK, outlineWidth: 2,
             heightReference: Cesium.HeightReference.CLAMP_TO_GROUND },
  });
  _route.entities = [line, start, end];
  _route.dest = { lat: toLat, lng: toLng };
  try { viewer.flyTo(line, { duration: 1.4 }).catch(() => {}); } catch (_) {}
  try { viewer.scene.requestRender(); } catch (_) {}
}

// Public entry — route from the user's position (or IP fix) to a destination.
window.astranovNavigate = async function(toLat, toLng, label) {
  if (!viewer) return;
  toLat = Number(toLat); toLng = Number(toLng);
  if (!isFinite(toLat) || !isFinite(toLng)) return toast('No destination coordinates', 'err');
  let fromLat = window._userLat, fromLng = window._userLng;
  if (fromLat == null || fromLng == null) {
    toast('Locating you…');
    try { const c = await getUserLocation(); fromLat = c.lat; fromLng = c.lng;
          window._userLat = c.lat; window._userLng = c.lng; setUserLocation(c.lat, c.lng); }
    catch (_) { return toast('Need your location to route. Tap the Pilot to locate.', 'err'); }
  }
  toast('Charting route…');
  try {
    const route = await _fetchOSRM(fromLat, fromLng, toLat, toLng);
    _route.steps = (route.legs && route.legs[0] && route.legs[0].steps) || [];
    _route.label = label || 'Destination';
    _drawRoute(route, fromLat, fromLng, toLat, toLng);
    _openRoutePanel(route, label || 'Destination');
  } catch (e) {
    toast('Routing failed: ' + (e.message || e), 'err');
  }
};

function _maneuverText(step) {
  const m = step.maneuver || {};
  const road = step.name ? ' onto ' + escapeHtml(step.name) : '';
  const type = m.type || 'continue';
  const mod = m.modifier ? ' ' + m.modifier : '';
  if (type === 'depart')  return 'Head out' + (step.name ? ' on ' + escapeHtml(step.name) : '');
  if (type === 'arrive')  return 'Arrive at destination';
  if (type === 'roundabout' || type === 'rotary') return 'Take the roundabout' + road;
  if (type === 'turn')    return 'Turn' + mod + road;
  if (type === 'merge')   return 'Merge' + mod + road;
  if (type === 'fork')    return 'Keep' + mod + road;
  if (type === 'on ramp' || type === 'off ramp') return (type === 'on ramp' ? 'Take the ramp' : 'Exit') + road;
  if (type === 'new name') return 'Continue' + road;
  return (type.charAt(0).toUpperCase() + type.slice(1)) + mod + road;
}

function _openRoutePanel(route, label) {
  const steps = (route.legs && route.legs[0] && route.legs[0].steps) || [];
  const turns = steps.map(s => `
    <div class="ord-line">
      <span>${_maneuverText(s)}</span>
      <span style="color:#7a98c0;flex-shrink:0">${s.distance ? _fmtDist(s.distance) : ''}</span>
    </div>`).join('');
  openPanel(`
    <h2>Route</h2>
    <div class="subtitle">to ${escapeHtml(label)}</div>
    <div style="display:flex;gap:18px;margin:14px 0;align-items:baseline">
      <div><div style="font-size:24px;color:#39e0ff;font-weight:300">${_fmtDur(route.duration)}</div>
        <div style="font-size:9px;color:#7a98c0;letter-spacing:0.2em;text-transform:uppercase">drive time</div></div>
      <div><div style="font-size:24px;color:#cfe1ff;font-weight:300">${_fmtDist(route.distance)}</div>
        <div style="font-size:9px;color:#7a98c0;letter-spacing:0.2em;text-transform:uppercase">distance</div></div>
    </div>
    <div style="font-size:10px;color:#6a8aaf;letter-spacing:0.06em;margin-bottom:6px">One-way streets &amp; turn restrictions are honoured by the driving engine.</div>
    <div class="gadget-engage" onclick="_startRouteDriving()" style="border-color:rgba(57,224,255,0.4);color:#aef0ff">
      <span class="verb-glyph">◈</span><span>Start driving</span>
    </div>
    <div class="me-sec">Turn by turn</div>
    <div>${turns || '<div style="color:#6a8aaf;font-size:12px">Direct line.</div>'}</div>
    <div class="gadget-engage" onclick="_clearRoute();closePanel()" style="margin-top:12px;border-color:rgba(255,100,100,0.3);color:#ff9e9e">
      <span class="verb-glyph">✕</span><span>Clear route</span>
    </div>
  `);
}

window._startRouteDriving = function() {
