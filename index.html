/* ==============================================================
   Helper drones — WebRTC datachannel scaffold. The Astranov system
   stands ready to pair with companion drones via WebRTC + Supabase
   Realtime signaling (room: 'drone:<userId>'). A drone client
   joins the same room and exchanges SDP offers. Once paired, we
   can stream telemetry + send waypoints over the datachannel.
   ============================================================== */
const droneState = { peers: new Map(), channel: null, ready: false };
function initDroneStandby() {
  if (!sb || !session || droneState.ready) return;
  const room = 'drone:' + session.user.id;
  droneState.channel = sb.channel(room, { config: { broadcast: { ack: true } } })
    .on('broadcast', { event: 'drone-hello' }, ({ payload }) => _onDroneHello(payload))
    .on('broadcast', { event: 'drone-sdp'   }, ({ payload }) => _onDroneSdp(payload))
    .on('broadcast', { event: 'drone-ice'   }, ({ payload }) => _onDroneIce(payload))
    .subscribe();
  droneState.ready = true;
}
function _onDroneHello(p) {
  toast('Drone discovered: ' + (p.callsign || 'unknown'), 'ok');
  // (full handshake elided — drone client initiates with SDP offer)
}
function _onDroneSdp(p) { /* answer with sb.channel send */ }
function _onDroneIce(p) { /* trickle ICE */ }
function sendDroneWaypoint(lat, lng, alt) {
  for (const peer of droneState.peers.values()) {
    try { peer.dc?.send(JSON.stringify({ type: 'waypoint', lat, lng, alt })); } catch (_) {}
  }
}
window.openDronePanel = function() {
  initDroneStandby();
  const room = session ? 'drone:' + session.user.id : null;
  openPanel(`
    <h2>Drones</h2>
    <div class="subtitle">${room ? 'Astranov standby — '+droneState.peers.size+' linked' : 'Sign in to pair'}</div>
    <div style="font-size:12px;color:#a8c8ee;line-height:1.55;margin-top:10px">

window.openConversation = async (peerId, peerName) => {
  _activePeer = { id: peerId, name: peerName };
  openPanel(`
    <h2>${escapeHtml(peerName)}</h2>
    <div class="msg-thread" id="msg-thread-container"></div>
    <div class="msg-compose">
      <input id="msg-input" class="gadget-cmd" placeholder="Message…" maxlength="4000" style="margin-top:0;flex:1" />
      <div class="send-orb" onclick="sendMessage()" title="Transmit" style="border-radius:50%;width:36px;height:36px;border:1.5px solid rgba(120,180,255,0.4);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:#7eb4ff;flex-shrink:0">◈</div>
    </div>
  `);
  // Mark read
  await sb.rpc('mark_messages_read', { peer: peerId });
  loadMessageBadge();
  // Load thread
  const { data } = await sb.rpc('get_conversation', { peer: peerId, max_results: 60 });
  const thread = $('msg-thread-container'); if (!thread) return;
  (data || []).forEach(m => _appendBubble(thread, m));
  thread.scrollTop = thread.scrollHeight;
  // Send on enter
  const inp = $('msg-input');
  if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }});
};

function _appendBubble(container, m) {
  const isMe = m.sender_id === session?.user.id;
  const div = document.createElement('div');
  div.className = 'msg-bubble ' + (isMe ? 'me' : 'them');
  div.textContent = m.body;
  div.title = formatRelative(m.created_at);
  container.appendChild(div);
}

function _appendIncomingBubble(m) {
  if (m.sender_id !== _activePeer?.id) return;
  const thread = $('msg-thread-container'); if (!thread) return;
  _appendBubble(thread, m);
  thread.scrollTop = thread.scrollHeight;
  sb.rpc('mark_messages_read', { peer: m.sender_id });
}

window.sendMessage = async () => {
  const inp = $('msg-input'); if (!inp || !_activePeer || !sb || !session) return;
  const body = inp.value.trim(); if (!body) return;
  inp.value = '';
  const m = { id: crypto.randomUUID(), sender_id: session.user.id, body, created_at: new Date().toISOString() };
  const thread = $('msg-thread-container');
  if (thread) { _appendBubble(thread, m); thread.scrollTop = thread.scrollHeight; }
  const { error } = await sb.from('messages').insert({ sender_id: session.user.id, recipient_id: _activePeer.id, body });
  if (error) { toast(error.message, 'err'); return; }
  pushNotify(_activePeer.id, {
    type:       'message',
    title:      profile?.display_name || 'Message',
    body:       body.slice(0, 80),
    tag:        'msg-' + session.user.id,
    senderId:   session.user.id,
    senderName: profile?.display_name || '',
  });
};

const _agentState = { open: null, log: { discover: [], me: [], locate: [], ai: [] } };

function openAgentSheet(name) {
  const cfg = AGENTS[name]; if (!cfg) return;
  _agentState.open = name;
  const titleEl = $('agent-title'),
        subEl   = $('agent-sub'),
        glyphEl = $('agent-glyph'),
        actsEl  = $('agent-actions'),
        sheet   = $('agent-sheet'),
        input   = $('agent-input');
  titleEl.textContent = typeof cfg.title === 'function' ? cfg.title() : cfg.title;
  subEl.textContent   = (typeof cfg.sub   === 'function' ? cfg.sub()   : cfg.sub) || 'READY';
  glyphEl.textContent = cfg.glyph;
  // Action rows
  actsEl.innerHTML = '';
  const items = cfg.items();
  items.forEach((it, i) => {
    const row = document.createElement('div');
    row.className = 'agent-action act-' + (it.kind === 'cat' ? 'cat' : it.kind);
    row.innerHTML = '<span class="aa-g">' + (it.glyph || '◌') + '</span><span class="aa-l">' + escapeHtml(it.label || '') + '</span>';
    if (it.isOn && !it.isOn()) row.classList.add('off');
    row.addEventListener('click', e => {
      e.stopPropagation();
      const res = it.fn(row) || {};
      if (!res.keepOpen) closeAgentSheet();
    });
    actsEl.appendChild(row);
  });
  // Restore chat log
  _renderAgentLog();
  // Show the sheet
  sheet.classList.remove('expanded');
  sheet.classList.add('open');
  sheet.setAttribute('aria-hidden', 'false');
  if (input) input.placeholder = 'Ask the ' + (titleEl.textContent.split(' ')[0] || 'agent') + '…';
}

function refreshAgentSheet() {
  if (!_agentState.open) return;
  openAgentSheet(_agentState.open);
}

window.closeAgentSheet = function() {
  _agentState.open = null;
  const sheet = $('agent-sheet');
  if (!sheet) return;
  sheet.classList.remove('open', 'expanded', 'dragging');
  sheet.setAttribute('aria-hidden', 'true');
  sheet.style.height = '';
};

function _renderAgentLog() {
  const name = _agentState.open; if (!name) return;
  const log = $('agent-chat-log'); if (!log) return;
  const msgs = _agentState.log[name] || [];
  log.innerHTML = msgs.map(m => {
    if (m.role === 'me')  return '<div class="ag-msg me">' + escapeHtml(m.text) + '</div>';
    return '<div class="ag-msg bot">' + (m.via ? '<div class="via">' + escapeHtml(m.via) + '</div>' : '') + escapeHtml(m.text) + '</div>';
  }).join('');
  log.scrollTop = log.scrollHeight;
}

window._agentChatSend = async function() {
  const name = _agentState.open; if (!name || !sb) return;
  const input = $('agent-input'); if (!input) return;
  const text = (input.value || '').trim(); if (!text) return;
  input.value = '';
  const cfg = AGENTS[name];
  _agentState.log[name].push({ role: 'me', text });
  _renderAgentLog();
  $('agent-sheet')?.classList.add('thinking');
  try {
    const messages = [];
    if (cfg.chatSystem) messages.push({ role: 'system', content: cfg.chatSystem });
    for (const m of _agentState.log[name]) {
      messages.push({ role: m.role === 'me' ? 'user' : 'assistant', content: m.text });
    }
    const { data, error } = await sb.functions.invoke('aicycle', { body: { messages } });
    if (error) throw error;
    const resp = (data && (data.response || data.text)) || 'No reply.';
    const via  = (data && (data.via || data.provider)) || '';
    _agentState.log[name].push({ role: 'bot', text: resp, via });
  } catch (e) {
    _agentState.log[name].push({ role: 'bot', text: 'Connection failed: ' + (e.message || e), via: 'system' });
  }
  $('agent-sheet')?.classList.remove('thinking');
  _renderAgentLog();
};

// === Sheet drag-resize ==================================================
(function() {
  const sheet  = () => $('agent-sheet');
  const handle = () => $('agent-handle');
  let st = null;
  function onDown(e) {
    const s = sheet(); if (!s || !s.classList.contains('open')) return;
    st = { y: e.clientY, h: s.getBoundingClientRect().height, vh: window.innerHeight };
    s.classList.add('dragging');
    try { handle().setPointerCapture(e.pointerId); } catch (_) {}
    e.preventDefault();
  }
  function onMove(e) {
    if (!st) return;
    const s = sheet(); if (!s) return;
    const newH = Math.max(0, Math.min(st.vh * 0.96, st.h + (st.y - e.clientY)));
    s.style.height = newH + 'px';
  }
  function onUp(e) {
    if (!st) return;
    const s = sheet(); if (!s) { st = null; return; }
    s.classList.remove('dragging');
    try { handle().releasePointerCapture(e.pointerId); } catch (_) {}
    const h = s.getBoundingClientRect().height;
    const vh = st.vh;
    st = null;
    // Snap: <22vh closes; 22-70vh = open (48vh); >=70vh = expanded (92vh)
    s.style.height = '';
    if (h < vh * 0.22) { closeAgentSheet(); return; }
    if (h >= vh * 0.70) s.classList.add('expanded');
    else                s.classList.remove('expanded');
  }
  // Wire when DOM is ready
  function wire() {
    const h = handle(); if (!h) return setTimeout(wire, 50);
    h.addEventListener('pointerdown', onDown);
    h.addEventListener('pointermove', onMove);
    h.addEventListener('pointerup',   onUp);
    h.addEventListener('pointercancel', onUp);
  }
  wire();
})();

const _gadgetPress = {};
window.gadgetPress = function(name, e) {
  if (e) e.preventDefault();
  _gadgetPress[name] = { at: Date.now(), long: false };
  _gadgetPress[name].timer = setTimeout(() => {
    if (!_gadgetPress[name]) return;
    _gadgetPress[name].long = true;
    closeAgentSheet();
    try { AGENTS[name]?.longPress?.(); } catch (_) {}
  }, 600);
};
// Agent law: FIRST tap performs the agent's primary action — no drawer, no
// questions. Once engaged, a further tap opens the bottom drawer with only
// the options that make sense. Tapping while the drawer is open closes it.
const _engaged = new Set();
window.gadgetRelease = function(name, e) {
  const s = _gadgetPress[name]; if (!s) return;
  clearTimeout(s.timer);
  const wasLong = s.long;
  delete _gadgetPress[name];
  if (wasLong) return;
  if (_agentState.open === name) { closeAgentSheet(); return; }
  const cfg = AGENTS[name]; if (!cfg) return;
  const engaged = cfg.engaged ? cfg.engaged() : _engaged.has(name);
  if (!engaged) {
    _engaged.add(name);
    if (cfg.primary) { try { cfg.primary(); } catch (_) {} return; }
  }
  openAgentSheet(name);
};

/* ==============================================================
   4. Signals — PointPrimitiveCollection + pulse callback
   ============================================================== */
let signalPoints = null;         // PointPrimitiveCollection
const signalIndex = new Map();   // id -> { primitive, signal }

let userBillboards = null;
let userBillboard  = null;
let _userBeaconRaf = 0;

const CATEGORY_COLORS = {
  news:        Cesium.Color.fromCssColorString('#00d4ff'),
  jobs:        Cesium.Color.fromCssColorString('#7cff7c'),
  commerce:    Cesium.Color.fromCssColorString('#ffaa00'),
  social:      Cesium.Color.fromCssColorString('#ff7edc'),
  dating:      Cesium.Color.fromCssColorString('#ff3a6e'),
  real_estate: Cesium.Color.fromCssColorString('#b48cff'),
  classifieds: Cesium.Color.fromCssColorString('#a0a0a0'),
};

function ensurePointCollection() {
  if (!signalPoints && viewer) {
    signalPoints = viewer.scene.primitives.add(new Cesium.PointPrimitiveCollection());
  }
}

function addSignalPoint(signal) {
  if (!viewer || signal.lng == null || signal.lat == null) return;
  ensurePointCollection();
  if (signalIndex.has(signal.id)) return; // already rendered

  const color = CATEGORY_COLORS[signal.category] || Cesium.Color.WHITE;
  const size = 6 + Math.min(signal.amplitude || 1, 24);
  const primitive = signalPoints.add({
    position: Cesium.Cartesian3.fromDegrees(Number(signal.lng), Number(signal.lat)),
    pixelSize: size,
    color: color.withAlpha(0.85),
    outlineColor: Cesium.Color.WHITE.withAlpha(0.4),
    outlineWidth: 1,
    scaleByDistance: new Cesium.NearFarScalar(1.5e2, 1.4, 1.5e7, 0.6),
    show: (currentLevel !== 'global') && (CAT_FILTER_STATE[signal.category] !== false),
  });
  primitive.__signalId = signal.id;
  signalIndex.set(signal.id, { primitive, signal });
  viewer.scene.requestRender();
}

function updateSignalPoint(signal) {
  const entry = signalIndex.get(signal.id);
  if (!entry) return addSignalPoint(signal);
  entry.signal = signal;
  entry.primitive.pixelSize = 6 + Math.min(signal.amplitude || 1, 24);
  if (signal.status !== 'active') removeSignalPoint(signal.id);
  viewer.scene.requestRender();
}

function removeSignalPoint(id) {
  const entry = signalIndex.get(id);
  if (!entry) return;
  signalPoints.remove(entry.primitive);
  signalIndex.delete(id);
  viewer.scene.requestRender();
}

/* ==============================================================
   User location beacon — glowing, hovering "you are here" marker
   ============================================================== */
function _makeUserBeaconCanvas() {
  const sz = 80, cx = sz / 2;
  const c = document.createElement('canvas'); c.width = c.height = sz;
  const ctx = c.getContext('2d');
  // Outer soft glow
  const g = ctx.createRadialGradient(cx, cx, 4, cx, cx, cx);
  g.addColorStop(0, 'rgba(0,212,255,0.8)');
  g.addColorStop(0.45, 'rgba(0,212,255,0.25)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, sz, sz);
  // Dashed orbit ring
  ctx.save(); ctx.setLineDash([3, 4]);
  ctx.beginPath(); ctx.arc(cx, cx, cx - 4, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,212,255,0.45)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.restore();
  // Solid filled circle
  ctx.beginPath(); ctx.arc(cx, cx, cx - 20, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,180,255,0.94)'; ctx.fill();
  ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 16;
  ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 3; ctx.stroke();
  ctx.shadowBlur = 0;
  // White center dot
  ctx.beginPath(); ctx.arc(cx, cx, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#fff'; ctx.fill();
  return c;
}

function setUserBeacon(lat, lng) {
  if (!viewer) return;
  if (!userBillboards) {
    userBillboards = viewer.scene.primitives.add(new Cesium.BillboardCollection({ scene: viewer.scene }));
  }
  if (userBillboard) { userBillboards.remove(userBillboard); userBillboard = null; }
  cancelAnimationFrame(_userBeaconRaf);

  userBillboard = userBillboards.add({
    position: Cesium.Cartesian3.fromDegrees(Number(lng), Number(lat)),
    image: _makeUserBeaconCanvas(),
    width: 58,
    height: 58,
    verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
    scaleByDistance: new Cesium.NearFarScalar(100, 2.0, 4e5, 0.2),
    translucencyByDistance: new Cesium.NearFarScalar(3e5, 1.0, 8e5, 0),
    disableDepthTestDistance: Number.POSITIVE_INFINITY,
    eyeOffset: new Cesium.Cartesian3(0, 0, -5),
  });

  let t = 0;
  (function animateBeacon() {
    if (!userBillboard) return;
    t += 0.038;
    userBillboard.scale = 1 + 0.2 * Math.abs(Math.sin(t * 0.75));
    userBillboard.pixelOffset = new Cesium.Cartesian2(0, Math.sin(t) * 5 - 3);
    viewer.scene.requestRender();
    _userBeaconRaf = requestAnimationFrame(animateBeacon);
  })();
}

// Tier-aware city-dot flight. NEVER skip a level: from GLOBAL we land at
// NATIONAL altitude over the city's country; only from NATIONAL do we
// descend into the city itself. From PERSONAL we stay personal (recenter).
function flyToCity(city) {
  if (!city || !viewer) return;
  const h = viewer.camera.positionCartographic.height;
  let alt, pitchDeg;
  if (h > LEVEL_THRESHOLDS.global) {
    // Global → National. Park above the country, do not yet descend to city.
    alt = 700_000;
    pitchDeg = -90;
  } else if (h > LEVEL_THRESHOLDS.national) {
    // National → City. Now actually enter the city.
    alt = 6_000;
    pitchDeg = -72;
  } else {
    // Already personal — just recenter on the city.
    alt = h;
    pitchDeg = -65;
  }
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(city.lng, city.lat, alt),
    duration: 2.0,
    orientation: { heading: 0, pitch: Cesium.Math.toRadians(pitchDeg), roll: 0 },
  });
  // Only warm up OSM at city tier or lower — at national altitude we'd be
  // querying a sub-5km radius that the camera can't even see.
  if (alt <= LEVEL_THRESHOLDS.national) fetchOSMNearby(city.lat, city.lng, 5000);
}

/* ==============================================================
   OSM / Overpass — vendor billboard dots on the globe
   ============================================================== */
// Multiple Overpass mirrors — the main one frequently 504s. We race through
// them with a per-request timeout so vendors reliably load.
const OVERPASS_API = 'https://overpass-api.de/api/interpreter';
const OVERPASS_MIRRORS = [
  'https://overpass-api.de/api/interpreter',
  'https://overpass.kumi.systems/api/interpreter',
  'https://maps.mail.ru/osm/tools/overpass/api/interpreter',
  'https://overpass.openstreetmap.fr/api/interpreter',
];
async function _overpassFetch(query) {
  for (const url of OVERPASS_MIRRORS) {
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 18000);
      const resp = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'data=' + encodeURIComponent(query),
        signal: ctrl.signal,
      });
      clearTimeout(t);
      if (resp.ok) return await resp.json();
    } catch (_) { /* try next mirror */ }
  }
  return null;
}
let placeBillboards = null;
const placeIndex = new Map();
const _osmFetchedZones = new Set();

const _CAT_INFO = {
  food:        { color: '#ff9944', emoji: '🍽', label: 'Food & Drink' },
  cafe:        { color: '#ffcc55', emoji: '☕', label: 'Café' },
  bar:         { color: '#ff5577', emoji: '🍺', label: 'Bar / Pub' },
  hotel:       { color: '#b48cff', emoji: '🛏', label: 'Hotel' },
  shop:        { color: '#ffaa33', emoji: '🛍', label: 'Shop' },
  medical:     { color: '#ff4466', emoji: '💊', label: 'Medical' },
  bank:        { color: '#44ddaa', emoji: '🏦', label: 'Bank' },
  museum:      { color: '#ffdd55', emoji: '🏛', label: 'Culture' },
  attraction:  { color: '#00d4ff', emoji: '⭐', label: 'Attraction' },
  supermarket: { color: '#88ee44', emoji: '🛒', label: 'Grocery' },
  default:     { color: '#8899bb', emoji: '📍', label: 'Place' },
};

function _catKey(tags) {
  const a = tags.amenity || '', s = tags.shop || '', t = tags.tourism || '';
  if (/restaurant|fast_food|food_court/.test(a)) return 'food';
  if (/cafe/.test(a)) return 'cafe';
  if (/bar|pub/.test(a)) return 'bar';
  if (/hotel|hostel|motel/.test(a + t)) return 'hotel';
  if (/hospital|clinic|pharmacy|doctors/.test(a)) return 'medical';
  if (/bank|atm/.test(a)) return 'bank';
  if (/museum|gallery|theatre|cinema/.test(a + t)) return 'museum';
  if (/attraction|viewpoint/.test(t)) return 'attraction';
  if (/supermarket|convenience/.test(a + s)) return 'supermarket';
  if (s) return 'shop';
  return 'default';
}

const _placeIconCache = new Map();

function _makePlaceCanvas(catKey) {
  if (_placeIconCache.has(catKey)) return _placeIconCache.get(catKey);
  // PLACE AGENT ORB — visual language matches informant orbs and corner
  // agents. Soft radial glow, glassy orb body, faint orbit ring, centre
  // emoji. No boxy badges, no tick marks. Every place on the map is an
  // agent of itself.
  const sz = 80, cx = sz / 2;
  const c = document.createElement('canvas'); c.width = c.height = sz;
  const ctx = c.getContext('2d');
  const info = _CAT_INFO[catKey] || _CAT_INFO.default;
  const col = info.color;

  // Outer aura
  const aura = ctx.createRadialGradient(cx, cx, 6, cx, cx, cx);
  aura.addColorStop(0, col + 'aa');
  aura.addColorStop(0.45, col + '40');
  aura.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = aura; ctx.fillRect(0, 0, sz, sz);

  // Faint orbit ring (the agent is alive in its own sphere)
  ctx.beginPath(); ctx.arc(cx, cx, cx - 4, 0, Math.PI * 2);
  ctx.strokeStyle = col + '55'; ctx.lineWidth = 1; ctx.stroke();

  // Glassy orb body — top-left highlight to mid-tone to deep
  const r = cx - 11;
  const body = ctx.createRadialGradient(cx - r * 0.4, cx - r * 0.4, 1, cx, cx, r);
  body.addColorStop(0,    'rgba(255,255,255,0.55)');
  body.addColorStop(0.18, col + 'cc');
  body.addColorStop(0.7,  col + '44');
  body.addColorStop(1,    'rgba(4,10,22,0.95)');
  ctx.beginPath(); ctx.arc(cx, cx, r, 0, Math.PI * 2);
  ctx.fillStyle = body; ctx.fill();
  ctx.shadowColor = col; ctx.shadowBlur = 8;
  ctx.strokeStyle = col + 'dd'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.shadowBlur = 0;

  // Centre emoji — the agent's face
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = '23px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",serif';
  ctx.fillStyle = '#fff';
  ctx.fillText(info.emoji, cx, cx + 2);

  _placeIconCache.set(catKey, c);
  return c;
}

function _ensureBillboardCollection() {
  if (!placeBillboards && viewer) {
    placeBillboards = viewer.scene.primitives.add(new Cesium.BillboardCollection({ scene: viewer.scene }));
  }
}

function addPlacePoint(place) {
  if (!viewer || !place.lat || !place.lon) return;
  const tags = place.tags || {};
  if (!tags.name) return;
  _ensureBillboardCollection();
  const key = 'osm:' + place.id;
  if (placeIndex.has(key)) return;
  const catKey = _catKey(tags);
  const icon = _makePlaceCanvas(catKey);
  const billboard = placeBillboards.add({
    position: Cesium.Cartesian3.fromDegrees(Number(place.lon), Number(place.lat)),
    image: icon,
    width: 54,
    height: 54,
    verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
    pixelOffset: new Cesium.Cartesian2(0, 6),
    scaleByDistance: new Cesium.NearFarScalar(300, 1.1, 1.2e6, 0.12),
    translucencyByDistance: new Cesium.NearFarScalar(7e5, 1.0, 1.8e6, 0),
    eyeOffset: new Cesium.Cartesian3(0, 0, -10),
  });
  billboard.__placeId = key;
  placeIndex.set(key, { primitive: billboard, place });
  viewer.scene.requestRender();
}

async function fetchOSMNearby(lat, lng, radiusM) {
  radiusM = radiusM || 6000;
  const zk = Math.round(lat * 10) + ',' + Math.round(lng * 10);
  if (_osmFetchedZones.has(zk)) return;
  _osmFetchedZones.add(zk);
  const q = '[out:json][timeout:25];('
    + 'node["name"]["amenity"~"restaurant|cafe|bar|fast_food|pub|hotel|pharmacy|bank|atm|supermarket|hospital|clinic|cinema|theatre|museum|doctors|convenience"](around:' + radiusM + ',' + lat + ',' + lng + ');'
    + 'node["name"]["shop"](around:' + radiusM + ',' + lat + ',' + lng + ');'
    + 'node["name"]["tourism"~"hotel|hostel|motel|attraction|museum|gallery|viewpoint"](around:' + radiusM + ',' + lat + ',' + lng + ');'
    + ');out 600;';
  const json = await _overpassFetch(q);
  if (!json) { _osmFetchedZones.delete(zk); return; }   // allow retry later
  const elements = json.elements || [];
  elements.forEach(addPlacePoint);
  if (elements.length) toast(elements.length + ' places nearby', '');
}

async function _autoLoadPlaces() {
  // Pre-warm nearby places by IP, but NEVER move the camera. The app must
  // always start on the global view (Zero-UI §1, Space View §5b). The
  // camera descends only on an explicit user action: locate / tap globe /
  // tap a city beacon.
  if (window._userLat) { fetchOSMNearby(window._userLat, window._userLng, 6000); return; }
  try {
    const r = await fetch('https://ipapi.co/json/');
    const d = await r.json();
    if (d && d.latitude) {
      window._userLat = d.latitude; window._userLng = d.longitude;
      setUserLocation(d.latitude, d.longitude);
      fetchOSMNearby(d.latitude, d.longitude, 8000);   // warm vendors silently
      // no setUserBeacon, no flyTo — the user must opt in to descend.
    }
  } catch (_) {}
}

window._loadMenu = async function() {

  const el = $('ord-menu'); if (el) el.innerHTML = '<div style="color:#7eb4ff;font-size:12px;padding:8px 0">Astranov is composing the menu…</div>';

window._addMenuItem = function(i) {
  const m = (window._menu || [])[i]; if (!m) return;
  const ex = window._cart.find(c => c.name === m.name);
  if (ex) ex.qty = Number(ex.qty) + 1;
  else window._cart.push({ name: m.name, qty: 1, price: m.price });

  _renderOrderPanel();
};

function _osmIdFor(p) {
  const t = p.tags || {};
  if (t['osm:id']) return 'osm:' + t['osm:id'];
  if (p.id) return 'osm:' + p.id;
  // fall back to a stable hash of name+coords
  return 'astr:' + encodeURIComponent((p.name || 'x') + ':' + (t['addr:street'] || ''));
}

function _renderOrderPanel() {
  const p = window._currentPlace;
  const cart = window._cart || [];
  const items = cart.map((it, i) => `
    <div class="ord-row">
      <input class="me-inp ord-name" data-i="${i}" type="text" value="${escapeHtml(it.name)}" placeholder="Item name" oninput="_cartEdit(${i},'name',this.value)">
      <input class="me-inp ord-qty"  data-i="${i}" type="number" min="1" max="50" value="${it.qty}" oninput="_cartEdit(${i},'qty',this.value)">
      <input class="me-inp ord-px"   data-i="${i}" type="number" min="0" step="0.5" value="${it.price}" oninput="_cartEdit(${i},'price',this.value)">
      <div class="ord-x" onclick="_cartRemove(${i})">✕</div>
    </div>`).join('');
  const subtotal = cart.reduce((s, it) => s + (Number(it.qty)||0) * (Number(it.price)||0), 0);
  const deliveryFee = cart.length ? 3 : 0;
  const platformFee = subtotal ? Math.max(1, Math.round(subtotal * 0.05)) : 0;
  const total = subtotal + deliveryFee + platformFee;

window._useMyLocation = async function() {

window._submitOrder = async function() {
  const p = window._currentPlace;
  const cart = (window._cart || []).filter(it => it.name && Number(it.qty) > 0 && Number(it.price) >= 0);
  if (!cart.length) return toast('Cart is empty', 'err');
  const subtotal = cart.reduce((s, it) => s + (Number(it.qty)||0) * (Number(it.price)||0), 0);
  const delivery_fee = 3;
  const platform_fee = Math.max(1, Math.round(subtotal * 0.05));
  const total = subtotal + delivery_fee + platform_fee;
  const addr = ($('ord-addr')?.value || '').trim();
  const notes = ($('ord-notes')?.value || '').trim();
  window._orderNotes = notes;

  const vendor_id = window._cartVendorId || _osmIdFor(p);
  const t = p.tags || {};
  const vendor_payload = {
    osm_id: p.id || (vendor_id.startsWith('osm:') ? vendor_id.slice(4) : null),
    name: p.name, emoji: p.info.emoji, category: p.catKey,
    lat: p._lat ?? null, lng: p._lng ?? null,
    address: { street: t['addr:street'], city: t['addr:city'], housenumber: t['addr:housenumber'] },
    tags: t,
  };

  const lat = window._orderLat ?? window._userLat ?? null;
  const lng = window._orderLng ?? window._userLng ?? null;

  toast('Transmitting order…');
  try {
    const { data, error } = await sb.functions.invoke('order-intake', {
      body: {
        vendor_id, vendor: vendor_payload,
        items: cart, calc: { subtotal, delivery_fee, platform_fee, total, currency: 'EUR' },
        delivery_lat: lat, delivery_lng: lng, delivery_address: addr, notes,
      }
    });
    if (error) throw error;
    if (!data?.ok) throw new Error(data?.error || 'order failed');
    window._cart = []; window._cartVendorId = null;
    toast('Order placed · ' + data.order.short_id, 'ok');
    try { await loadProfile(); } catch (_) {}   // euros were debited server-side
    closePanel();
    setTimeout(() => openOrderTrackPanel(data.order.id), 250);
  } catch (e) {
    const msg = String(e.message || e);
    if (msg.includes('insufficient_funds') || msg.includes('402')) {
      toast('Not enough euros — top up to order', 'err');
      try { await loadProfile(); } catch (_) {}
      setTimeout(() => { try { openBuyAVC(); } catch (_) {} }, 400);
      return;
    }
    toast('Order failed: ' + msg, 'err');
  }
};

async function openOrderTrackPanel(orderId) {

  const { data: o } = await sb.from('orders').select('*').eq('id', orderId).single();

  _renderOrderTrack(o);
  // subscribe to live status
  const ch = sb.channel('order-' + orderId)
    .on('broadcast', { event: 'status' }, ({ payload }) => {
      if (payload.order_id === orderId) {
        sb.from('orders').select('*').eq('id', orderId).single().then(({ data }) => data && _renderOrderTrack(data));
      }
    });
  ch.subscribe();
  window._orderChannel && sb.removeChannel(window._orderChannel);
  window._orderChannel = ch;
}

function subscribeRealtime() {
  if (!sb) return;
  sb.channel('astranov-signals')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'signals' },
        p => p.new.status === 'active' && addSignalPoint(p.new))
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'signals' },
        p => updateSignalPoint(p.new))
    .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'signals' },
        p => removeSignalPoint(p.old.id))
    .subscribe();
  sb.channel('astranov-deliveries')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'deliveries' },
        p => { addDeliveryPin(p.new); loadDeliveryBadge(); })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'deliveries' },
        p => {
          if (p.new.status !== 'requested') removeDeliveryPin(p.new.id);
          loadDeliveryBadge();
          if ($('delivery-list')) loadDeliveryTab(_currentDeliveryTab || 'my-requests');
        })
    .subscribe();
  // Messages → badge update
  sb.channel('astranov-messages')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => {
      if (p.new.recipient_id === session?.user.id) {
        loadMessageBadge();
        if ($('msg-thread-container')) _appendIncomingBubble(p.new);
      }
    })
    .subscribe();
}

/* ==============================================================
   5. Pin click → open signal panel
   ============================================================== */
function onCanvasClick(click) {
  if (!viewer) return;
  const picked = viewer.scene.pick(click.position);
  if (picked?.primitive?.__cityId) {
    flyToCity(cityDotIndex.get(picked.primitive.__cityId)?.city);
    return;
  }
  if (picked?.primitive?.__signalId) {
    const entry = signalIndex.get(picked.primitive.__signalId);
    if (entry) openSignalPanel(entry.signal);
    return;
  }
  if (picked?.primitive?.__deliveryId) {
    const entry = deliveryIndex.get(picked.primitive.__deliveryId);
    if (entry) openDeliveryPanel(entry.delivery.id);
    return;
  }
  if (picked?.primitive?.__placeId) {
    const entry = placeIndex.get(picked.primitive.__placeId);
    if (entry) {
      // Act-first: vendor pin → straight to menu + order. The place panel is
      // briefly shown to set _currentPlace, then the order panel takes over.
      openPlacePanel(entry.place);
      setTimeout(() => { try { _placeOrder(); } catch (_) {} }, 180);
    }
    return;
  }
  // Empty globe tap → descend one navigation level toward the tapped point.
  const ray = viewer.camera.getPickRay(click.position);
  const ground = ray && viewer.scene.globe.pick(ray, viewer.scene);
  if (ground) {
    const carto = Cesium.Cartographic.fromCartesian(ground);
    const lat = Cesium.Math.toDegrees(carto.latitude);
    const lng = Cesium.Math.toDegrees(carto.longitude);
    const h = viewer.camera.positionCartographic.height;
    let target;
    if (h > LEVEL_THRESHOLDS.global)        target = 700_000;   // global → national
    else if (h > LEVEL_THRESHOLDS.national) target = 8_000;     // national → city
    else                                    target = 1_200;     // city → street
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(lng, lat, target),
      duration: 1.6,
      orientation: { heading: 0, pitch: Cesium.Math.toRadians(target < 10_000 ? -65 : -90), roll: 0 },
    });
    return;
  }
  closePanel();
}

    </div>

// Reddit comments DNA combined). Public read; authenticated insert.
async function _signalCommentsLoad(signalId) {
  const host = document.getElementById('sig-comments'); if (!host) return;
  try {
    const { data, error } = await sb
      .from('signal_comments')
      .select('id, body, created_at, profile_id, profiles(name, avatar_url)')
      .eq('signal_id', signalId)
      .eq('is_deleted', false)
      .order('created_at', { ascending: true })
      .limit(80);
    if (error) throw error;
    const list = data || [];
    host.innerHTML = list.length ? list.map(c => {
      const name = (c.profiles && c.profiles.name) || 'anon';
      return `<div style="padding:8px 10px;border-radius:10px;background:rgba(120,180,255,0.06);border:1px solid rgba(120,180,255,0.10)">
        <div style="font-size:11px;color:#a8c8ee;display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span style="font-weight:600">${escapeHtml(name)}</span>

        </div>
        <div style="font-size:13px;color:#dde9ff;line-height:1.45;white-space:pre-wrap;word-wrap:break-word">${escapeHtml(c.body)}</div>
      </div>`;
    }).join('') : '<div style="color:#6a8aaf;font-size:12px;padding:6px 0">No comments yet. Be first.</div>';

async function _acquireRadar() {
  let coords;
  try {
    coords = await getUserLocation();
  } catch (e) {
    const core = $('radar-core');
    if (core) core.classList.remove('acquiring');
    const coordEl = $('radar-coords');
    if (coordEl) coordEl.textContent = 'NO FIX';
    const sig = $('radar-signals');
    if (sig) sig.innerHTML = `<div class="gadget-engage armed" onclick="recalibrateRadar()" style="margin:12px auto;max-width:200px"><span class="verb-glyph"></span><span>Reacquire</span></div>`;
    return;
  }

  const core = $('radar-core');
  if (core) { core.classList.remove('acquiring'); core.classList.add('locked'); core.dataset.lat = coords.lat; core.dataset.lng = coords.lng; }
  const coordEl = $('radar-coords');
  if (coordEl) coordEl.textContent = `${coords.lat.toFixed(3)}° ${coords.lng > 0 ? '+' : ''}${coords.lng.toFixed(3)}°`;

  viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(coords.lng, coords.lat, 12_000), duration: 2.5 });

  const { data, error } = await sb.rpc('nearby_signals', { p_lat: coords.lat, p_lng: coords.lng, radius_meters: 50_000, max_results: 50 });
  if (error) {
    const sig = $('radar-signals');
    if (sig) sig.innerHTML = `<div style="color:#ff9e9e;font-size:12px;text-align:center;padding:8px">signal rpc: ${escapeHtml(error.message)}</div>`;
    return;
  }

  _renderRadarBlips(data || [], coords);
  _renderRadarSignalList(data || [], coords);

  // Populate globe with nearby real-world places from OpenStreetMap
  fetchOSMNearby(coords.lat, coords.lng, 5000);
}

function _renderRadarBlips(signals, myCoords) {
  const container = $('radar-blips');
  if (!container) return;
  container.innerHTML = '';
  const cx = 110, cy = 110, maxR = 82;
  signals.slice(0, 30).forEach(s => {
    if (!s.lat || !s.lng) return;
    const bearing = Math.atan2(s.lng - myCoords.lng, s.lat - myCoords.lat);
    const dist = Math.min((s.distance_meters || 0) / 50_000, 0.98);
    const blip = document.createElement('div');
    blip.className = 'radar-blip';
    blip.style.left = (cx + maxR * dist * Math.sin(bearing)) + 'px';
    blip.style.top  = (cy - maxR * dist * Math.cos(bearing)) + 'px';
    blip.style.background = RADAR_COLORS[s.category] || '#fff';
    blip.style.boxShadow = `0 0 6px ${RADAR_COLORS[s.category] || '#fff'}`;
    blip.title = s.title;
    blip.addEventListener('click', () => flyToSignal(s.id));
    container.appendChild(blip);
  });
}

async function getUserLocation() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) return reject(new Error('Geolocation API not available'));
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy }),
      err => reject(err),
      { timeout: 15_000, enableHighAccuracy: true, maximumAge: 60_000 }
    );
  });
}

async function reverseGeocode(lat, lng) {
  // Nominatim — free, no key, please respect rate limit (1 req/sec)
  const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}&zoom=10`;
  const r = await fetch(url, { headers: { 'Accept-Language': navigator.language || 'en' } });
  if (!r.ok) throw new Error('Nominatim ' + r.status);
  const data = await r.json();
  return {
    country_code: data.address?.country_code,
    country: data.address?.country,
    city: data.address?.city || data.address?.town || data.address?.village || data.address?.county,
    display_name: data.display_name,
  };
}

function formatDistance(m) {
  if (m == null) return '';
  if (m < 1000) return `${Math.round(m)} m`;
  if (m < 100_000) return `${(m / 1000).toFixed(1)} km`;
  return `${Math.round(m / 1000)} km`;
}

// balance. Wraps the admin_transfer_avc_to_eur RPC (which double-checks
// is_owner server-side, so even if a non-owner crafts this call directly
// the RPC refuses).
window._adminTransferAvcToEur = async function() {
  const status = document.getElementById('avc-transfer-status');
  const target = (document.getElementById('avc-target')?.value || '').trim();
  const amount = parseFloat(document.getElementById('avc-amount')?.value || '0');
  if (!target || !amount || amount <= 0) { if (status) status.textContent = 'target id + positive amount required'; return; }
  // Accept either a profile_id (uuid) or an email. Email path looks up profile_id.
  let targetId = target;
  if (target.includes('@')) {
    try {
      const { data } = await sb.from('profiles').select('id').eq('email', target).single();
      if (!data?.id) { if (status) status.textContent = 'no profile found for that email'; return; }
      targetId = data.id;
    } catch (_) { if (status) status.textContent = 'lookup failed'; return; }
  }
  try {

async function loadDeliveryTab(tab) {
  const target = $('delivery-list');
  if (!target || !sb) return;
  target.innerHTML = '<div style="color:#6a8aaf">Loading…</div>';

  let data = [], error = null;
  if (tab === 'orders') {
    const { data: oData, error: oErr } = await sb.from('orders')
      .select('id,short_id,vendor_id,items,calc,status,driver_name,driver_emoji,delivery_address,created_at')
      .eq('customer_id', session.user.id)
      .order('created_at', { ascending: false }).limit(40);
    if (oErr) { target.innerHTML = `<div style="color:#ff9e9e">${escapeHtml(oErr.message)}</div>`; return; }
    if (!oData || !oData.length) {
      target.innerHTML = '<div style="color:#6a8aaf;padding:12px 0;font-size:13px">No orders yet. Tap a vendor on the globe, then ORDER.</div>';
      return;
    }
    target.innerHTML = oData.map(o => `
      <div class="delivery-row" onclick="openOrderTrackPanel(${JSON.stringify(o.id)})">
        <div class="head">
          <span class="desc">${escapeHtml(o.short_id || 'ORDER')} · ${o.driver_emoji||''} ${escapeHtml(o.driver_name||'')}</span>
          <span class="reward">€${(o.calc&&o.calc.total)||0}</span>
        </div>
        <div class="meta">${escapeHtml(o.status.replace('_',' '))} · ${(o.items||[]).length} items · ${formatRelative(o.created_at)}</div>
      </div>`).join('');
    return;
  }
  if (tab === 'my-requests') {
    ({ data, error } = await sb.from('deliveries')
      .select('*').eq('requester_id', session.user.id)
      .order('created_at', { ascending: false }).limit(40));
  } else if (tab === 'my-runs') {
    ({ data, error } = await sb.from('deliveries')
      .select('*').eq('runner_id', session.user.id)
      .order('created_at', { ascending: false }).limit(40));
  } else if (tab === 'nearby') {
    let coords;
    try { coords = await getUserLocation(); }
    catch (e) {
      target.innerHTML = `<div style="color:#ff9e9e">Location needed: ${escapeHtml(e.message || 'denied')}</div>`;
      return;
    }
    ({ data, error } = await sb.rpc('nearby_deliveries', {
      lat: coords.lat, lng: coords.lng, radius_meters: 20_000, max_results: 50,
    }));
  } else if (tab === 'history') {
    const { data: txData, error: txErr } = await sb.rpc('my_avc_transactions', { max_results: 40 });
    if (txErr) { target.innerHTML = `<div style="color:#ff9e9e">${escapeHtml(txErr.message)}</div>`; return; }
    target.innerHTML = (txData || []).length ? (txData || []).map(t => `
      <div class="delivery-row">
        <div class="head">
          <span class="desc">${escapeHtml(t.note || t.kind.replace('_',' '))}</span>
          <span style="color:${t.amount>0?'#7eebb4':'#ff9e9e'};font-weight:500">${t.amount>0?'+':''}${Number(t.amount)} AVC</span>
        </div>
        <div class="meta">${t.kind.replace('_',' ')} · ${formatRelative(t.created_at)}</div>
      </div>`).join('')
      : '<div style="color:#6a8aaf;padding:12px 0;font-size:13px">No AVC transactions yet. Complete a delivery to earn.</div>';
    return;
  }

  if (error) {
    target.innerHTML = `<div style="color:#ff9e9e">${escapeHtml(error.message)}</div>`;
    return;
  }
  if (!data || data.length === 0) {
    target.innerHTML = `<div style="color:#6a8aaf;padding:12px 0">${tab === 'nearby' ? 'No open deliveries near you.' : 'Nothing here yet.'}</div>`;
    return;
  }

  target.innerHTML = data.map(d => renderDeliveryRow(d, tab)).join('');
}

function renderDeliveryRow(d, tab) {
  const dist = d.pickup_distance_meters != null ? formatDistance(d.pickup_distance_meters) : '';
  const trip = d.trip_distance_meters != null ? formatDistance(d.trip_distance_meters) : '';
  const status = d.status || (tab === 'nearby' ? 'requested' : '');
  return `
    <div class="delivery-row" onclick="openDeliveryPanel('${d.id}')">
      <div class="head">
        <span class="desc">${escapeHtml(d.description)}</span>
        <span class="reward">€${d.reward_avc ?? 0}</span>
      </div>
      <div class="meta">
        ${status ? `<span class="status status-${status}">${status.replace('_',' ')}</span>` : ''}
        ${dist ? `pickup ${dist} away · ` : ''}${trip ? `trip ${trip}` : ''}
        ${!dist && !trip ? formatRelative(d.created_at) : ''}
      </div>
    </div>
  `;
}

  const isRequester = d.requester_id === session.user.id;
  const isRunner    = d.runner_id === session.user.id;
  let actions = '';

  const did = JSON.stringify(d.id);
  if (d.status === 'requested') {
    if (isRequester) {
      actions = `<div class="gadget-engage" style="border-color:rgba(160,160,160,0.3)" onclick="armEngage(this,'Cancel request',()=>updateDeliveryStatus(${did},'cancelled'))"><span class="verb-glyph">✕</span><span>Cancel request</span></div>`;
    } else {
      actions = `<div class="gadget-engage" onclick="acceptDelivery(${did})"><span class="verb-glyph">◈</span><span>Accept delivery</span></div>`;

  const partnerLabel = isRequester ? 'runner' : 'requester';
  const callBtn = callTarget
    ? `<div class="gadget-engage" onclick="startCallTo(${callTarget_s},'${partnerLabel}')" style="margin-top:8px;border-color:rgba(120,180,255,0.35)"><span class="verb-glyph">◈</span><span>Call ${partnerLabel}</span></div>

    : '';

    <h2>Delivery</h2>
    <div class="subtitle"><span class="status status-${d.status}">${d.status.replace('_',' ')}</span></div>
    <div style="font-size:15px;margin:12px 0">${escapeHtml(d.description)}</div>
    <div class="row"><span>Reward</span><span style="color:#ffd47e">€${d.reward_avc}</span></div>
    <div class="row" onclick="flyToCoords(${d.pickup_lng},${d.pickup_lat})" style="cursor:pointer">
      <span>Pickup</span><span style="color:#7eb4ff">${escapeHtml(d.pickup_address || `${d.pickup_lat?.toFixed(3)}, ${d.pickup_lng?.toFixed(3)}`)} →</span>
    </div>
    <div class="row" onclick="flyToCoords(${d.dropoff_lng},${d.dropoff_lat})" style="cursor:pointer">
      <span>Dropoff</span><span style="color:#7eb4ff">${escapeHtml(d.dropoff_address || `${d.dropoff_lat?.toFixed(3)}, ${d.dropoff_lng?.toFixed(3)}`)} →</span>
    </div>
    ${d.notes ? `<div class="row"><span>Notes</span><span style="text-align:right;max-width:60%">${escapeHtml(d.notes)}</span></div>` : ''}
    <div class="row"><span>Posted</span><span>${formatRelative(d.created_at)}</span></div>

window.acceptDelivery = async (id) => {

    pushNotify(d.requester_id, {
      type:       'delivery',
      title:      'Runner accepted your delivery',

    });

window.updateDeliveryStatus = async (id, newStatus) => {
  const { error } = await sb.rpc('update_delivery_status', { delivery_id: id, new_status: newStatus });
  if (error) return toast(error.message, 'err');
  const terminal = newStatus === 'delivered' || newStatus === 'cancelled';
  if (terminal) { clearActiveDelivery(); try { await loadProfile(); } catch (_) {} }  // euro reward settled
  else {
    const { data: d } = await sb.from('deliveries').select('*').eq('id', id).single();
    if (d) saveActiveDelivery(d);
  }
  // Notify the other party
  const { data: d } = await sb.from('deliveries').select('*').eq('id', id).single();
  if (d) {
    const otherId = d.requester_id === session?.user.id ? d.runner_id : d.requester_id;
    const msgs = { in_transit: 'Runner has picked up your delivery', delivered: 'Your delivery has been completed', cancelled: 'A delivery was cancelled' };
    if (otherId && msgs[newStatus]) {
      pushNotify(otherId, {
        type:       'delivery',
        title:      msgs[newStatus],
        body:       d.description?.slice(0, 80) || '',
        tag:        'delivery-' + id,
        deliveryId: id,
      });
    }
  }
  openDeliveryPanel(id);
};

/* ==============================================================
   Delivery globe pins — yellow rings for open delivery requests.
   Visible at NATIONAL / PERSONAL zoom only.
   ============================================================== */
let deliveryPoints = null;
const deliveryIndex = new Map(); // id → { primitive, delivery }

function ensureDeliveryCollection() {
  if (!deliveryPoints && viewer) {
    deliveryPoints = viewer.scene.primitives.add(new Cesium.PointPrimitiveCollection());
  }
}

function addDeliveryPin(d) {
  if (!viewer) return;
  const lat = d.pickup_lat, lng = d.pickup_lng;
  if (lat == null || lng == null) return;
  ensureDeliveryCollection();
  if (deliveryIndex.has(d.id)) return;
  const prim = deliveryPoints.add({
    position: Cesium.Cartesian3.fromDegrees(Number(lng), Number(lat)),
    pixelSize: 14,
    color: Cesium.Color.fromCssColorString('#ffd47e').withAlpha(0.9),
    outlineColor: Cesium.Color.fromCssColorString('#ffaa00').withAlpha(0.7),
    outlineWidth: 3,
    scaleByDistance: new Cesium.NearFarScalar(1.5e3, 1.4, 8e6, 0.4),
    show: currentLevel !== 'global',
  });
  prim.__deliveryId = d.id;
  deliveryIndex.set(d.id, { primitive: prim, delivery: d });
  viewer.scene.requestRender();
}

function removeDeliveryPin(id) {
  const entry = deliveryIndex.get(id);
  if (!entry || !deliveryPoints) return;
  deliveryPoints.remove(entry.primitive);
  deliveryIndex.delete(id);
  if (viewer) viewer.scene.requestRender();
}

async function loadDeliveries() {
  if (!sb) return;
  const { data } = await sb.from('deliveries')
    .select('id,description,reward_avc,status,pickup_lat,pickup_lng,requester_id')
    .eq('status','requested')
    .not('pickup_lat','is',null)
    .limit(200);
  (data || []).forEach(addDeliveryPin);
}

window.flyToCoords = (lng, lat) => {

};

/* Two-step delivery request: aim camera → set pickup → aim → set dropoff */
let deliveryDraft = null;

window.openRequestDeliveryStep1 = () => {
  if (!session) return openYouPanel();
  deliveryDraft = { step: 'pickup' };
  openPanel(`
    <h2>Request delivery</h2>
    <div class="subtitle">Step 1 of 3 — pickup location</div>
    <p style="color:#a8c8ee;font-size:13px;line-height:1.5">
      Aim the camera at the <strong>pickup point</strong> on the globe.
      The center of your screen is what gets picked. When ready, tap below.
    </p>
    <div class="gadget-engage" onclick="captureDeliveryPoint('pickup')"><span class="verb-glyph">⊕</span><span>Set pickup here</span></div>
  `);
};

window.captureDeliveryPoint = (kind) => {
  if (!viewer || !deliveryDraft) return;
  const center = viewer.camera.pickEllipsoid(
    new Cesium.Cartesian2(window.innerWidth / 2, window.innerHeight / 2),
    viewer.scene.globe.ellipsoid
  );
  if (!center) return toast('Aim the camera at the ground first.');
  const carto = Cesium.Cartographic.fromCartesian(center);
  const lng = Cesium.Math.toDegrees(carto.longitude);
  const lat = Cesium.Math.toDegrees(carto.latitude);

  if (kind === 'pickup') {
    deliveryDraft.pickup = { lng, lat };
    deliveryDraft.step = 'dropoff';
    openPanel(`
      <h2>Request delivery</h2>
      <div class="subtitle">Step 2 of 3 — dropoff location</div>
      <p style="color:#a8c8ee;font-size:13px;line-height:1.5">
        Now aim at the <strong>dropoff point</strong>. Pickup is locked at <span style="color:#7eb4ff">${lat.toFixed(3)}, ${lng.toFixed(3)}</span>.
      </p>
      <div class="gadget-engage" onclick="captureDeliveryPoint('dropoff')"><span class="verb-glyph">⊕</span><span>Set dropoff here</span></div>
    `);
  } else if (kind === 'dropoff') {
    deliveryDraft.dropoff = { lng, lat };
    deliveryDraft.step = 'details';
    openPanel(`
      <h2>Request delivery</h2>
      <div class="subtitle">Step 3 of 3 — details</div>
      <input id="del-desc" type="text" placeholder="What needs delivering?" maxlength="500" />
      <textarea id="del-notes" placeholder="Notes (optional)" maxlength="500"></textarea>
      <input id="del-reward" type="number" min="0" step="1" placeholder="Reward in euros (€)" value="10" />
      <div class="subtitle" style="margin-top:4px;color:#7a98c0">The reward is held from your euro balance when you post, paid to the runner on delivery, refunded if cancelled.</div>
      <div class="subtitle" style="margin-top:8px">
        Pickup: ${deliveryDraft.pickup.lat.toFixed(3)}, ${deliveryDraft.pickup.lng.toFixed(3)} →
        Dropoff: ${deliveryDraft.dropoff.lat.toFixed(3)}, ${deliveryDraft.dropoff.lng.toFixed(3)}
      </div>
      <div class="gadget-engage armed" onclick="submitDelivery()"><span class="verb-glyph">⊛</span><span>Broadcast request</span></div>
    `);
  }
};

window.submitDelivery = async () => {
  if (!deliveryDraft?.pickup || !deliveryDraft?.dropoff) return;
  const desc = $('del-desc').value.trim();
  if (!desc) return toast('Description required');
  const reward = parseFloat($('del-reward').value || '0');
  const notes = $('del-notes').value.trim() || null;

  const { error } = await sb.from('deliveries').insert({
    requester_id: session.user.id,
    pickup_location:  `SRID=4326;POINT(${deliveryDraft.pickup.lng} ${deliveryDraft.pickup.lat})`,
    dropoff_location: `SRID=4326;POINT(${deliveryDraft.dropoff.lng} ${deliveryDraft.dropoff.lat})`,
    description: desc,
    reward_avc: reward,
    notes,
  });
  if (error) {
    const msg = String(error.message || error);
    if (msg.includes('insufficient_funds')) {
      toast('Not enough euros to escrow the reward — top up first', 'err');
      try { await loadProfile(); } catch (_) {}
      setTimeout(() => { try { openBuyAVC(); } catch (_) {} }, 400);
      return;
    }
    return toast(msg, 'err');
  }
  deliveryDraft = null;
  try { await loadProfile(); } catch (_) {}   // reward was escrowed
  toast('Delivery posted · €' + reward + ' held in escrow', 'ok');
  openWalletPanel();
};

window.flyToSignal = async (id) => {
  let entry = signalIndex.get(id);
  if (!entry && sb) {
    // Signal not on globe yet — fetch from DB
    const { data } = await sb.from('signals').select('*').eq('id', id).single();
    if (data && data.lat && data.lng) { addSignalPoint(data); entry = signalIndex.get(id); }
  }
  if (!entry) return;
  const { lng, lat } = entry.signal;
  if (viewer && lng != null && lat != null) {
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(Number(lng), Number(lat), 50000),
      duration: 2,
    });
  }
  closePanel();
  setTimeout(() => { if (entry) openSignalPanel(entry.signal); }, 300);
};

function _authEmail() { return ($('auth-email')?.value || '').trim(); }
function _authPass()  { return ($('auth-pass')?.value  || '').trim(); }

  const el = $('auth-status');

}

window.signInPassword = async () => {
  if (!sb) return;
  const email = _authEmail(), password = _authPass();
  if (!email) return;
  if (!password) return sendMagicLink();  // blank password → magic link
  _authStatus('Authenticating…');
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    _authStatus(error.message, '#ff9e9e');
  } else {
    _authStatus('Authenticated.', '#7eebb4');
    // Store credentials in browser password manager for future auto-login
    if (navigator.credentials?.store && window.PasswordCredential) {
      try { await navigator.credentials.store(new PasswordCredential({ id: email, password })); } catch (_) {}
    }
    closePanel();
  }
};

window.emitSignal = async () => {
  const title = $('emit-title')?.value.trim();
  if (!title) return;
  const center = viewer.camera.pickEllipsoid(
    new Cesium.Cartesian2(window.innerWidth / 2, window.innerHeight / 2),
    viewer.scene.globe.ellipsoid
  );
  if (!center) return toast('Aim the camera at the ground first.');
  const carto = Cesium.Cartographic.fromCartesian(center);
  const lng = Cesium.Math.toDegrees(carto.longitude);
  const lat = Cesium.Math.toDegrees(carto.latitude);

  const engage = $('emit-engage');
  if (engage) { engage.classList.add('armed'); engage.querySelector('span:last-child').textContent = 'Transmitting…'; }

  const { error } = await sb.from('signals').insert({
    author_id: session.user.id,
    category: emitState.category,
    scope: currentLevel === 'global' ? 'global' : (currentLevel === 'national' ? 'national' : 'local'),
    title,
    body: $('emit-body')?.value.trim() || null,
    amplitude: emitState.amplitude,
    location: `SRID=4326;POINT(${lng} ${lat})`,
    lat, lng,
  });
  if (error) {
    if (engage) engage.querySelector('span:last-child').textContent = error.message.slice(0, 40);
    return;
  }
  toast('Signal emitted — broadcasting to the globe', 'ok');
  closePanel();
};

  w.onmessage = (e) => {
    const m = e.data || {};
    if (m.type === 'tick') {
      window._anonState.cycles = m.cycles;
      const st = document.getElementById('anon-mine-stat');
      if (st) st.textContent = `${m.cycles.toLocaleString()} cycles · ${(m.duration_ms/1000).toFixed(0)}s · est. ${(m.cycles/5_000_000).toFixed(4)} AVC`;
      const now = Date.now();
      if (!window._anonState.lastPing || now - window._anonState.lastPing > 10_000) {
        window._anonState.lastPing = now;
        const anonId = (function() {
          let id = localStorage.getItem('astranov_anon_id');
          if (!id) { id = crypto.randomUUID(); localStorage.setItem('astranov_anon_id', id); }
          return id;
        })();
        sb.functions.invoke('contribute', { body: { mode: 'ping', cycles: m.cycles, duration_ms: m.duration_ms, anon_id: anonId } }).catch(() => {});
      }
    }
  };
  w.postMessage({ type: 'start', workUnit: wu });
  window._anonState.worker = w;
  window._anonState.mining = true;
  window._anonState.cycles = 0;
  window._anonState.started = Date.now();
  try { localStorage.setItem('astranov_mining_opt_in', '1'); } catch (_) {}
  _anonMineCardUpdate();
}

  if (!window._anonState.mining) return;

  try { window._anonState.worker && window._anonState.worker.terminate(); } catch (_) {}

}

window.openKrypteia = async (runSilently) => {
  if (!profile?.is_owner || !sb) {
    if (!runSilently) {
      openPanel(agentCard({ emoji: '⬡', name: 'Krypteia', role: 'Owner only', color: '#ff9e9e',
        body: '<div style="color:#6a8aaf;font-size:12px;padding:8px 0">This agent answers only to the architect.</div>' }));
    }
    return;
  }
  // CACHED-VERDICT FAST PATH (§22 Reality Law): if the silent boot has
  // a fresh verdict (< 5 min old) the foreground tap shows it instantly,
  // no 30-second re-scan. Owner can force a fresh run via Re-run inside
  // the dashboard. Also clear the alert glow now that the owner has
  // engaged with the orb.
  const cached = window._krypteiaState && window._krypteiaState.lastVerdict;
  const cachedFresh = cached && cached.at && (Date.now() - new Date(cached.at).valueOf() < 5 * 60_000);
  const orb = document.querySelector('.informant.krypteia');
  if (orb) orb.classList.remove('alert');
  if (!runSilently && cachedFresh) {
    _krypteiaShowDash(cached);
    return;
  }
  if (!runSilently) {
    openPanel(agentCard({
      emoji: '⬡', name: 'Krypteia', role: 'Guardian · running all checks',
      color: '#ffb464',
      status: 'Audit + Watchtower + Threat triage in parallel, Claude reviewing…',
      body: `<div style="color:#a8c8ee;font-size:12px;line-height:1.6">
        Krypteia is checking the live bundle for contamination, the
        public web for stolen fingerprints, and the threat log for
        open incidents — then Claude triages the lot. This takes
        roughly 30–60 seconds.
      </div>`,
      actions: [],
    }));
  }
  let v = null;
  try {
    const { data, error } = await sb.functions.invoke('krypteia', { body: { mode: 'scan' } });
    if (error) throw error;
    v = data;
  } catch (e) { v = { error: String(e) }; }
  if (!v || v.error) {
    if (!runSilently) {
      openPanel(agentCard({
        emoji: '⬡', name: 'Krypteia', role: 'Guardian',
        color: '#ff5a4a',
        status: 'Krypteia run failed',

  // Log everything to the owner-only AICYCLE log either way.
  try { console.info('[krypteia]', v.severity, v.summary); } catch (_) {}
  // Silent close path: no owner approval needed AND we weren't asked to
  // surface a panel — Krypteia did its job and is gone.
  if (v.silent_ok && !runSilently) {

    return;
  }
  if (v.silent_ok && runSilently) return; // truly silent boot path
  // SILENT-BOOT verdict with severity ≥ medium: don't pop a panel.
  // Instead the Krypteia orb GLOWS in alert mode and SPEAKS a one-line
  // verdict via Astranov's voice. The owner taps the orb to drill in;
  // _krypteiaState.lastVerdict is cached so the tap shows this exact
  // verdict without re-running the scan.
  if (runSilently) {
    window._krypteiaState.lastVerdict = v;
    _krypteiaOrbAlert(v);
    return;
  }
  // Foreground call (owner tapped the orb): full multimedia dashboard.
  _krypteiaShowDash(v);
};

// ── VOLUME SLIDER — same shape as the brightness slider ────────────────
// Controls SpeechSynthesisUtterance.volume on the Astranov voice path.
window._astranovVolume = parseFloat(localStorage.getItem('astranov_voice_volume') || '1') || 1.0;
function _applyVolume(v) {
  v = Math.max(0, Math.min(1, v));
  window._astranovVolume = v;
  try { localStorage.setItem('astranov_voice_volume', String(v)); } catch (_) {}
  // Cancel current playback so the change is audible immediately.
  try { if (window.speechSynthesis && speechSynthesis.speaking) speechSynthesis.cancel(); } catch (_) {}
  // Re-tune the ambient hum if it's running.
  try { _ambientApplyGain(); } catch (_) {}
}
(function wireVolume() {
  const s = document.getElementById('vol-slider'); if (!s) return setTimeout(wireVolume, 100);
  s.value = String(window._astranovVolume);
  s.addEventListener('input', e => _applyVolume(parseFloat(e.target.value)));
})();

// ── AMBIENT VACUUM HUM + AGENT PING ─────────────────────────────────────
// Procedural Web Audio. Two layers:
//   • A continuous low cosmic-vacuum drone — three slightly detuned sines
//     with a slow LFO opening a low-pass filter. Master gain stays at
//     ~12% of the user's voice volume so it never competes with speech.
//   • A short, non-annoying agent-notification PING — bell-like decay,
//     two stacked sine partials, fires when a new event lands.
// Both honour window._astranovVolume. Setting the volume slider to 0
// mutes the whole audio layer.
window._ambient = { ctx: null, gain: null, started: false, muted: false };
function _ambientCtx() {
  if (window._ambient.ctx) return window._ambient.ctx;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    window._ambient.ctx = ctx;
    return ctx;
  } catch (_) { return null; }
}
function _ambientApplyGain() {
  const a = window._ambient;
  if (!a.gain || !a.ctx) return;
  const target = a.muted ? 0 : (window._astranovVolume * 0.12); // very quiet
  const now = a.ctx.currentTime;
  // A linearRampToValueAtTime with no preceding setValueAtTime is a
  // silent no-op on Firefox / Safari. Anchor the curve at the current
  // value first, then ramp. This is what was killing the hum.
  try {
    a.gain.gain.cancelScheduledValues(now);
    a.gain.gain.setValueAtTime(a.gain.gain.value, now);
    a.gain.gain.linearRampToValueAtTime(target, now + 0.4);
  } catch (_) {
    a.gain.gain.value = target;
  }
}
function _ambientStart() {
  if (window._ambient.started) return;
  const ctx = _ambientCtx(); if (!ctx) return;
  // Browser autoplay rules: a fresh AudioContext starts suspended; resume
  // is allowed inside a user-gesture handler.
  if (ctx.state === 'suspended') { try { ctx.resume(); } catch (_) {} }
  const master = ctx.createGain(); master.gain.value = 0;
  master.connect(ctx.destination);
  // Low-pass filter swept by a slow LFO — gives the drone subtle motion
  // so it doesn't sit perfectly flat (which is what makes drones annoying).
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass'; filter.frequency.value = 320; filter.Q.value = 0.7;
  filter.connect(master);
  const lfo = ctx.createOscillator(); lfo.frequency.value = 0.07;
  const lfoGain = ctx.createGain(); lfoGain.gain.value = 80;
  lfo.connect(lfoGain); lfoGain.connect(filter.frequency); lfo.start();
  // Three sines: fundamental + a fifth + a low octave. Slight detune for chorus.
  const partials = [
    { freq: 55,  detune:  -6 },
    { freq: 82.5, detune:  +4 },
    { freq: 110, detune:  -2 },
  ];
  for (const p of partials) {
    const o = ctx.createOscillator();
    o.type = 'sine'; o.frequency.value = p.freq; o.detune.value = p.detune;
    const g = ctx.createGain(); g.gain.value = 0.45;
    o.connect(g); g.connect(filter); o.start();
  }
  window._ambient.gain = master;
  window._ambient.started = true;
  _ambientApplyGain();
}
// One-shot, soft, bell-like ping. Two stacked partials, exp decay.
// Used by agent notifications, never longer than 700 ms.
function _pingAgent(opts) {
  const ctx = _ambientCtx(); if (!ctx) return;
  if (ctx.state === 'suspended') { try { ctx.resume(); } catch (_) {} }
  const now = ctx.currentTime;
  const baseVol = Math.max(0, Math.min(1, (window._astranovVolume || 1) * 0.25));
  if (baseVol <= 0) return;
  const out = ctx.createGain(); out.gain.value = 0; out.connect(ctx.destination);
  const f0 = (opts && opts.tone === 'urgent') ? 980 : (opts && opts.tone === 'soft') ? 660 : 880;
  for (const [f, vol, dur] of [[f0, baseVol, 0.55], [f0 * 1.5, baseVol * 0.5, 0.45]]) {
    const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(vol, now + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    o.connect(g); g.connect(out); o.start(now); o.stop(now + dur + 0.05);
  }
  out.gain.value = 1;
}
window._pingAgent = _pingAgent;
window._ambientToggleMute = function() {
  window._ambient.muted = !window._ambient.muted;
  _ambientApplyGain();
  return window._ambient.muted;
};
// Start the hum on the FIRST user gesture (autoplay policy compliance).
// One-time listener, removes itself after the ctx resumes.
(function _ambientAutoStart() {
  const kick = () => {
    _ambientStart();
    window.removeEventListener('pointerdown', kick, true);
    window.removeEventListener('keydown', kick, true);
    window.removeEventListener('touchstart', kick, true);
  };
  window.addEventListener('pointerdown', kick, true);
  window.addEventListener('keydown', kick, true);
  window.addEventListener('touchstart', kick, true);
})();
// Also drop master gain to 0 when the tab is hidden, restore on return.
document.addEventListener('visibilitychange', () => {
  const a = window._ambient;
  if (!a || !a.gain || !a.ctx) return;
  if (document.hidden) a.gain.gain.linearRampToValueAtTime(0, a.ctx.currentTime + 0.2);
  else _ambientApplyGain();
});

// DEPTH SLIDER — moves the focal plane through the orb cloud. The
// projection loop reads window._focalAlt every frame and applies depth-
// of-field blur + opacity + scale falloff per orb. Persists across
// reloads. Shift+wheel also nudges focal in steps of 50 km.
// DEPTH (§5j v2) — no slider, no readout. Driven by tap-on-sky gestures
// installed by _wireDepthGesture (called from the viewer init).
function _applyDepth(v) {
  v = Math.max(600_000, Math.min(2_400_000, Number(v) || _ORB_ALT));
  window._focalAlt = v;
  try { localStorage.setItem('astranov_focal_alt', String(v)); } catch (_) {}
}
// Restore on boot.
(function() {
  try {
    const stored = parseFloat(localStorage.getItem('astranov_focal_alt') || '0');
    if (stored) window._focalAlt = stored;
  } catch (_) {}
})();
// TAP / LONG-PRESS depth gesture on the Cesium canvas.
//   • tap in the sky (no Earth hit) at GLOBAL tier  →  focal -200 km
//   • long-press in the sky at GLOBAL tier          →  focal +200 km / 300 ms while held
//   • taps that hit the Earth disc are routed normally (onCanvasClick handles tier descent)
function _wireDepthGesture(canvas) {
  if (!canvas || canvas.__depthWired) return;
  canvas.__depthWired = true;
  let downAt = 0, downX = 0, downY = 0, holdTimer = null, holding = false;
  let stepInterval = null;
  function isSkyAtPoint(px, py) {
    if (typeof currentLevel !== 'undefined' && currentLevel !== 'global') return false;
    if (!viewer || !viewer.scene || !viewer.scene.globe) return false;
    try {
      const ray = viewer.camera.getPickRay(new Cesium.Cartesian2(px, py));
      const ground = ray && viewer.scene.globe.pick(ray, viewer.scene);
      return !ground; // no Earth hit = sky
    } catch (_) { return false; }
  }
  function startHoldShallow() {
    if (holding) return;
    holding = true;
    // Immediate step + then every 300 ms while held.
    _applyDepth((window._focalAlt || _ORB_ALT) + 200_000);
    stepInterval = setInterval(() => {
      _applyDepth((window._focalAlt || _ORB_ALT) + 200_000);
    }, 300);
  }
  function endHold() {
    if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
    if (stepInterval) { clearInterval(stepInterval); stepInterval = null; }
    holding = false;
  }
  canvas.addEventListener('pointerdown', (e) => {
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    downAt = performance.now();
    downX = e.clientX; downY = e.clientY;
    if (isSkyAtPoint(downX, downY)) {
      holdTimer = setTimeout(() => {
        if (Math.hypot(downX - e.clientX, downY - e.clientY) < 16) startHoldShallow();
      }, 350);
    }
  });
  canvas.addEventListener('pointermove', (e) => {
    if (holdTimer && Math.hypot(e.clientX - downX, e.clientY - downY) > 12) endHold();
  });
  canvas.addEventListener('pointerup', (e) => {
    const heldMs = performance.now() - downAt;
    const moved = Math.hypot(e.clientX - downX, e.clientY - downY);
    const wasHolding = holding;
    endHold();
    if (wasHolding) return; // hold already advanced focal; do nothing on release
    if (heldMs < 250 && moved < 12 && isSkyAtPoint(e.clientX, e.clientY)) {
      // Quick sky-tap: nudge focal DEEPER (toward Earth) by one step.
      _applyDepth((window._focalAlt || _ORB_ALT) - 200_000);
    }
  });
  canvas.addEventListener('pointercancel', endHold);
  canvas.addEventListener('pointerleave', endHold);
}

// Drag handle — resize panel between input-bar height and 60vh ceiling
(function() {
  const handle = $('aicycle-drag-handle');
  if (!handle) return;
  let startY = 0, startH = 0;
  handle.addEventListener('pointerdown', e => {
    e.preventDefault();
    handle.setPointerCapture(e.pointerId);
    startY = e.clientY;
    startH = aicycleChat.getBoundingClientRect().height;
    aicycleChat.classList.add('resizing');
  });
  handle.addEventListener('pointermove', e => {
    if (!handle.hasPointerCapture(e.pointerId)) return;
    const delta = startY - e.clientY;
    const minH = 60;
    const maxH = Math.round(window.innerHeight * 0.6);
    const newH = Math.max(minH, Math.min(maxH, startH + delta));
    aicycleChat.style.height = newH + 'px';
    aicycleChat.style.maxHeight = newH + 'px';
  });
  handle.addEventListener('pointerup', e => {
    handle.releasePointerCapture(e.pointerId);
    aicycleChat.classList.remove('resizing');
    // Snap closed if dragged below threshold
    if (aicycleChat.getBoundingClientRect().height < 80) {
      aicycleChat.classList.remove('visible');
      aicycleChat.style.height = '';
      aicycleChat.style.maxHeight = '';
    }
  });
  handle.addEventListener('pointercancel', e => {
    handle.releasePointerCapture(e.pointerId);
    aicycleChat.classList.remove('resizing');
  });
})();

/* ==============================================================
   ASTRANOV AS AGENT (§14b) — the brain with hands. Every chat turn
   runs a tool-use loop: the model decides one action, the app
   executes it, the observation feeds back, until the task is done.
   This is the Prime Law made real — Astranov DOES the thing
   (find a shop, route there, order, deliver) instead of listing
   options. Pure conversation simply returns action:null, done:true.
   ============================================================== */
const _AGENT = { places: [] };

function _haversineM(aLat, aLng, bLat, bLng) {
  const R = 6371000, toR = Math.PI / 180;
  const dLat = (bLat - aLat) * toR, dLng = (bLng - aLng) * toR;
  const s = Math.sin(dLat / 2) ** 2 + Math.cos(aLat * toR) * Math.cos(bLat * toR) * Math.sin(dLng / 2) ** 2;
  return Math.round(2 * R * Math.asin(Math.sqrt(s)));
}

function _parseAgentJSON(s) {
  if (!s) return null;
  const i = s.indexOf('{'), j = s.lastIndexOf('}');
  if (i < 0 || j <= i) return null;
  const slice = s.slice(i, j + 1);
  try { return JSON.parse(slice); } catch (_) {}
  // Strip code fences / trailing commas as a last resort.
  try { return JSON.parse(slice.replace(/```/g, '').replace(/,\s*([}\]])/g, '$1')); } catch (_) { return null; }
}

async function _agentEnsureLocation() {
  if (window._userLat != null && window._userLng != null) return true;
  try {
    const c = await getUserLocation();
    window._userLat = c.lat; window._userLng = c.lng; setUserLocation(c.lat, c.lng);
    try { setUserBeacon(c.lat, c.lng); } catch (_) {}
    return true;
  } catch (_) { return false; }
}

async function _agentFindPlaces(query, radiusM) {
  if (window._userLat == null) return [];
  const lat = window._userLat, lng = window._userLng;
  const r = Math.min(Math.max(Number(radiusM) || 4000, 300), 15000);
  const q = '[out:json][timeout:25];('
    + 'node["name"]["amenity"](around:' + r + ',' + lat + ',' + lng + ');'
    + 'node["name"]["shop"](around:' + r + ',' + lat + ',' + lng + ');'
    + 'node["name"]["tourism"](around:' + r + ',' + lat + ',' + lng + ');'
    + ');out 400;';
  const json = await _overpassFetch(q);
  const els = (json && json.elements) || [];
  const kw = String(query || '').toLowerCase().trim();
  const scored = els.map(e => {
    const t = e.tags || {};
    const hay = [t.name, t.amenity, t.shop, t.tourism, t.cuisine, t['addr:street']].filter(Boolean).join(' ').toLowerCase();
    const match = !kw || kw.split(/\s+/).some(w => w && hay.includes(w));
    const dist = _haversineM(lat, lng, Number(e.lat), Number(e.lon));
    const catKey = _catKey(t);
    return { match, dist, raw: e, name: t.name, category: (_CAT_INFO[catKey] || _CAT_INFO.default).label,
             addr: [t['addr:housenumber'], t['addr:street']].filter(Boolean).join(' '),
             lat: Number(e.lat), lng: Number(e.lon) };
  }).filter(x => x.match && x.name).sort((a, b) => a.dist - b.dist).slice(0, 8);
  return scored;
}

async function _agentOrder(place, items, notes) {
  if (!session) return { ok: false, error: 'user must sign in to order' };
  const t = (place.raw && place.raw.tags) || {};
  const catKey = _catKey(t);
  const info = _CAT_INFO[catKey] || _CAT_INFO.default;
  window._currentPlace = { id: place.raw.id, tags: t, name: place.name, catKey, info, _lat: place.lat, _lng: place.lng };
  const vendor_id = _osmIdFor(window._currentPlace);
  // Compose the menu so we can price the requested items.
  let menuItems = [];
  try {
    const { data } = await sb.functions.invoke('vendor-menu', { body: { vendor_id, vendor: { name: place.name, category: catKey, tags: t } } });
    menuItems = (data && data.items) || [];
  } catch (_) {}
  const cart = (items || []).map(it => {
    const want = String(it.name || '').toLowerCase();
    const m = menuItems.find(x => x.name.toLowerCase().includes(want) || (want && want.includes(x.name.toLowerCase())));
    return { name: m ? m.name : (it.name || 'Item'), qty: Math.max(1, Number(it.qty) || 1), price: m ? m.price : 5 };
  }).filter(c => c.name);
  if (!cart.length) return { ok: false, error: 'no items to order' };
  const subtotal = cart.reduce((s, it) => s + it.qty * it.price, 0);
  const delivery_fee = 3, platform_fee = Math.max(1, Math.round(subtotal * 0.05));
  const total = subtotal + delivery_fee + platform_fee;
  const vendor_payload = {
    osm_id: place.raw.id, name: place.name, emoji: info.emoji, category: catKey,
    lat: place.lat, lng: place.lng,
    address: { street: t['addr:street'], city: t['addr:city'], housenumber: t['addr:housenumber'] }, tags: t,
  };
  try {
    const { data, error } = await sb.functions.invoke('order-intake', { body: {
      vendor_id, vendor: vendor_payload, items: cart,
      calc: { subtotal, delivery_fee, platform_fee, total, currency: 'EUR' },
      delivery_lat: window._userLat ?? null, delivery_lng: window._userLng ?? null,
      delivery_address: window._orderAddress || 'My current location', notes: notes || '',
    } });
    if (error) {
      const msg = String(error.message || error);
      if (msg.includes('insufficient_funds') || msg.includes('402')) return { ok: false, error: 'insufficient_funds', total };
      return { ok: false, error: msg };
    }
    if (!data?.ok) return { ok: false, error: data?.error || 'order failed', total };
    try { await loadProfile(); } catch (_) {}
    setTimeout(() => { try { openOrderTrackPanel(data.order.id); } catch (_) {} }, 250);
    return { ok: true, order: data.order.short_id, total, items: cart };
  } catch (e) { return { ok: false, error: String(e.message || e) }; }
}

async function _agentExec(act) {
  const tool = act && act.tool;
  const a = (act && act.args) || {};
  try {
    if (tool === 'locate') {
      const ok = await _agentEnsureLocation();
      if (!ok) return { ok: false, error: 'location permission denied' };
      if (viewer) viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(window._userLng, window._userLat, 400),
        duration: 2.2, orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 } });
      return { ok: true, lat: window._userLat, lng: window._userLng };
    }
    if (tool === 'find_places') {
      if (!(await _agentEnsureLocation())) return { ok: false, error: 'need location first' };
      const list = await _agentFindPlaces(a.query || '', a.radius_m);
      _AGENT.places = list;
      return { ok: true, count: list.length,
        places: list.map((p, i) => ({ index: i, name: p.name, category: p.category, addr: p.addr, dist_m: p.dist })) };
    }
    if (tool === 'show_place') {
      const p = _AGENT.places[a.index]; if (!p) return { ok: false, error: 'no such place index' };
      openPlacePanel(p.raw);
      return { ok: true, name: p.name };
    }
    if (tool === 'navigate') {
      let lat = a.lat, lng = a.lng, label = a.label;
      if (a.index != null && _AGENT.places[a.index]) { const p = _AGENT.places[a.index]; lat = p.lat; lng = p.lng; label = p.name; }
      if (lat == null || lng == null) return { ok: false, error: 'no destination' };
      await astranovNavigate(lat, lng, label || 'destination');
      return { ok: true };
    }
    if (tool === 'order') {
      const p = _AGENT.places[a.index]; if (!p) return { ok: false, error: 'no such place index' };
      return await _agentOrder(p, a.items || [], a.notes || '');
    }
    return { ok: false, error: 'unknown tool: ' + tool };
  } catch (e) { return { ok: false, error: String(e.message || e) }; }
}

async function runAstranovAgent(userText) {
  if (!sb) { appendAICycleMessage('ai', '(offline)', 'offline', 'fallback'); return; }
  const stateBits = [
    'user_location=' + (window._userLat != null ? window._userLat.toFixed(5) + ',' + window._userLng.toFixed(5) : 'unknown'),
    'signed_in=' + (!!session),
  ].join('; ');
  const convo = [{ role: 'user', content: userText + '\n\n[' + stateBits + ']' }];
  $('aicycle-float').classList.add('thinking'); window._gfxThinking = true;
  try {
    for (let step = 0; step < 6; step++) {
      const prompt = convo[convo.length - 1].content;
      const history = convo.slice(0, -1);
      const { data, error } = await sb.functions.invoke('aicycle', {
        body: { agent: true, prompt, history, mode: window._astranovMode || '', engine: window._aiEngine || 'astranov' },
      });
      if (error) throw error;
      try { _setEngineIndicator(data.engine); } catch (_) {}
      const parsed = _parseAgentJSON(data.response);
      if (!parsed) {            // model spoke plainly — treat as final answer
        appendAICycleMessage('ai', data.response, 'astranov', '');
        speakAstranov(data.response);
        break;
      }
      if (parsed.say) { appendAICycleMessage('ai', parsed.say, 'astranov', ''); speakAstranov(parsed.say); }
      convo.push({ role: 'assistant', content: JSON.stringify(parsed) });
      const act = parsed.action;
      if (!act || parsed.done) break;
      const obs = await _agentExec(act);
      convo.push({ role: 'user', content: 'OBSERVATION (tool=' + act.tool + '): ' + JSON.stringify(obs).slice(0, 1600) });
    }
  } catch (e) {
    appendAICycleMessage('ai', '(Astranov could not complete that: ' + (e.message || e) + ')', 'offline', 'fallback');
  } finally {
    $('aicycle-float').classList.remove('thinking'); window._gfxThinking = false;
  }
}
