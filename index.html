<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>AstranoV — The Global Operating System</title>
<meta name="theme-color" content="#020a1c" />
<link rel="manifest" href="/manifest.json" />
<link rel="icon" href="/icon-192.png" />
<link rel="apple-touch-icon" href="/icon-180.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap&subset=greek,greek-ext,latin,latin-ext" />

<link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Widgets/widgets.css" />
<script src="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Cesium.js"></script>
<!-- supabase-js — self-hosted first, jsdelivr fallback. No CDN dependency in brain path. -->
<script src="/vendor/supabase.min.js"
        onerror="document.write('<script src=&quot;https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js&quot;><\/script>')"></script>

<style>
  /* SELENE palette (LAW §29) — moon-silver on cosmic black, aegean for
     action, gold for wealth, deep red for emergency, bone for ancient. */
  :root {
    --t-quick: 0.18s; --ease: cubic-bezier(0.32, 0.72, 0, 1);
    --cosmic:  #02060d;
    --astral:  #0a1334;
    --selene:  #cde3ff;
    --aegean:  #4aa6ff;
    --electric:#1e6cff;
    --gold:    #ffd47e;
    --amber:   #ffaa33;
    --emerald: #7eebb4;
    --violet:  #a98cff;
    --crimson: #d96e6e;
    --bone:    #f4ead8;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--cosmic); overflow: hidden;
    color: var(--selene); -webkit-font-smoothing: antialiased;
    font-family: 'Inter', system-ui, sans-serif;
    font-feature-settings: "ss01","cv11"; }
  body { position: fixed; inset: 0; }
  button, input, textarea, select { font-family: inherit; }
  .num, .price, .mi-price, .wallet-balance, .row span:last-child { font-variant-numeric: tabular-nums; }

  #cesiumContainer { position: absolute; inset: 0; }
  .cesium-widget-credits, .cesium-viewer-bottom { display: none !important; }

  /* WORDMARK — Selene breathing glow */
  #app-name { position: fixed; top: max(10px, env(safe-area-inset-top)); left: 50%;
    transform: translateX(-50%); z-index: 200; cursor: pointer;
    font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 22px;
    letter-spacing: 0.36em; text-indent: 0.36em;
    color: #ffffff; user-select: none;
    animation: wordmark-breathe 4.2s ease-in-out infinite;
    transition: transform var(--t-quick) var(--ease); }
  @keyframes wordmark-breathe {
    0%, 100% { text-shadow: 0 0 4px #fff, 0 0 10px var(--aegean), 0 0 22px var(--electric), 0 0 40px #0040d8, 0 0 70px #001a66; }
    50%      { text-shadow: 0 0 5px #fff, 0 0 14px var(--aegean), 0 0 30px var(--electric), 0 0 56px #0040d8, 0 0 96px #001a66; }
  }
  body.brain-thinking #app-name { animation-duration: 1.8s; }
  #app-name:active { transform: translateX(-50%) scale(0.96); }

  /* ALIVE pill — pulse-count of online nodes (you + fleet peers).
     Sits below the wordmark, taps open the fleet panel. The empty
     globe gets a heartbeat. Hidden until at least the local fleet
     announces (avoids a hard "1" before init). */
  #alive-pill { position: fixed; top: calc(max(10px, env(safe-area-inset-top)) + 40px);
    left: 50%; transform: translateX(-50%); z-index: 199;
    display: none; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 999px;
    background: rgba(126,235,180,0.08);
    border: 1px solid rgba(126,235,180,0.35);
    color: var(--bone); cursor: pointer; user-select: none;
    font-family: 'Quicksand', sans-serif; font-weight: 700;
    font-size: 10.5px; letter-spacing: 0.22em;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    transition: transform var(--t-quick) var(--ease), opacity var(--t-quick) var(--ease); }
  #alive-pill.on { display: inline-flex; }
  #alive-pill:active { transform: translateX(-50%) scale(0.94); }
  #alive-pill .dot { width: 6px; height: 6px; border-radius: 50%;
    background: var(--emerald); box-shadow: 0 0 8px var(--emerald);
    animation: pulse 1.8s ease-in-out infinite; }
  #alive-pill .n { font-variant-numeric: tabular-nums; color: var(--selene); }

  /* BOOT */
  #boot { position: fixed; inset: 0; z-index: 100;
    background: radial-gradient(ellipse at 50% 45%, #04122e 0%, #020a1c 55%, #010615 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.6s ease; }
  #boot.gone { opacity: 0; pointer-events: none; display: none !important; }
  #boot .loader { width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid rgba(74,166,255,0.18); border-top-color: #4aa6ff;
    box-shadow: 0 0 14px rgba(74,166,255,0.45);
    animation: spin 0.95s linear infinite; margin-bottom: 22px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #boot .name { font-weight: 700; font-size: 21px; letter-spacing: 0.34em; text-indent: 0.34em;
    color: #cde7ff; text-shadow: 0 0 4px #fff, 0 0 10px #4aa6ff, 0 0 22px #1e6cff, 0 0 40px #0040d8; }

  /* CHAT */
  #chat { position: fixed; left: 0; right: 0; bottom: 0; z-index: 60;
    max-height: 60vh; display: flex; flex-direction: column;
    background: linear-gradient(180deg, rgba(10,19,52,0.55), rgba(2,6,13,0.78));
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-top: 1px solid rgba(74,166,255,0.45); border-radius: 28px 28px 0 0;
    box-shadow: 0 -10px 36px rgba(45,108,196,0.22), inset 0 1px 0 rgba(207,226,255,0.22);
    transform: translateY(100%); transition: transform 0.4s var(--ease); overflow: hidden; }
  /* Constitutional gold→aegean hairline along the drawer's top edge */
  #chat::before { content: ''; position: absolute; top: -1px; left: 12%; right: 12%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold) 30%, var(--aegean) 70%, transparent);
    opacity: 0.55; pointer-events: none; }
  #chat.open { transform: translateY(0); }
  #chat-handle { padding: 8px 14px; display: flex; align-items: center; justify-content: center;
    gap: 10px; cursor: grab; user-select: none; position: relative; touch-action: none; }
  #chat-handle::before { content: ''; width: 36px; height: 4px; border-radius: 2px;
    background: rgba(120,180,255,0.35); }
  #chat-msgs { flex: 1; min-height: 0; overflow-y: auto; padding: 4px 16px 8px;
    -webkit-overflow-scrolling: touch; }
  #chat-msgs:empty { display: none; }
  .msg { margin-bottom: 10px; padding: 9px 13px; border-radius: 14px;
    max-width: 85%; font-size: 14px; line-height: 1.4; word-wrap: break-word;
    white-space: pre-line; }
  .msg.ai   { background: rgba(255,255,255,0.04); }
  .msg.user { background: rgba(120,180,255,0.12); margin-left: auto; }
  .msg.thinking-stub { color: rgba(168,200,238,0.65); animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
  @keyframes selene-pulse { 0%,100%{transform: scale(1)} 50%{transform: scale(1.05)} }
  .msg-meta { margin-top: 6px; font-size: 10px; letter-spacing: 0.10em;
    color: rgba(120,180,255,0.55); text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 6px; }
  /* The brain badge — constellation of provider · model · latency */
  .msg-meta .dot { width: 7px; height: 7px; border-radius: 50%;
    background: var(--aegean); box-shadow: 0 0 6px var(--aegean); display: inline-block; }
  .msg-meta .dot.groq      { background: #ffaa33; box-shadow: 0 0 6px #ffaa33; }
  .msg-meta .dot.anthropic { background: #d96e6e; box-shadow: 0 0 6px #d96e6e; }
  .msg-meta .dot.openrouter{ background: #a98cff; box-shadow: 0 0 6px #a98cff; }
  .msg-meta .dot.gemini    { background: #7eebb4; box-shadow: 0 0 6px #7eebb4; }
  .msg-meta .dot.astranov  { background: var(--gold);    box-shadow: 0 0 6px var(--gold); }
  .msg-meta .dot.deepseek  { background: #ffd47e; box-shadow: 0 0 6px #ffd47e; }
  .msg-meta .dot.mistral   { background: #ff7878; box-shadow: 0 0 6px #ff7878; }
  .msg-meta .dot.perplexity{ background: #4aa6ff; box-shadow: 0 0 6px #4aa6ff; }
  .msg-meta .meter { display: inline-block; width: 2px; height: 10px; margin-left: 2px;
    background: linear-gradient(to top, var(--emerald), var(--gold), var(--crimson));
    border-radius: 1px; opacity: 0.6; }
  .msg-meta .model { color: rgba(207,226,255,0.85); }
  .msg-meta .lat   { color: rgba(168,200,238,0.65); }
  #chat-form { display: flex; gap: 10px; padding: 10px 14px calc(12px + env(safe-area-inset-bottom));
    align-items: center; }
  #chat-input { flex: 1; min-width: 0; padding: 10px 14px; font-size: 16px;
    background: rgba(8,18,38,0.55); border: 1px solid rgba(93,178,255,0.40);
    border-radius: 22px; color: #e8eef8; outline: none; }
  #chat-input:focus { border-color: rgba(93,178,255,0.85); box-shadow: 0 0 12px rgba(45,108,196,0.4); }

  .btn { width: 44px; height: 44px; border-radius: 50%; cursor: pointer; flex: 0 0 auto;
    background: rgba(8,18,38,0.55); border: 1px solid rgba(93,178,255,0.5);
    color: #cde7ff; font-size: 16px; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent; transition: transform 0.12s var(--ease); padding: 0; }
  .btn:active { transform: scale(0.92); }
  .btn.primary { background: rgba(20,52,120,0.75); border-color: rgba(93,178,255,0.9);
    box-shadow: 0 0 12px rgba(45,108,196,0.55); }
  .btn.danger { background: rgba(120,30,30,0.75); border-color: rgba(255,80,80,0.9); color: #ffd6d6; }

  #chat-reopen { position: fixed; left: 50%; transform: translateX(-50%);
    bottom: calc(var(--orb-bottom, 12px) + env(safe-area-inset-bottom)); z-index: 200;
    width: 64px; height: 22px; cursor: pointer;
    background: radial-gradient(circle at 50% 50%, rgba(74,166,255,0.35) 0%, rgba(30,108,255,0.18) 45%, rgba(0,26,102,0) 70%);
    border-radius: 12px 12px 0 0; border-top: 1px solid rgba(74,166,255,0.55);
    display: flex; align-items: flex-end; justify-content: center; padding-bottom: 3px;
    transition: bottom 0.32s var(--ease), opacity 0.25s var(--ease); }
  #chat-reopen::after { content: '◈'; color: #cde7ff; font-size: 13px;
    text-shadow: 0 0 6px #4aa6ff, 0 0 14px #1e6cff; }
  body.chat-open #chat-reopen, body.panel-open #chat-reopen { opacity: 0; pointer-events: none; }

  /* LOGIN ORB */
  #login-orb { position: fixed; right: 16px; top: calc(58px + env(safe-area-inset-top));
    z-index: 250; width: 54px; height: 54px; border-radius: 50%;
    cursor: grab; display: none; touch-action: none;
    background: radial-gradient(circle at 50% 50%, rgba(74,166,255,0.85) 0%, rgba(30,108,255,0.5) 55%, rgba(0,26,102,0) 80%);
    border: 2px solid rgba(207,226,255,0.7);
    color: #cde7ff; align-items: center; justify-content: center; font-size: 22px; font-weight: 700;
    box-shadow: 0 0 14px rgba(74,166,255,0.55);
    animation: pulse 1.6s ease-in-out infinite;
    transition: transform 0.18s var(--ease); }
  #login-orb.on { display: flex; }
  #login-orb.dragged { animation: none; transition: none; }
  #login-orb:active { transform: scale(0.92); cursor: grabbing; }
  #login-orb::after { content: 'SIGN IN'; position: absolute; left: 50%; bottom: -14px;
    transform: translateX(-50%); font-size: 9px; letter-spacing: 0.22em; color: rgba(207,226,255,0.85); }
  body.signed-in #login-orb { display: none; }

  /* PILOT ORB */
  /* LISTEN orb — always-on microphone affordance. Pulsing green when
     listening, blue when Astranov is speaking, dim red when muted.
     Draggable like every other orb. */
  #listen-orb { position: fixed; left: 16px;
    bottom: calc(var(--orb-bottom, 80px) + env(safe-area-inset-bottom));
    z-index: 250; width: 56px; height: 56px; border-radius: 50%;
    cursor: grab; display: flex; align-items: center; justify-content: center;
    touch-action: none; color: #fff; font-size: 22px; font-weight: 700;
    background: radial-gradient(circle at 50% 50%,
      rgba(126,235,180,0.85) 0%, rgba(46,130,90,0.5) 55%, rgba(0,20,12,0) 80%);
    border: 2px solid rgba(126,235,180,0.75);
    box-shadow: 0 0 16px rgba(126,235,180,0.65);
    animation: pulse 1.4s ease-in-out infinite;
    transition: transform 0.18s var(--ease), bottom 0.32s var(--ease); }
  #listen-orb.dragged { transition: none; animation: none; }
  #listen-orb:active { transform: scale(0.92); cursor: grabbing; }
  #listen-orb.speaking {
    background: radial-gradient(circle at 50% 50%,
      rgba(74,166,255,0.85) 0%, rgba(30,108,255,0.5) 55%, rgba(0,26,102,0) 80%);
    border-color: rgba(207,226,255,0.85);
    box-shadow: 0 0 18px rgba(74,166,255,0.75);
    animation: pulse 0.7s ease-in-out infinite; }
  #listen-orb.muted {
    background: radial-gradient(circle at 50% 50%,
      rgba(180,60,60,0.55) 0%, rgba(80,20,20,0.4) 55%, rgba(0,0,0,0) 80%);
    border-color: rgba(255,120,120,0.6);
    box-shadow: 0 0 10px rgba(255,120,120,0.3);
    animation: none; opacity: 0.85; }
  #listen-orb::after { content: 'MIC LIVE'; position: absolute; left: 50%;
    bottom: -14px; transform: translateX(-50%); font-size: 9px;
    letter-spacing: 0.20em; color: rgba(214,247,230,0.85); white-space: nowrap; }
  #listen-orb.muted::after   { content: 'MIC OFF'; color: rgba(255,180,180,0.85); }
  #listen-orb.speaking::after{ content: 'SPEAKING'; color: rgba(207,226,255,0.9); }

  /* Interim-transcript preview — floats above the LISTEN orb showing
     what the recognizer is hearing in real time. Disappears the moment
     a final transcript lands. */
  #interim-bubble { position: fixed; left: 86px;
    bottom: calc(var(--orb-bottom, 80px) + env(safe-area-inset-bottom) + 60px);
    z-index: 260; max-width: min(70vw, 360px);
    padding: 8px 14px; border-radius: 14px;
    background: rgba(10,19,52,0.75);
    border: 1px solid rgba(126,235,180,0.45);
    color: var(--selene); font-size: 13px; line-height: 1.4;
    box-shadow: 0 6px 20px rgba(0,0,0,0.55);
    display: none; pointer-events: none;
    backdrop-filter: blur(8px); }
  #interim-bubble.on { display: block; }
  #interim-bubble::after { content: ''; position: absolute; left: 16px; bottom: -6px;
    width: 12px; height: 12px; background: rgba(10,19,52,0.75);
    border-right: 1px solid rgba(126,235,180,0.45);
    border-bottom: 1px solid rgba(126,235,180,0.45);
    transform: rotate(45deg); }

  #pilot-orb { position: fixed; right: 16px;
    bottom: calc(var(--orb-bottom, 80px) + env(safe-area-inset-bottom));
    z-index: 250; width: 54px; height: 54px; border-radius: 50%;
    cursor: grab; display: none; touch-action: none;
    background: radial-gradient(circle at 35% 35%, #5fa7ff 0%, #1e6cff 38%, #0a2c6e 70%, #02060d 100%);
    border: 2px solid rgba(207,226,255,0.55);
    box-shadow: 0 0 14px rgba(74,166,255,0.5), inset -6px -10px 18px rgba(0,0,0,0.45);
    transition: transform 0.18s var(--ease), opacity 0.25s var(--ease), bottom 0.32s var(--ease); }
  #pilot-orb.on { display: block; }
  #pilot-orb.dragged { transition: none; }
  #pilot-orb::after { content: 'GLOBE'; position: absolute; left: 50%; bottom: -14px;
    transform: translateX(-50%); font-size: 9px; letter-spacing: 0.22em; color: rgba(207,226,255,0.7); }
  #pilot-orb:active { transform: scale(0.92); cursor: grabbing; }

  /* PANEL */
  #panel { position: fixed; left: 0; right: 0; bottom: 0; z-index: 70;
    max-height: 75vh; overflow-y: auto; padding: 0 18px calc(28px + env(safe-area-inset-bottom));
    background: linear-gradient(180deg, rgba(10,19,52,0.62), rgba(2,6,13,0.84));
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-top: 1px solid rgba(74,166,255,0.45); border-radius: 28px 28px 0 0;
    box-shadow: 0 -10px 36px rgba(45,108,196,0.24);
    transform: translateY(100%); transition: transform 0.4s var(--ease); }
  #panel::before { content: ''; position: absolute; top: -1px; left: 12%; right: 12%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold) 30%, var(--aegean) 70%, transparent);
    opacity: 0.55; pointer-events: none; }
  #panel.open { transform: translateY(0); }
  #panel-handle { position: sticky; top: 0; padding: 10px 14px 8px;
    display: flex; align-items: center; justify-content: center; cursor: grab;
    user-select: none; touch-action: none; z-index: 2;
    background: linear-gradient(180deg, rgba(8,18,38,0.85), rgba(8,18,38,0)); }
  #panel-handle::before { content: ''; width: 42px; height: 4px; border-radius: 2px;
    background: rgba(120,180,255,0.45); }
  #panel-body { padding-top: 8px; }
  #panel h2 { margin: 0 0 4px; font-size: 18px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--selene);
    font-family: 'Quicksand', sans-serif; font-weight: 700; }
  #panel h3 { margin: 18px 0 6px; font-size: 11px; letter-spacing: 0.22em;
    text-transform: uppercase; color: rgba(120,180,255,0.7); }
  #panel p { margin: 4px 0; font-size: 13px; line-height: 1.5; color: #a8c8ee; }
  #panel input, #panel textarea, #panel select {
    width: 100%; padding: 10px 12px; font-size: 16px; margin: 6px 0;
    background: rgba(8,18,38,0.65); border: 1px solid rgba(93,178,255,0.35);
    border-radius: 10px; color: #e8eef8; outline: none; }
  #panel .pbtn { display: inline-flex; align-items: center; justify-content: center;
    padding: 10px 16px; margin: 4px 4px 4px 0; cursor: pointer; font-size: 13px; font-weight: 600;
    background: rgba(20,52,120,0.65); border: 1px solid rgba(93,178,255,0.6);
    border-radius: 22px; color: #cde7ff; user-select: none;
    -webkit-tap-highlight-color: transparent; transition: transform 0.12s var(--ease); }
  #panel .pbtn:active { transform: scale(0.96); }
  #panel .pbtn.ok { background: rgba(20,80,40,0.65); border-color: rgba(126,235,180,0.7); color: #d6f7e6; }
  #panel .pbtn.danger { background: rgba(80,20,20,0.65); border-color: rgba(255,120,120,0.7); color: #ffd6d6; }
  #panel .pbtn.muted { background: rgba(40,52,72,0.55); border-color: rgba(120,140,180,0.45); color: #b8c8e0; }
  #panel .row { display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid rgba(93,178,255,0.12);
    font-size: 13px; color: #cde7ff; gap: 8px; }
  #panel .row:last-child { border-bottom: 0; }
  #panel .card { padding: 10px 12px; margin: 6px 0; border-radius: 12px;
    background: rgba(8,18,38,0.45); border: 1px solid rgba(93,178,255,0.18); cursor: pointer; }
  #panel .card:hover { border-color: rgba(93,178,255,0.55); }
  #panel .card .ct { font-size: 14px; color: #cfe2ff; line-height: 1.35; }
  #panel .card .cm { font-size: 11px; color: rgba(168,200,238,0.65); margin-top: 4px; }
  #panel .close { position: absolute; top: 8px; right: 12px; padding: 4px 10px;
    background: transparent; border: 0; color: rgba(168,200,238,0.6); font-size: 18px; cursor: pointer; }

  /* CALL STAGE */
  #call-stage { position: fixed; inset: 0; z-index: 500; background: #000;
    display: none; flex-direction: column; }
  #call-stage.on { display: flex; }
  #call-remote { flex: 1; min-height: 0; width: 100%; object-fit: cover; background: #000; }
  #call-local  { position: absolute; right: 16px; top: max(16px, env(safe-area-inset-top));
    width: 110px; height: 150px; object-fit: cover; background: #111;
    border: 2px solid rgba(255,255,255,0.4); border-radius: 12px; z-index: 510; }
  #call-overlay { position: absolute; left: 0; right: 0; top: 0; padding: 16px;
    z-index: 511; color: #fff; font-size: 14px;
    background: linear-gradient(180deg, rgba(0,0,0,0.6), transparent);
    display: flex; flex-direction: column; gap: 4px; }
  #call-controls { position: absolute; left: 0; right: 0;
    bottom: calc(20px + env(safe-area-inset-bottom));
    display: flex; justify-content: center; gap: 18px; z-index: 511; }
  #call-controls .btn { width: 56px; height: 56px; font-size: 22px; }
  #agent-input-wrap { position: absolute; left: 0; right: 0;
    bottom: calc(96px + env(safe-area-inset-bottom)); z-index: 511;
    padding: 0 14px; display: none; flex-direction: column; gap: 8px; }
  #agent-input-wrap.on { display: flex; }
  #agent-log { max-height: 28vh; overflow-y: auto;
    background: rgba(2,6,18,0.55); border: 1px solid rgba(93,178,255,0.35);
    border-radius: 14px; padding: 8px 12px; color: #cde7ff;
    font-size: 12px; line-height: 1.4; }
  #agent-log .ag-line { padding: 4px 0; border-bottom: 1px solid rgba(93,178,255,0.10); }
  #agent-log .ag-you { color: rgba(120,180,255,0.85); }
  #agent-form { display: flex; gap: 8px; align-items: center; }
  #agent-form input { flex: 1; padding: 10px 14px; font-size: 16px;

function formatRelative(ts) {

// Haversine — meters between (lat1,lng1) and (lat2,lng2).
function distMeters(lat1, lng1, lat2, lng2) {
  const R = 6371000, toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function onDoubleClickZoom(click) {

function _bindTouchGestures(canvas) {
  let t0 = 0, sy1 = 0, sy2 = 0, sx1 = 0, sx2 = 0, moved = false;
  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      t0 = Date.now(); moved = false;
      sx1 = e.touches[0].clientX; sy1 = e.touches[0].clientY;
      sx2 = e.touches[1].clientX; sy2 = e.touches[1].clientY;
    }
  }, { passive: true });
  canvas.addEventListener('touchmove', (e) => {
    if (e.touches.length !== 2 || !t0) return;
    const dy = ((e.touches[0].clientY - sy1) + (e.touches[1].clientY - sy2)) / 2;
    const dx = ((e.touches[0].clientX - sx1) + (e.touches[1].clientX - sx2)) / 2;
    if (Math.abs(dy) < 6 && Math.abs(dx) < 6) return;
    moved = true;
    // Vertical-dominant drag → zoom (down = IN, up = OUT)
    if (Math.abs(dy) > Math.abs(dx) * 1.5) {
      const factor = Math.exp(-dy / 220);
      const [lng, lat] = _cameraLngLat();
      const newAlt = Math.max(400, Math.min(28_000_000, _cameraAlt() * factor));
      viewer.camera.setView({ destination: Cesium.Cartesian3.fromDegrees(lng, lat, newAlt) });
      sy1 = e.touches[0].clientY; sy2 = e.touches[1].clientY;
    }
  }, { passive: true });
  canvas.addEventListener('touchend', (e) => {
    if (t0 && !moved && e.touches.length === 0 && (Date.now() - t0) < 280) zoomOutOneStep();
    t0 = 0;
  }, { passive: true });
}

function _bindOrbDrag(el, key) {
  if (!el) return;
  try {
    const pos = JSON.parse(localStorage.getItem(key) || 'null');
    if (pos && Number.isFinite(pos.left) && Number.isFinite(pos.top)) _applyAbsPos(el, pos.left, pos.top);
  } catch (_) {}
  let dragging = false, dx = 0, dy = 0, ox = 0, oy = 0;
  el.addEventListener('pointerdown', (e) => {
    dragging = false; dx = e.clientX; dy = e.clientY;
    const r = el.getBoundingClientRect(); ox = e.clientX - r.left; oy = e.clientY - r.top;
    el.setPointerCapture(e.pointerId);
  });
  el.addEventListener('pointermove', (e) => {
    if (!el.hasPointerCapture(e.pointerId)) return;
    if (!dragging && ((e.clientX - dx)**2 + (e.clientY - dy)**2) < 36) return;
    dragging = true;
    const left = Math.max(4, Math.min(window.innerWidth  - el.offsetWidth  - 4, e.clientX - ox));
    const top  = Math.max(4, Math.min(window.innerHeight - el.offsetHeight - 4, e.clientY - oy));
    _applyAbsPos(el, left, top);
  });
  el.addEventListener('pointerup', (e) => {
    try { el.releasePointerCapture(e.pointerId); } catch (_) {}
    if (dragging) {
      try { localStorage.setItem(key, JSON.stringify({ left: el.offsetLeft, top: el.offsetTop })); } catch (_) {}
      el._suppressClick = Date.now();
    }
  });
  el.addEventListener('click', (e) => {
    if (el._suppressClick && (Date.now() - el._suppressClick) < 300) {
      e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation();
    }
  }, true);
}
function _applyAbsPos(el, left, top) {
  el.classList.add('dragged'); el.style.left = left + 'px'; el.style.top = top + 'px';
  el.style.right = 'auto'; el.style.bottom = 'auto';
}

function _bindPanelDragHandle() {
  const h = $('panel-handle'), p = $('panel'); if (!h || !p) return;
  let startY = 0, dy = 0, dragging = false;
  h.addEventListener('pointerdown', (e) => { h.setPointerCapture(e.pointerId); startY = e.clientY; dy = 0; dragging = true; p.style.transition = 'none'; });
  h.addEventListener('pointermove', (e) => { if (!dragging) return; dy = Math.max(0, e.clientY - startY); p.style.transform = `translateY(${dy}px)`; _pushOrbsAboveDrawers(); });
  h.addEventListener('pointerup', (e) => {
    dragging = false; try { h.releasePointerCapture(e.pointerId); } catch (_) {}
    p.style.transition = ''; p.style.transform = '';
    if (dy > 80) closePanel();
    setTimeout(_pushOrbsAboveDrawers, 360);
  });
}
function _bindChatDragHandle() {
  const h = $('chat-handle'); if (!h) return;
  let startY = 0, startH = 0, dragging = false;
  h.addEventListener('pointerdown', (e) => { h.setPointerCapture(e.pointerId); startY = e.clientY; startH = $('chat').getBoundingClientRect().height; dragging = true; });
  h.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const delta = startY - e.clientY;
    const newH = Math.max(60, Math.min(window.innerHeight * 0.6, startH + delta));
    $('chat').style.maxHeight = newH + 'px';
  });
  h.addEventListener('pointerup', (e) => {
    dragging = false; try { h.releasePointerCapture(e.pointerId); } catch (_) {}
    if ($('chat').getBoundingClientRect().height < 80) closeChat();
  });
}

/* ============================== Voice — single state machine ==============================
   ONE source of truth: VOICE = { state, recognition, langOverride, greeted, currentTurn }.
   States: 'idle' | 'listening' | 'speaking'. Transitions enforced.
   Rules earned the hard way:
   - Tap mic ALWAYS works: cancels any TTS, stops any listening, starts
     fresh recognition with the right language. No "stuck" states.
   - User typing or focusing the input cancels TTS immediately. The brain
     never talks over the user.
   - Stale replies don't speak: only the LATEST turn's reply triggers TTS.
   - Greek is detected from the user's browser locale AND from text input;
     SpeechRecognition is REBUILT each start because iOS Safari ignores
     post-construction lang changes.
   - One greeting, ever. _speakReply is the only path for chat replies.
*/
// ALWAYS-ON listener (LAW). ONE recognizer at a time — restarting two
// in parallel made browsers beep on every cycle AND eat Astranov's
// own TTS. Single SR with auto-toggle (en-US ↔ el-GR) based on the
// last detected script. While TTS is speaking, the mic is STOPPED
// (the brain cannot hear herself) and resumes when she finishes.
const VOICE = {
  state: 'idle',            // 'idle' | 'listening' | 'speaking'
  recognition: null,
  recognitionLang: null,    // 'el-GR' | 'en-US'
  langOverride: null,       // 'el' | 'en' | null (chat-command lock)
  greeted: false,
  currentTurn: 0,
  alwaysOn: true,
  voiceTurnPending: false,
  lastFinalAt: 0,
  pausedForTTS: false,      // we deliberately stopped SR while speaking
};

function _isGreek(s) { return /[Ͱ-Ͽἀ-῿]/.test(String(s || '')); }
function _pickLang() {
  if (VOICE.langOverride) return VOICE.langOverride;
  const nav = (navigator.language || '').toLowerCase();
  return /^el/.test(nav) ? 'el' : 'en';
}

function ttsCancel() {
  try { speechSynthesis.cancel(); } catch (_) {}
  if (VOICE.state === 'speaking') VOICE.state = 'idle';
  const orb = $('listen-orb'); if (orb) orb.classList.remove('speaking');
}
function _listenOrbState() {
  const orb = $('listen-orb'); if (!orb) return;
  orb.classList.remove('muted','speaking');
  if (!VOICE.alwaysOn) { orb.classList.add('muted'); return; }
  if (VOICE.state === 'speaking') orb.classList.add('speaking');
}

// SELENE voice picker — pursues the BEST neural voice the device has,
// ranking explicitly for English + Greek. The architect's standard:
// no robotic Atari sound. We never pretend; if no neural voice exists
// we still speak with the best available, honest about the fallback.
function _voiceForLang(lang) {
  const voices = speechSynthesis.getVoices() || [];
  const wantBase = lang === 'el' ? 'el' : 'en';
  const matches = voices.filter(v => (v.lang || '').toLowerCase().startsWith(wantBase));
  const pool = matches.length ? matches : voices;
  const score = (v) => {
    const n = String(v.name || ''); const lc = n.toLowerCase(); let s = 0;
    // EXPLICITLY named neural voices the OS ships with — these are real upgrades.
    // English neural (Apple / Google / Microsoft / Amazon)
    if (/aria.*online.*natural|jenny.*natural|guy.*natural|ana.*natural/i.test(n)) s += 50;
    if (/google\s*uk\s*english.*female|google\s*us\s*english.*female|google\s*english.*natural/i.test(n)) s += 45;
    if (/eloquence|siri.*premium|siri.*enhanced/i.test(n)) s += 42;
    if (/karen.*premium|samantha.*premium|daniel.*premium|moira.*premium/i.test(n)) s += 40;
    // Greek neural
    if (/nestoras.*natural|stefanos.*natural|melina.*natural/i.test(n)) s += 50;
    if (/google\s*greek/i.test(n)) s += 45;
    if (/melina|stefanos/i.test(n)) s += 30;
    // Generic markers — still much better than no signal
    if (/premium/i.test(n))  s += 14;
    if (/enhanced/i.test(n)) s += 12;
    if (/neural|natural/i.test(n)) s += 12;
    if (/online/i.test(n))   s += 6;
    if (/siri/i.test(n))     s += 8;
    if (/google/i.test(n))   s += 6;
    if (/microsoft/i.test(n))s += 4;
    if (/compact/i.test(n))  s -= 6;   // compact = robotic; deprioritize
    if (/(novelty|whisper|bahh|bells|cellos|deranged|hysterical|junior|kathy|pipe|princess|trinoids|whisper|zarvox)/i.test(lc)) s -= 30;
    return s;
  };
  pool.sort((a, b) => score(b) - score(a));
  return pool[0] || null;
}

function ttsSpeak(text) {
  if (!('speechSynthesis' in window) || !text) return;
  ttsCancel();
  const lang = _isGreek(text) ? 'el' : _pickLang();
  const u = new SpeechSynthesisUtterance(text);
  const v = _voiceForLang(lang); if (v) u.voice = v;
  u.lang = lang === 'el' ? 'el-GR' : (u.voice?.lang || 'en-US');
  u.rate = 1.0; u.pitch = 1.0; u.volume = 1.0;
  // Stop the recognizer BEFORE we speak so we don't hear ourselves and
  // beep on every restart. We'll resume after the utterance ends.
  _srPauseForTTS();
  u.onstart = () => { VOICE.state = 'speaking'; _listenOrbState(); };
  u.onend   = () => { if (VOICE.state === 'speaking') VOICE.state = 'idle'; _listenOrbState(); _srResumeAfterTTS(); };
  u.onerror = () => { if (VOICE.state === 'speaking') VOICE.state = 'idle'; _listenOrbState(); _srResumeAfterTTS(); };
  try { speechSynthesis.speak(u); } catch (_) {}
}

function _ttsBusy() { return speechSynthesis.speaking || speechSynthesis.pending; }

function _interimShow(text) {
  const el = $('interim-bubble'); if (!el) return;
  el.textContent = text;
  el.classList.add('on');
  clearTimeout(_interimShow._t);
  _interimShow._t = setTimeout(() => el.classList.remove('on'), 2200);
}
function _interimHide() { const el = $('interim-bubble'); if (el) el.classList.remove('on'); }

function _srBuild() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.continuous = true;
  r.interimResults = true;
  const lang = VOICE.langOverride || _pickLang();
  VOICE.recognitionLang = lang === 'el' ? 'el-GR' : 'en-US';
  r.lang = VOICE.recognitionLang;
  r.onspeechstart = () => {
    // Drop barge-in entirely while WE are speaking — what the mic
    // hears is our own TTS, not the user. Avoids the feedback loop
    // that the architect named.
    if (VOICE.state === 'speaking' || _ttsBusy()) return;
  };
  r.onresult = (evt) => {
    // Same rule for results: if our TTS is playing, the recognizer is
    // hearing US. Drop the transcript silently.
    if (VOICE.state === 'speaking' || _ttsBusy()) { _interimHide(); return; }
    let finalText = '', interimText = '';
    for (let i = evt.resultIndex; i < evt.results.length; i++) {
      const res = evt.results[i];
      if (res.isFinal) finalText  += res[0].transcript;
      else             interimText += res[0].transcript;
    }
    finalText = (finalText || '').trim();
    // Show interim text floating above the LISTEN orb so the user SEES
    // what the recognizer is hearing in real time. Disappears on final.
    if (interimText && !finalText) _interimShow(interimText);
    else _interimHide();
    if (finalText.length < 2) return;
    // Auto-toggle language for the NEXT start based on what the user
    // actually said: Greek script → flip to el-GR; Latin → en-US.
    VOICE.langOverride = _isGreek(finalText) ? 'el' : 'en';
    const now = Date.now();
    if (now - VOICE.lastFinalAt < 600) return;
    VOICE.lastFinalAt = now;
    VOICE.voiceTurnPending = true;
    $('chat-input').value = finalText;
    $('chat-form').dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
  };
  r.onend = () => {
    VOICE.state = 'idle'; _listenOrbState();
    // Do NOT restart while we are speaking — would re-trigger Chrome's
    // recognition-start beep AND feed our own audio back in.
    if (VOICE.alwaysOn && !VOICE.pausedForTTS && !_ttsBusy()) {
      setTimeout(_srStart, 700);
    }
  };
  r.onerror = (e) => {
    VOICE.state = 'idle'; _listenOrbState();
    const err = e?.error || '';
    if (err === 'not-allowed') {
      VOICE.alwaysOn = false; _listenOrbState();
      toast('Mic blocked — tap the green orb to grant permission', 'err');
      return;
    }
    if (err === 'language-not-supported') {
      // Fallback to en-US once and keep going.
      VOICE.langOverride = 'en';
      if (VOICE.alwaysOn) setTimeout(_srStart, 600);
      return;
    }
    if (VOICE.alwaysOn && !_ttsBusy()) setTimeout(_srStart, 1200);
  };
  return r;
}

function _srStart() {
  if (!VOICE.alwaysOn) return;
  if (_ttsBusy()) { setTimeout(_srStart, 400); return; }
  // If a recognizer is already listening in the right language, keep it.
  const wantLang = (VOICE.langOverride || _pickLang()) === 'el' ? 'el-GR' : 'en-US';
  if (VOICE.recognition && VOICE.state === 'listening' && VOICE.recognitionLang === wantLang) return;
  // Otherwise (wrong language or none), tear down and start fresh.
  if (VOICE.recognition) { try { VOICE.recognition.abort(); } catch (_) {} VOICE.recognition = null; }
  VOICE.recognition = _srBuild();
  if (!VOICE.recognition) return;
  try {
    VOICE.recognition.start();
    VOICE.state = 'listening';
    VOICE.pausedForTTS = false;
    _listenOrbState();
  } catch (_) {
    try { VOICE.recognition.abort(); } catch (_) {}
    setTimeout(_srStart, 600);
  }
}

function _srPauseForTTS() {
  if (!VOICE.recognition) return;
  VOICE.pausedForTTS = true;
  try { VOICE.recognition.stop(); } catch (_) {}
  VOICE.state = 'idle';
  _listenOrbState();
}

function _srResumeAfterTTS() {
  VOICE.pausedForTTS = false;
  // Speaker decay + audio echo can briefly trigger SR — wait 500 ms.
  if (VOICE.alwaysOn) setTimeout(_srStart, 500);
}

function micToggle() {
  ttsCancel();
  VOICE.alwaysOn = !VOICE.alwaysOn;
  if (VOICE.alwaysOn) {
    _srStart();
    toast('Listening · EN ↔ EL');
  } else {
    if (VOICE.recognition) { try { VOICE.recognition.stop(); } catch (_) {} }
    VOICE.state = 'idle';
    toast('Mic muted', '');
  }
  _listenOrbState();
}

function speakGreeting(text) {
  if (VOICE.greeted) return;
  VOICE.greeted = true;
  const go = () => ttsSpeak(text);
  // Three possible activation paths — first one to fire wins because
  // ttsSpeak cancels any prior utterance. None duplicates.
  if (speechSynthesis.getVoices().length) go();
  else {
    speechSynthesis.onvoiceschanged = () => { speechSynthesis.onvoiceschanged = null; go(); };
    setTimeout(go, 1200);
  }
  // Mobile policy can mute pre-gesture TTS — first tap anywhere unlocks.
  window.addEventListener('pointerdown', () => {
    if (!speechSynthesis.speaking && !speechSynthesis.pending) go();
  }, { once: true });
}

// §20 — Agora reach. When the user's question looks like an ancient-
// knowledge query (Greek figure, classical theme, EL script trigger),
// pull the top knowledge rows BEFORE we ask the brain and inject them
// as a [SOURCES] context block. Astranov then synthesises grounded in
// real entries; the citation chips render under the reply with a tap
// straight to the Agora entry. Foundation #2 made executable in chat.
const _AGORA_RX = /\b(plato|πλάτων|aristotle|αριστοτέλ|socrates|σωκράτ|pythagor|πυθαγόρ|epicur|επίκουρ|heraclit|ηράκλειτ|democrit|δημόκριτ|athena|αθηνά|zeus|δίας|apollo|απόλλων|hermes|ερμής|poseidon|ποσειδών|artemis|άρτεμις|hera|ήρα|hephaest|ήφαιστ|ares|άρης|demeter|δήμητρ|dionysus|διόνυσ|odysse|οδυσσ|achill|αχιλλ|homer|όμηρ|sparta|σπάρτη|leonidas|λεωνίδα|delphi|δελφ|olymp|όλυμπ|ancient\s+greek|αρχαία\s+ελλην|mythology|μυθολογ|philosoph|φιλοσοφ|stoic|στωικ|cyni[ck]|κυνικ|sextant|σέξταντ)/i;
async function _agoraReachForChat(text) {
  if (!text || !_AGORA_RX.test(text)) return null;
  try {
    const { data, error } = await sb.rpc('knowledge_search', { q: text, max_results: 3 });
    if (error) return null;
    const rows = (data || []).filter(r => (r.summary || '').length > 40);
    if (!rows.length) return null;
    const lines = rows.map((r, i) =>
      `[${i+1}] ${r.title || r.topic} (${r.subject}, ${r.source_name || 'source'}): ${(r.summary || '').slice(0, 380)}`
    ).join('\n');
    return {
      contextBlock:
`[AGORA CONTEXT — quote conservatively, name the source numbers, never launder]
${lines}

[QUESTION]
${text}`,
      sources: rows.map((r, i) => ({
        n: i + 1, id: r.id, title: r.title || r.topic, url: r.source_url || '',
        subject: r.subject, source: r.source_name || '',
      })),
    };
  } catch (_) { return null; }
}
// §17 — AstranoV is the brain's HOME. ai_memory carries what a user
// has told Astranov across sessions so she actually evolves with them
// instead of restarting clean every visit. We write a small line per
// turn, fetch the latest few into the next prompt, and keep the table
// bounded per user. RLS already scopes reads/writes to the row owner.
const MEMORY_BUDGET_PER_USER = 200;
const MEMORY_INJECT_COUNT    = 6;
async function _memoryFetchForUser() {
  if (!session || !sb) return [];
  try {
    const r = await sb.from('ai_memory')
      .select('content, importance, created_at')
      .eq('profile_id', session.user.id)
      .order('importance', { ascending: false, nullsFirst: false })
      .order('created_at', { ascending: false })
      .limit(MEMORY_INJECT_COUNT);
    if (r.error) return [];
    return r.data || [];
  } catch (_) { return []; }
}
async function _memoryWrite(content, importance, source) {
  if (!session || !sb) return;
  const trimmed = (content || '').trim().slice(0, 480);
  if (trimmed.length < 8) return;
  try {
    await sb.from('ai_memory').insert({
      profile_id: session.user.id,
      content: trimmed,
      source: source || 'chat',
      importance: importance ?? 0.5,
      is_private: true,
    });
    // Keep table bounded per user: trim oldest below importance budget.
    const c = await sb.from('ai_memory')
      .select('id', { count: 'exact', head: true })
      .eq('profile_id', session.user.id);
    const n = c.count || 0;
    if (n > MEMORY_BUDGET_PER_USER) {
      const drop = await sb.from('ai_memory')
        .select('id')
        .eq('profile_id', session.user.id)
        .order('importance', { ascending: true, nullsFirst: true })
        .order('created_at', { ascending: true })
        .limit(n - MEMORY_BUDGET_PER_USER);
      const ids = (drop.data || []).map(r => r.id);
      if (ids.length) await sb.from('ai_memory').delete().in('id', ids);
    }
  } catch (_) { /* memory is best-effort, never fail a chat send */ }
}
async function _memoryForgetAll() {
  if (!session || !sb) return 0;
  const r = await sb.from('ai_memory').delete().eq('profile_id', session.user.id).select('id');
  return (r.data || []).length;
}
function _memoryContextBlock(rows) {
  if (!rows.length) return null;
  const lines = rows.map((r, i) => `[${i+1}] ${(r.content || '').slice(0, 220)}`).join('\n');
  return `[MEMORY — what this user has told Astranov before, treat as context, do not quote verbatim unless asked]
${lines}

[CURRENT TURN]`;
}
$('chat-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const input = $('chat-input');
  const text = input.value.trim();
  if (!text) return;
  // Bump the turn counter so any in-flight stale reply will NOT speak.
  const turn = ++VOICE.currentTurn;
  // Detect language THIS turn for downstream TTS + next SR start.
  if (_isGreek(text)) VOICE.langOverride = 'el';
  ttsCancel();   // silence any prior reply the moment the user submits
  appendMsg('user', text);
  input.value = '';
  if (routeLocal(text)) { VOICE.voiceTurnPending = false; return; }
  const isVoiceTurn = VOICE.voiceTurnPending; VOICE.voiceTurnPending = false;
  const stub = appendThinking();
  $('chat').classList.add('thinking');
  document.body.classList.add('brain-thinking');
  // Reach for Agora context BEFORE the brain call. The injected prompt
  // grounds the reply in real entries; citations render under it.
  const agora = await _agoraReachForChat(text);
  // §17 — memory: fetch what this user has told Astranov before. Both
  // blocks combine if relevant; memory always sits ABOVE the agora ctx
  // so the brain sees who's asking before what they're asking about.
  const memRows = await _memoryFetchForUser();
  const memBlock = _memoryContextBlock(memRows);
  let promptForBrain = text;
  if (agora && memBlock)      promptForBrain = memBlock + '\n\n' + agora.contextBlock;
  else if (agora)             promptForBrain = agora.contextBlock;
  else if (memBlock)          promptForBrain = memBlock + '\n' + text;
  const out = await callBrain(promptForBrain, isVoiceTurn ? { mode: 'spartan' } : undefined);
  $('chat').classList.remove('thinking');
  document.body.classList.remove('brain-thinking');
  stub.classList.remove('thinking-stub');
  // Stream the reply word-by-word so the user SEES the brain land in
  // real time. Voice TTS waits for the whole reply (we want one
  // utterance, not a stutter). Skip streaming on failure messages.
  if (out.failed) stub.textContent = out.reply;
  else await _streamReplyIntoStub(stub, out.reply);
  if (out.meta) {
    const badge = _renderBrainBadge(out.meta, out.raw);
    if (badge) stub.appendChild(badge);
    else { const m = document.createElement('div'); m.className = 'msg-meta'; m.textContent = out.meta; stub.appendChild(m); }
  }
  // Citation chips under the reply — Foundation #2 + §20: every claim
  // about the ancients carries the source one tap away.
  if (agora && !out.failed) {
    const cite = document.createElement('div');
    cite.className = 'msg-cite';
    cite.style.cssText = 'margin-top:6px;display:flex;flex-wrap:wrap;gap:6px';
    cite.innerHTML = agora.sources.map(s => `
      <button onclick="agoraOpen('${s.id}')" title="${escapeHtml(s.source)}"
        style="background:rgba(244,234,216,0.10);border:1px solid rgba(244,234,216,0.35);color:var(--bone);
        font-size:10.5px;letter-spacing:0.06em;padding:3px 8px;border-radius:999px;cursor:pointer">
        [${s.n}] ${escapeHtml(s.title)}</button>`).join('');
    stub.appendChild(cite);
  }
  if (out.failed) {
    const r = document.createElement('div'); r.className = 'msg-meta';
    r.innerHTML = '<button class="pbtn ok" style="padding:4px 10px;font-size:11px" onclick="_retryBrain(this)">Retry</button>'
      + '<span style="margin-left:8px;color:rgba(168,200,238,0.55)">our brain only — no silent fallback</span>';
    r._brainPrompt = text;
    stub.appendChild(r);
  }
  // Speak ONLY if this is still the latest turn AND the chat is open
  // AND the brain succeeded. Stale replies stay silent.
  if (!out.failed && turn === VOICE.currentTurn && $('chat').classList.contains('open')) {
    ttsSpeak(out.reply);
  }
  // §17 — write this turn into ai_memory so next session Astranov
  // already knows. Best-effort, never blocks the chat. Skip when the
  // user opted out via 'forget me'.
  if (!out.failed && session) {
    _memoryWrite(text, 0.5, 'chat').catch(()=>{});
  }
  const msgs = $('chat-msgs'); msgs.scrollTop = msgs.scrollHeight;
});

async function _retryBrain(btn) {
  const wrap = btn.closest('.msg-meta');
  const stubMsg = wrap?.parentElement; const text = wrap?._brainPrompt;
  if (!text || !stubMsg) return;
  wrap.remove(); stubMsg.textContent = '…'; stubMsg.classList.add('thinking-stub');
  const out = await callBrain(text);
  stubMsg.classList.remove('thinking-stub');
  stubMsg.textContent = out.reply;
  if (out.meta) { const m = document.createElement('div'); m.className = 'msg-meta'; m.textContent = out.meta; stubMsg.appendChild(m); }
}

/* ============================== Peer orbs — humans + agents same visual ============================== */
const _peerEntities = new Map();

async function refreshPeerOrbs() {
  if (!sb || !viewer) return;
  try {
    const { data } = await sb.rpc('discoverable_peers');
    const peers = Array.isArray(data) ? data : [];
    const seen = new Set();
    for (const p of peers) {
      if (!Number.isFinite(p.lat) || !Number.isFinite(p.lng)) continue;
      seen.add(p.id);
      const labelText = '◈ ' + (p.display_name || 'Friend');
      const existing = _peerEntities.get(p.id);
      if (existing) {
        existing.position = Cesium.Cartesian3.fromDegrees(p.lng, p.lat);
        if (existing.label) existing.label.text = labelText;
        existing.__peerOrb = p; continue;
      }
      const c = Cesium.Color.fromCssColorString('#4aa6ff');
      const ent = viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(p.lng, p.lat),
        point: {
          pixelSize: new Cesium.CallbackProperty(() => 16 + 6 * (0.5 + 0.5 * Math.sin(Date.now() / 380)), false),
          color: c,
          outlineColor: new Cesium.CallbackProperty(() => c.withAlpha(0.25 + 0.45 * (0.5 + 0.5 * Math.sin(Date.now() / 380))), false),
          outlineWidth: new Cesium.CallbackProperty(() => 4 + 6 * (0.5 + 0.5 * Math.sin(Date.now() / 380)), false),
          disableDepthTestDistance: Number.POSITIVE_INFINITY,
        },
        label: {
          text: labelText, font: '600 12px Quicksand, sans-serif',
          fillColor: Cesium.Color.fromCssColorString('#cde7ff'),
          outlineColor: Cesium.Color.fromCssColorString('#020a1c'), outlineWidth: 3,
          style: Cesium.LabelStyle.FILL_AND_OUTLINE,
          pixelOffset: new Cesium.Cartesian2(0, -32),
          showBackground: true,
          backgroundColor: Cesium.Color.fromCssColorString('#020a1c').withAlpha(0.45),
          backgroundPadding: new Cesium.Cartesian2(6, 3),
          distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0, 4_000_000),
          disableDepthTestDistance: Number.POSITIVE_INFINITY,
        },
      });
      ent.__peerOrb = p;
      _peerEntities.set(p.id, ent);
    }
    for (const [id, ent] of _peerEntities) {
      if (!seen.has(id)) { try { viewer.entities.remove(ent); } catch (_) {} _peerEntities.delete(id); }
    }
  } catch (e) { console.error('[peers]', e); }
}

/* ============================== Social circles — shapes by member count ============================== */
const _circleEntities = new Map();

async function refreshCircleShapes() {
  if (!sb || !viewer) return;
  try {
    const { data: circles, error } = await sb.from('circles').select('id, name, emoji, owner_id');
    if (error) throw error;
    const seen = new Set();
    for (const c of (circles || [])) {
      seen.add(c.id);
      // Get members with locations to compute the polygon
      const { data: members } = await sb.rpc('discoverable_peers');
      const { data: mids } = await sb.from('circle_members').select('profile_id').eq('circle_id', c.id);
      const memberIds = new Set((mids || []).map(m => m.profile_id));
      const memberPts = (members || []).filter(m => memberIds.has(m.id));
      if (memberPts.length < 2) { _killCircle(c.id); continue; }
      const positions = memberPts.flatMap(m => [m.lng, m.lat]);
      let existing = _circleEntities.get(c.id);
      const shape = memberPts.length === 2 ? 'AXLE'
                  : memberPts.length === 3 ? 'TRIANGLE'
                  : memberPts.length <= 5 ? 'POLYGON' : 'CLOUD';
      if (existing) { try { viewer.entities.remove(existing); } catch (_) {} _circleEntities.delete(c.id); }
      const ent = (memberPts.length === 2)
        ? viewer.entities.add({
            polyline: {
              positions: Cesium.Cartesian3.fromDegreesArray(positions),
              width: 4,
              material: new Cesium.PolylineDashMaterialProperty({
                color: Cesium.Color.fromCssColorString('#a98cff').withAlpha(0.7),
                dashLength: 12,
              }),
              clampToGround: true,
            },
            label: { text: '◈ ' + (c.name || 'Circle') + ' · ' + shape, font: '600 11px Quicksand', fillColor: Cesium.Color.fromCssColorString('#e8e0ff'), outlineColor: Cesium.Color.BLACK, outlineWidth: 2, style: Cesium.LabelStyle.FILL_AND_OUTLINE, position: Cesium.Cartesian3.fromDegrees(memberPts[0].lng, memberPts[0].lat), pixelOffset: new Cesium.Cartesian2(0, -20), showBackground: true, backgroundColor: Cesium.Color.fromCssColorString('#1a1530').withAlpha(0.7), backgroundPadding: new Cesium.Cartesian2(6, 3), distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0, 5_000_000), disableDepthTestDistance: Number.POSITIVE_INFINITY },
            position: Cesium.Cartesian3.fromDegrees(memberPts[0].lng, memberPts[0].lat),
          })
        : viewer.entities.add({
            polygon: {
              hierarchy: new Cesium.PolygonHierarchy(Cesium.Cartesian3.fromDegreesArray(positions)),
              material: Cesium.Color.fromCssColorString('#a98cff').withAlpha(0.18),
              outline: true,
              outlineColor: Cesium.Color.fromCssColorString('#a98cff'),
              height: 0,
              perPositionHeight: false,
              extrudedHeight: 0,
              arcType: Cesium.ArcType.GEODESIC,
            },
            label: { text: '◈ ' + (c.name || 'Circle') + ' · ' + shape, font: '600 11px Quicksand', fillColor: Cesium.Color.fromCssColorString('#e8e0ff'), outlineColor: Cesium.Color.BLACK, outlineWidth: 2, style: Cesium.LabelStyle.FILL_AND_OUTLINE, position: Cesium.Cartesian3.fromDegrees(memberPts[0].lng, memberPts[0].lat), pixelOffset: new Cesium.Cartesian2(0, -20), showBackground: true, backgroundColor: Cesium.Color.fromCssColorString('#1a1530').withAlpha(0.7), backgroundPadding: new Cesium.Cartesian2(6, 3), distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0, 5_000_000), disableDepthTestDistance: Number.POSITIVE_INFINITY },
            position: Cesium.Cartesian3.fromDegrees(memberPts[0].lng, memberPts[0].lat),
          });
      ent.__circle = { ...c, shape, members: memberPts };
      _circleEntities.set(c.id, ent);
    }
    for (const [id, ent] of _circleEntities) {
      if (!seen.has(id)) _killCircle(id);
    }
  } catch (e) { console.error('[circles]', e); }
}
function _killCircle(id) {
  const e = _circleEntities.get(id);
  if (e && viewer) { try { viewer.entities.remove(e); } catch (_) {} }
  _circleEntities.delete(id);
}

/* ============================== WebRTC calls (humans) ============================== */
let pc = null, localStream = null, callChannel = null, currentCall = null;
let _pendingIncoming = null, _inboxChannel = null;
let _callOrb = null, _callOrbTimeout = 0;
let _outgoingTimer = 0;

function listenForIncomingCalls() {
  if (!sb || !session) return;
  try { _inboxChannel?.unsubscribe(); } catch (_) {}
  _inboxChannel = sb.channel('user:' + session.user.id, { config: { broadcast: { ack: false } } });
  _inboxChannel.on('broadcast', { event: 'incoming-call' }, ({ payload }) => onIncomingInvite(payload));
  _inboxChannel.subscribe();
}

function _spawnCallOrb(lat, lng, name) {
  _killCallOrb();
  if (!viewer || lat == null || lng == null) return false;
  _callOrb = viewer.entities.add({
    position: Cesium.Cartesian3.fromDegrees(lng, lat),
    point: {
      pixelSize: new Cesium.CallbackProperty(() => 22 + 10 * (0.5 + 0.5 * Math.sin(Date.now() / 220)), false),
      color: Cesium.Color.fromCssColorString('#7eebb4'),
      outlineColor: new Cesium.CallbackProperty(() => Cesium.Color.fromCssColorString('#7eebb4').withAlpha(0.25 + 0.55 * (0.5 + 0.5 * Math.sin(Date.now() / 220))), false),
      outlineWidth: new Cesium.CallbackProperty(() => 6 + 8 * (0.5 + 0.5 * Math.sin(Date.now() / 220)), false),
      disableDepthTestDistance: Number.POSITIVE_INFINITY,
    },
    label: { text: '◈ ' + (name || 'Caller'), font: '600 14px Quicksand', fillColor: Cesium.Color.fromCssColorString('#cde7ff'), outlineColor: Cesium.Color.fromCssColorString('#020a1c'), outlineWidth: 3, style: Cesium.LabelStyle.FILL_AND_OUTLINE, pixelOffset: new Cesium.Cartesian2(0, -42), showBackground: true, backgroundColor: Cesium.Color.fromCssColorString('#020a1c').withAlpha(0.55), backgroundPadding: new Cesium.Cartesian2(8, 4), disableDepthTestDistance: Number.POSITIVE_INFINITY },
  });
  _callOrb.__callOrb = true;
  viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(lng, lat, 35_000), duration: 1.4, orientation: { heading: 0, pitch: Cesium.Math.toRadians(-65), roll: 0 } });
  return true;
}
function _killCallOrb() {
  if (_callOrb && viewer) { try { viewer.entities.remove(_callOrb); } catch (_) {} }
  _callOrb = null;
  clearTimeout(_callOrbTimeout); _callOrbTimeout = 0;
}

function onIncomingInvite(p) {
  if (currentCall) return;
  _pendingIncoming = p;
  try { closePanel(); closeChat(); } catch (_) {}
  $('inc-name').textContent = p.fromName || 'Caller';
  $('incoming').classList.add('on');
  _spawnCallOrb(p.callerLat, p.callerLng, p.fromName);
  _callOrbTimeout = setTimeout(() => { if (_pendingIncoming === p) declineIncoming(); }, 30_000);
}

async function acceptIncoming() {
  if (!_pendingIncoming) return;
  const p = _pendingIncoming; _pendingIncoming = null;
  $('incoming').classList.remove('on'); _killCallOrb();
  try { localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }); }
  catch (e) { toast('Mic/cam blocked', 'err'); return; }
  currentCall = { id: p.callId, peerId: p.fromId, peerName: p.fromName, role: 'callee' };
  $('call-peer').textContent = p.fromName || 'Caller';
  $('call-status').textContent = 'connecting…';
  buildPC();
  await pc.setRemoteDescription(p.offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  callChannel = sb.channel('call:' + p.callId, { config: { broadcast: { ack: false } } });
  callChannel.on('broadcast', { event: 'ice' }, ({ payload }) => onRemoteIce(payload));
  callChannel.on('broadcast', { event: 'bye' }, () => endCall());
  callChannel.subscribe();
  await callChannel.send({ type: 'broadcast', event: 'answer', payload: answer });
  try { await sb.from('calls').update({ status: 'accepted', accepted_at: new Date().toISOString() }).eq('id', p.callId); } catch (_) {}
  showCallStage();
}
async function declineIncoming() {
  if (!_pendingIncoming) return;
  const p = _pendingIncoming; _pendingIncoming = null;
  $('incoming').classList.remove('on'); _killCallOrb();
  try {
    const ch = sb.channel('call:' + p.callId); await ch.subscribe();
    await ch.send({ type: 'broadcast', event: 'bye', payload: { reason: 'declined' } });
    ch.unsubscribe();
    await sb.from('calls').update({ status: 'declined', ended_at: new Date().toISOString() }).eq('id', p.callId);
  } catch (_) {}
}

async function startCall(peerId, peerName) {
  if (!session) return openAuthPanel();
  if (currentCall) return toast('Already on a call', 'err');
  if (peerId === session.user.id) return toast("Can't call yourself", 'err');
  try { localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }); }
  catch (e) { toast('Mic/cam blocked: ' + e.message, 'err'); return; }
  let row;
  try {
    const r = await sb.from('calls').insert({ caller_id: session.user.id, callee_id: peerId }).select().single();
    if (r.error) throw r.error; row = r.data;
  } catch (e) { stopLocalStream(); return toast('Call create failed: ' + e.message, 'err'); }
  currentCall = { id: row.id, peerId, peerName, role: 'caller' };
  $('call-peer').textContent = peerName || 'Calling…';
  $('call-status').textContent = 'ringing…';
  buildPC();
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  callChannel = sb.channel('call:' + row.id, { config: { broadcast: { ack: false } } });
  callChannel.on('broadcast', { event: 'answer' }, ({ payload }) => onRemoteAnswer(payload));
  callChannel.on('broadcast', { event: 'ice' }, ({ payload }) => onRemoteIce(payload));
  callChannel.on('broadcast', { event: 'bye' }, () => endCall());
  callChannel.subscribe();
  if (_userLat == null) { try { await locateMe(); } catch (_) {} }
  const userCh = sb.channel('user:' + peerId);
  await userCh.subscribe();
  await userCh.send({
    type: 'broadcast', event: 'incoming-call',
    payload: { callId: row.id, fromId: session.user.id, fromName: (profile?.display_name || session.user.email || 'Caller'), callerLat: _userLat, callerLng: _userLng, offer },
  });
  userCh.unsubscribe();
  try { await sb.functions.invoke('push-notify', { body: { target_profile_id: peerId, type: 'call', callId: row.id, title: 'Incoming call', body: (profile?.display_name || 'Friend') + ' is calling' } }); } catch (_) {}
  clearTimeout(_outgoingTimer);
  _outgoingTimer = setTimeout(() => {
    if (currentCall && currentCall.id === row.id && pc?.connectionState !== 'connected') {
      toast('No answer from ' + (peerName || 'peer'), 'err'); endCall();
    }
  }, 30_000);
  showCallStage();
}

function buildPC() {
  pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  pc.ontrack = (e) => {
    const r = $('call-remote'); if (r.srcObject !== e.streams[0]) r.srcObject = e.streams[0];
    $('call-status').textContent = 'connected';
  };
  pc.onicecandidate = (e) => {
    if (e.candidate && callChannel) {
      try { callChannel.send({ type: 'broadcast', event: 'ice', payload: e.candidate.toJSON() }); } catch (_) {}
    }
  };
  pc.onconnectionstatechange = () => {
    const st = pc.connectionState;
    if (st === 'connected') $('call-status').textContent = 'connected';
    else if (st === 'disconnected' || st === 'failed' || st === 'closed') endCall();
  };
  $('call-local').srcObject = localStream;
}

async function onRemoteAnswer(answer) { try { await pc.setRemoteDescription(answer); $('call-status').textContent = 'connecting…'; } catch (_) {} }
async function onRemoteIce(c) { if (!c) return; try { await pc.addIceCandidate(c); } catch (_) {} }
function showCallStage() { $('call-stage').classList.add('on'); }
function hideCallStage() { $('call-stage').classList.remove('on'); }

function endCall() {
  if (!currentCall && !pc) return;
  clearTimeout(_outgoingTimer); _outgoingTimer = 0;
  try { if (callChannel) callChannel.send({ type: 'broadcast', event: 'bye', payload: {} }); } catch (_) {}
  try { callChannel?.unsubscribe(); } catch (_) {} callChannel = null;
  try { pc?.close(); } catch (_) {} pc = null;
  stopLocalStream();
  try { _agentStream?.getTracks().forEach(t => t.stop()); } catch (_) {}
  _agentStream = null; _agentCanvas = null; _agentCtx = null; _agentCaption = '';
  $('agent-input-wrap')?.classList.remove('on');
  try { speechSynthesis.cancel(); } catch (_) {}
  if (currentCall && currentCall.role !== 'agent' && currentCall.id !== 'self-test') {
    try { sb.from('calls').update({ status: 'ended', ended_at: new Date().toISOString() }).eq('id', currentCall.id); } catch (_) {}
  }
  currentCall = null;
  _killCallOrb(); hideCallStage();
}
function stopLocalStream() {
  try { localStream?.getTracks().forEach(t => t.stop()); } catch (_) {}
  localStream = null;
  try { $('call-local').srcObject = null; } catch (_) {}
  try { $('call-remote').srcObject = null; } catch (_) {}
}

$('btn-end').addEventListener('click', endCall);
$('btn-mute').addEventListener('click', () => {
  if (!localStream) return;

// SELENE agent-call canvas — slowly rotating constellation of glyphs
// specific to each seat (spears for Leonidas, owl + olive for Athena,
// labrys for Spartans, single eye for Krypteia, pen + scroll for
// Onasis, hoplite shield for Myrmidons). Brightest glyph pulses while
// the brain speaks. Replaces the plain multi-band sine wave.
const _AGENT_CONSTELLATIONS = {
  leonidas:  { glyphs: ['⚔','▲','⚔','⌘','⚔'],            label: 'TACTICS' },
  onasis:    { glyphs: ['✒','§','✒','♆','✒'],             label: 'BUSINESS INTEL' },
  athena:    { glyphs: ['◉','✦','◎','✦','◉','✦'],         label: 'WISDOM' },
  myrmidons: { glyphs: ['⛨','▽','⛨','▽','⛨'],            label: 'STORMING' },
  spartans:  { glyphs: ['⚒','⊞','⚒','⊞','⚒'],            label: 'ENFORCEMENT' },
  krypteia:  { glyphs: ['◉','·','·','·','·','·','·','·'], label: 'OVERLOOK' },
};
function _drawAgentFrame() {
  if (!currentCall || currentCall.role !== 'agent' || !_agentCtx) return;
  _agentAnim += 0.018;
  const c = _agentCanvas, ctx = _agentCtx, persona = currentCall.persona;
  const w = c.width, h = c.height;
  // Cosmic gradient backdrop
  const bg = ctx.createRadialGradient(w/2, h*0.45, 30, w/2, h*0.45, Math.max(w, h));
  bg.addColorStop(0, '#0a1334'); bg.addColorStop(1, '#02060d');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, w, h);
  // Faint star-field
  ctx.fillStyle = 'rgba(207,226,255,0.18)';
  for (let i = 0; i < 60; i++) {
    const sx = ((i * 91 + (Math.sin(_agentAnim/4 + i) * 30)) % w + w) % w;
    const sy = ((i * 47 + (Math.cos(_agentAnim/4 + i*1.7) * 12)) % h + h) % h;
    ctx.fillRect(sx, sy, 1.2, 1.2);
  }
  // Constellation ring of glyphs
  const seat = _AGENT_CONSTELLATIONS[_agentKey(currentCall.peerName)] || { glyphs: ['◈','◉','◇','◎','✦','◍'], label: 'AGENT' };
  const glyphs = seat.glyphs;
  const cx = w / 2, cy = h * 0.45, R = Math.min(w, h) * 0.22;
  const speaking = (VOICE.state === 'speaking');
  for (let i = 0; i < glyphs.length; i++) {
    const a = _agentAnim + (i * Math.PI * 2 / glyphs.length);
    const x = cx + Math.cos(a) * R;
    const y = cy + Math.sin(a) * R;
    // Brightest glyph pulses to the speech state.
    const isHead = (i === 0);
    const breathe = 0.5 + 0.5 * Math.sin(_agentAnim * (speaking ? 6 : 2) + i);
    const alpha = isHead ? (0.65 + 0.35 * breathe) : (0.30 + 0.30 * breathe);
    ctx.fillStyle = persona.color;
    ctx.globalAlpha = alpha;
    ctx.shadowColor = persona.color; ctx.shadowBlur = isHead ? 22 : 10;
    ctx.font = (isHead ? 'bold ' : '') + (isHead ? 56 : 32) + 'px "Quicksand", "Apple Color Emoji", serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(glyphs[i], x, y);
  }
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
  // Header — the seat speaks for itself
  ctx.fillStyle = '#fff';
  ctx.font = '700 38px Quicksand, sans-serif'; ctx.textAlign = 'center';
  ctx.shadowColor = persona.color; ctx.shadowBlur = 18;
  ctx.fillText(currentCall.peerName, w/2, 120);
  ctx.shadowBlur = 0;
  ctx.font = '600 13px Inter, sans-serif'; ctx.fillStyle = persona.color;
  ctx.fillText(seat.label, w/2, 150);
  // Caption
  if (_agentCaption) {
    ctx.fillStyle = 'rgba(244,234,216,0.92)';
    ctx.font = '500 22px Inter, sans-serif';
    _wrapText(ctx, _agentCaption, w/2, h*0.80, w - 80, 30);
  }
  requestAnimationFrame(_drawAgentFrame);
}
function _wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = String(text).split(/\s+/);
  let line = '', lines = [];
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxWidth && line) { lines.push(line); line = w; }
    else line = test;
  }
  if (line) lines.push(line);
  lines = lines.slice(-6);
  const top = y - (lines.length - 1) * lineHeight / 2;
  for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], x, top + i * lineHeight);
}

let _ttsPrimed = false;
function onAgentFormSubmit(e) {
  e.preventDefault();
  if (!_ttsPrimed && 'speechSynthesis' in window) {
    try { speechSynthesis.cancel(); speechSynthesis.speak(new SpeechSynthesisUtterance(' ')); } catch (_) {}
    _ttsPrimed = true;
  }
  const i = $('agent-input'); const v = i.value; i.value = '';
  agentSend(v);
}

function _pickVoice() {
  if (!('speechSynthesis' in window)) return null;
  const all = speechSynthesis.getVoices() || []; if (!all.length) return null;
  const en = all.filter(v => /^en[-_]/i.test(v.lang));
  const pool = en.length ? en : all;
  const score = (v) => {
    const n = String(v.name || ''); let s = 0;
    if (/premium|enhanced|neural|natural/i.test(n)) s += 10;
    if (/siri/i.test(n)) s += 8; if (/google/i.test(n)) s += 6;
    if (/samantha|alex|daniel|karen|tessa/i.test(n)) s += 4;
    return s;
  };
  pool.sort((a,b) => score(b) - score(a));
  return pool[0];
}

async function agentSend(rawText) {
  if (!currentCall || currentCall.role !== 'agent') return;
  const text = (rawText || '').trim(); if (!text) return;
  const log = $('agent-log');
  log.insertAdjacentHTML('beforeend', `<div class="ag-line ag-you">you · ${escapeHtml(text)}</div>`);
  log.scrollTop = log.scrollHeight;
  _agentCaption = 'thinking…';
  const out = await callBrain(text, { persona: currentCall.persona.sys, history: [] });
  const reply = out.reply || '(no reply)';
  _agentCaption = reply;
  log.insertAdjacentHTML('beforeend', `<div class="ag-line">${escapeHtml(currentCall.peerName)} · ${escapeHtml(reply)}${out.meta ? `<span class="msg-meta" style="margin-left:6px">${escapeHtml(out.meta)}</span>` : ''}</div>`);
  log.scrollTop = log.scrollHeight;
  try { $('agent-input')?.focus(); } catch (_) {}
  if ('speechSynthesis' in window && !out.failed) {
    try {
      const u = new SpeechSynthesisUtterance(reply); const v = _pickVoice(); if (v) u.voice = v;
      u.rate = 1.0; u.pitch = 1.0; u.volume = 1.0;
      speechSynthesis.cancel(); speechSynthesis.speak(u);
    } catch (_) {}
  }
}

      <button class="pbtn muted" onclick="openNewsPanel()">Reset</button>

    <div id="news-list" style="margin-top:10px">Loading…</div>
  `);
  const problems = [];
  let signals = [];
  try {
    const r = await sb.from('signals').select('id, title, body, source_name, source_url, created_at, category').eq('status', 'active').order('created_at', { ascending: false }).limit(50);
    if (r.error) throw r.error; signals = r.data || [];
  } catch (e) { problems.push('signals: ' + e.message); }
  // Brain decides which informant queries to fetch. If a user query was
  // given, the brain expands it into 2-3 focused topics; otherwise it
  // picks a balanced set from the user's interaction history.
  let informantSet = DEFAULT_INFORMANTS;
  if (query) {
    try {
      const out = await callBrain(
        'A user opened the news panel and asked for: "' + query + '". Respond ONLY with a JSON array of 1-4 short topic strings (3-6 words each) we should fetch from world news feeds. Examples: ["AI safety regulation", "Greek archaeology 2026"]. No prose, just the JSON array.',
        { history: [] }
      );
      const m = (out.reply || '').match(/\[[\s\S]*?\]/);
      if (m) {
        const arr = JSON.parse(m[0]);
        if (Array.isArray(arr) && arr.length) {
          informantSet = arr.slice(0,4).map((q,i) => ({ id: 'brain'+i, name: q, category: 'news', queries: [q] }));
        }
      }
    } catch (_) {}
  }
  let informants = [];
  try {
    const r = await sb.functions.invoke('informant-feed', { body: { informants: informantSet } });
    if (r.error) throw r.error;
    if (r.data?.ok === false) throw new Error(r.data.error || 'informant-feed failed');
    for (const arr of Object.values(r.data?.findings || {})) if (Array.isArray(arr)) informants.push(...arr);
  } catch (e) { problems.push('informants: ' + e.message); }
  const items = [
    ...signals.map(s => ({ title: s.title, src: s.source_name || s.category || 'signal', t: s.created_at, url: s.source_url })),
    ...informants.map(f => ({ title: f.title || '(untitled)', src: f.source_name || f.source || 'informant', t: f.published_at || f.created_at || new Date().toISOString(), url: f.source_url || f.url })),
  ].sort((a,b) => new Date(b.t) - new Date(a.t)).slice(0, 80);
  if (!items.length) {
    $('news-list').innerHTML = `<p>No news landed.${problems.length ? '<br>' + problems.map(escapeHtml).join('<br>') : ''}</p>`;
    return;
  }
  $('news-list').innerHTML = items.map(it => `
    <div class="card" onclick="${it.url ? `window.open('${escapeHtml(it.url)}','_blank','noopener')` : `toast('No link')`}">
      <div class="ct">${escapeHtml(it.title)}</div>
      <div class="cm">${escapeHtml(it.src)} · ${formatRelative(it.t)}</div>
    </div>
  `).join('');
}

/* ============================== Marketplace + delivery algorithm ============================== */
let vendorPins = null;
const vendorIndex = new Map();
let _currentVendor = null, _menu = [], _cart = [];

// Pricing — base €1/km + multipliers (LAW §11) and 3% royalty (architect's order).
// LAW §11 supply-demand: when open orders outnumber available runners in a
// city, both the vendor price (subtle) AND the delivery fee (stronger) get
// a surge multiplier so the fleet attracts drivers. When supply outstrips
// demand, the multipliers ease toward 1.0. Architect overrules.
const PRICING = {
  base_per_km: 1.0,     // €1/km floor
  min_fee:     3.0,     // €3 minimum delivery fee
  night_multiplier:    1.30,   // 22:00 – 06:00
  long_haul_multiplier:1.15,   // > 5 km
  platform_fee_pct:    0.03,   // 3% on every transaction — the architect's royalty
  surge_max:           2.50,   // never above 2.5×
  surge_vendor_pct:    0.30,   // vendor price feels 30% of the delivery surge
};

// Compute live surge from open orders + free drivers in a radius. Returns
// {delivery, vendor} multipliers in [1.0, surge_max].
async function _liveSurge(lat, lng) {
  if (!sb || lat == null || lng == null) return { delivery: 1.0, vendor: 1.0, note: 'no GPS' };
  try {
    const open = await sb.rpc('nearby_deliveries', { lat, lng, radius_meters: 12000, max_results: 100 });
    const orders = (open.data || []).filter(d => d.status === 'requested').length;
    // Drivers actively running in the same radius (proxy for "free" fleet)
    const drivers = await sb.from('deliveries').select('runner_id').in('status', ['accepted','en_route','picked_up']);
    const activeRunners = new Set((drivers.data || []).map(d => d.runner_id).filter(Boolean)).size;
    // Demand / Supply ratio — softened so quiet hours stay 1.0
    const ratio = orders / Math.max(1, activeRunners + 1);
    const raw   = 1 + Math.min(1.5, Math.max(0, ratio - 1) * 0.6);
    const delivery = Math.min(PRICING.surge_max, Math.max(1.0, raw));
    const vendor   = 1 + (delivery - 1) * PRICING.surge_vendor_pct;
    return { delivery, vendor, note: orders + ' open · ' + activeRunners + ' running · x' + delivery.toFixed(2) };
  } catch (_) { return { delivery: 1.0, vendor: 1.0, note: 'surge unknown' }; }
}

function _isNightLocal() {
  const h = new Date().getHours();
  return h >= 22 || h < 6;
}

// Delivery fee — Haversine × €1/km × multipliers (night, long-haul,
// optional live demand surge). Returns { km, fee, breakdown }.
function computeDeliveryFee(pickup, dropoff, surgeMul) {
  if (!pickup || !dropoff || pickup.lat == null || dropoff.lat == null) return { km: 0, fee: PRICING.min_fee, breakdown: ['min'] };
  const km = distMeters(pickup.lat, pickup.lng, dropoff.lat, dropoff.lng) / 1000;
  let fee = Math.max(PRICING.min_fee, km * PRICING.base_per_km);
  const breakdown = [`${km.toFixed(2)} km × €${PRICING.base_per_km}/km`];
  if (_isNightLocal())    { fee *= PRICING.night_multiplier;     breakdown.push('night ×' + PRICING.night_multiplier); }
  if (km > 5)             { fee *= PRICING.long_haul_multiplier; breakdown.push('long-haul ×' + PRICING.long_haul_multiplier); }
  if (surgeMul && surgeMul > 1.01) { fee *= surgeMul;            breakdown.push('demand surge ×' + surgeMul.toFixed(2)); }
  return { km, fee: Math.round(fee * 100) / 100, breakdown };
}

function _pinColor(cat) {
  const c = String(cat || '').toLowerCase();
  if (/restaurant|cafe|fast_food|bakery|ice_cream|food/.test(c)) return '#ffaa33';
  if (/bar|pub|drink/.test(c))                                    return '#d96e6e';
  if (/pharmacy|hospital|health/.test(c))                         return '#7eebb4';
  if (/hotel|fitness|service|hairdresser/.test(c))                return '#a98cff';
  if (/shop|supermarket|grocery|convenience|store/.test(c))       return '#4aa6ff';
  return '#cde7ff';
}
function _pinEmoji(p) {
  if (p?.emoji && p.emoji !== '🎪') return p.emoji;
  const c = String(p?.category || '').toLowerCase();
  if (/cafe/.test(c))                       return '☕';
  if (/bar|pub|drink/.test(c))              return '🍷';
  if (/bakery/.test(c))                     return '🥐';
  if (/pharmacy|hospital|health/.test(c))   return '✚';
  if (/fast_food/.test(c))                  return '🍔';
  if (/restaurant|food/.test(c))            return '🍴';
  if (/supermarket|grocery|convenience|shop|store/.test(c)) return '🛒';
  if (/hotel/.test(c))                      return '🏨';
  return '◍';
}
// SELENE hexagonal vendor pin — six-sided plate reads "structure", not
// "balloon". Slight tilt suggests it sits on the globe surface; inner
// radial fill keeps the category color; emoji centered for legibility.
function _makePinCanvas(emoji, color) {
  const c = document.createElement('canvas'); c.width = 72; c.height = 72;
  const ctx = c.getContext('2d');
  // Hexagon path (pointy-top, slightly squashed for ground perspective)
  ctx.save();
  ctx.translate(36, 36);
  const r = 28, sy = 0.88;
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = -Math.PI / 2 + i * Math.PI / 3;
    const x = Math.cos(a) * r, y = Math.sin(a) * r * sy;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  const g = ctx.createRadialGradient(0, -4, 4, 0, 0, r);
  g.addColorStop(0, '#ffffff'); g.addColorStop(0.4, color); g.addColorStop(1, '#08163c');
  ctx.fillStyle = g; ctx.fill();
  ctx.strokeStyle = 'rgba(207,226,255,0.55)'; ctx.lineWidth = 1.2; ctx.stroke();
  ctx.restore();
  // Emoji on top
  ctx.font = '24px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(emoji, 36, 38);
  return c;
}

async function fetchNearbyVendors(lat, lng, keyword) {
  try {
    const r = await sb.from('vendors').select('*').eq('is_active', true).limit(400);
    if (r.error) throw r.error;
    // LAW: vendors with PRICE + PHOTO only. Useless listings waste map
    // space and confuse users — architect's order. The crawler can still
    // populate vendors with empty items; they simply do not render until
    // they publish a real menu with photos.
    let list = (r.data || []).filter(v =>
      v.lat && v.lng && Array.isArray(v.items) &&
      v.items.some(i => Number(i?.price) > 0 && (i?.photo || i?.image_url))
    );
    if (lat != null && lng != null) {
      list = list.map(v => ({ ...v, _dist: distMeters(lat, lng, v.lat, v.lng) }))
        .filter(v => v._dist <= 5000)
        .sort((a, b) => a._dist - b._dist);
    }
    if (keyword) {
      const k = keyword.toLowerCase();
      list.sort((a, b) => {
        const ah = JSON.stringify(a).toLowerCase().includes(k) ? 0 : 1;
        const bh = JSON.stringify(b).toLowerCase().includes(k) ? 0 : 1;
        return ah - bh;
      });
    }
    return list;
  } catch (e) { console.error('[vendors]', e); return []; }
}

function renderVendorPins(places) {
  if (!viewer) return;
  if (!vendorPins) vendorPins = viewer.scene.primitives.add(new Cesium.BillboardCollection({ scene: viewer.scene }));
  vendorPins.removeAll(); vendorIndex.clear();
  for (const p of places) {
    if (!p.lat || !p.lng) continue;
    const bb = vendorPins.add({
      position: Cesium.Cartesian3.fromDegrees(p.lng, p.lat),
      image: _makePinCanvas(_pinEmoji(p), _pinColor(p.category)),
      width: 30, height: 30,
      // Only published-with-photos reach this code path — render bright.
      scaleByDistance: new Cesium.NearFarScalar(200, 1.0, 1.2e6, 0.2),
      translucencyByDistance: new Cesium.NearFarScalar(7e5, 1.0, 1.8e6, 0),
      disableDepthTestDistance: Number.POSITIVE_INFINITY,
    });
    bb.__vendorId = p.id; vendorIndex.set(p.id, p);
  }
  viewer.scene.requestRender();
}

// LAW: crawlers evolve the system through OUR brain. The user names a
// goal; the brain decides where + how wide to sweep; the crawler fills
// the vendors table. Whatever the brain adds, the strict "price + photo"

async function brainCrawl(userPrompt) {

  appendMsg('ai', '◈ ' + why + ' — sweeping ' + radius + ' m around you.', out.meta);

      outline: true, outlineColor: Cesium.Color.fromCssColorString('#4aa6ff').withAlpha(0.6),
      height: 0,
    },
  });
}
function _killSearchRing() {

}

function renderMenu() {

      <div class="mi-name">${escapeHtml(m.name)}${m.desc ? `<br><span style="font-size:11px;color:rgba(168,200,238,0.55)">${escapeHtml(m.desc)}</span>` : ''}</div>
      <div class="mi-price">€${m.price}</div>

function addToCart(i) {

}
function removeFromCart(i) { _cart.splice(i, 1); renderCart(); }

async function renderCart() {
  const c = $('vendor-cart'), t = $('vendor-total'), b = $('btn-place');
  if (!c) return;
  if (!_cart.length) { c.innerHTML = '<p>Tap menu items to add.</p>'; t.innerHTML = ''; b.disabled = true; return; }
  c.innerHTML = _cart.map((it, i) => `
    <div class="cart-row">

    </div>

  // LAW §11 — pull live surge from open orders vs active drivers nearby.
  // Vendor sub gets the soft slice; delivery gets the stronger one.

  const baseSub = _cart.reduce((s, it) => s + it.qty * it.price, 0);
  const sub  = surge.vendor > 1.01 ? baseSub * surge.vendor : baseSub;
  const plat = Math.max(1, Math.round(sub * PRICING.platform_fee_pct));
  const pickup  = { lat: _currentVendor.lat, lng: _currentVendor.lng };
  const dropoff = { lat: _userLat, lng: _userLng };
  const fee = computeDeliveryFee(pickup, dropoff, surge.delivery);

    <div class="row" style="color:rgba(168,200,238,0.6);font-size:11px"><span>${escapeHtml(fee.breakdown.join(' · '))}</span><span></span></div>
    <div class="row" style="color:rgba(168,200,238,0.5);font-size:10px"><span>${escapeHtml(surge.note)}</span><span></span></div>
    <div class="row"><span>Platform fee · 3%</span><span>€${plat}</span></div>
