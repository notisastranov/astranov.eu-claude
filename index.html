/* ==============================================================
   8b. Voice — turn-based, echo-free, with a noise gate.
   Tap the ring → listen one turn → answer + speak → listen again.
   The mic is fully OFF while Astranov speaks (no talking to itself,
   no feedback loop). Silence ends the loop (no endless beeping). If
   the room is too noisy, Astranov drops to manual: "type to me".
   ============================================================== */

// ── Deep, calm voice ────────────────────────────────────────
let _ttsVoices = [];
let _speaking = false;
function _loadVoices() { try { _ttsVoices = window.speechSynthesis?.getVoices() || []; } catch (_) {} }
if (window.speechSynthesis) { _loadVoices(); window.speechSynthesis.onvoiceschanged = _loadVoices; }
// Detect language of a reply so Astranov speaks Greek in Greek, etc.
function _detectLang(text) {
  if (/[Ͱ-Ͽἀ-῿]/.test(text)) return 'el';   // Greek
  if (/[Ѐ-ӿ]/.test(text)) return 'ru';                // Cyrillic
  if (/[一-鿿]/.test(text)) return 'zh';
  if (/[؀-ۿ]/.test(text)) return 'ar';
  return (window._astranovLang || navigator.language || 'en-US').slice(0, 2);
}
function _pickVoice(lang) {
  if (!_ttsVoices.length) _loadVoices();
  lang = (lang || (navigator.language || 'en-US')).slice(0, 2);
  const inLang = _ttsVoices.filter(v => v.lang.toLowerCase().startsWith(lang));
  if (lang === 'en') {
    const deep = ['Google UK English Male','Microsoft Guy','Microsoft Davis','Daniel','Arthur','Rishi','Microsoft Mark','Alex','Fred','Oliver','Aaron'];
    for (const w of deep) { const v = _ttsVoices.find(v => v.name.includes(w)); if (v) return v; }
  }
  // Prefer a male/neutral voice in the target language; avoid clearly female names.
  const female = /(female|samantha|victoria|karen|moira|tessa|fiona|serena|zira|susan|catherine|hazel|amelie|anna|melina)/i;
  return inLang.find(v => !female.test(v.name)) || inLang[0] ||
         _ttsVoices.find(v => v.lang.startsWith('en')) || null;
}
function speakAstranov(text) {
  try {
    if (!window.speechSynthesis || !text) return;
    window.speechSynthesis.cancel();
    const clean = String(text).replace(/[*_`#>]/g, '').slice(0, 600);
    const lang = _detectLang(clean);
    const u = new SpeechSynthesisUtterance(clean);
    const v = _pickVoice(lang); if (v) u.voice = v;
    u.lang = (v && v.lang) || (lang === 'el' ? 'el-GR' : (navigator.language || 'en-US'));
    u.rate = 0.9; u.pitch = 0.6;
    u.volume = (typeof window._astranovVolume === 'number') ? window._astranovVolume : 1.0;   // slow + low = deep & calm
    u.onstart = () => { _speaking = true; $('aicycle-float')?.classList.add('speaking'); };
    u.onend = () => {
      _speaking = false;
      $('aicycle-float')?.classList.remove('speaking');
      if (sessionOn) setTimeout(listenTurn, 450);   // resume the conversation
    };
    window.speechSynthesis.speak(u);
  } catch (_) {}
}

// ── Microphone meter — for the noise gate ────────────────────
let _micStream = null, _audioCtx = null, _analyser = null;
async function _ensureMicMeter() {
  if (_analyser) return true;
  try {
    _micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = _audioCtx.createMediaStreamSource(_micStream);
    _analyser = _audioCtx.createAnalyser(); _analyser.fftSize = 512;
    src.connect(_analyser);
    return true;
  } catch (_) { return false; }
}
function _rmsNow() {
  if (!_analyser) return 0;
  const buf = new Uint8Array(_analyser.fftSize);
  _analyser.getByteTimeDomainData(buf);
  let s = 0; for (const v of buf) { const x = (v - 128) / 128; s += x * x; }
  return Math.sqrt(s / buf.length);
}
function _measureNoise(ms = 500) {
  return new Promise(resolve => {
    if (!_analyser) return resolve(0);
    let sum = 0, n = 0; const t0 = performance.now();
    const id = setInterval(() => {
      sum += _rmsNow(); n++;
      if (performance.now() - t0 > ms) { clearInterval(id); resolve(sum / Math.max(1, n)); }
    }, 40);
  });
}

// ── Speech recognition ───────────────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let voiceActive = false;
let sessionOn = false;     // a voice conversation is open
let _gotResult = false;
let _emptyTurns = 0;

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = navigator.language || 'en-US';

  recognition.onresult = (evt) => {
    const transcript = evt.results[0]?.[0]?.transcript?.trim();
    if (!transcript) return;
    _gotResult = true; _emptyTurns = 0;
    if (document.activeElement === $('aicycle-input') && $('aicycle-input').value.trim()) return;
    $('aicycle-input').value = transcript;
    $('aicycle-form').dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
  };
  recognition.onend = () => {
    voiceActive = false;
    $('aicycle-float').classList.remove('listening');
    // No result this turn? Count silence. After 2 silent turns, stop the
    // loop quietly (no endless beeping). User taps the ring to talk again.
    if (sessionOn && !_speaking && !_gotResult) {
      _emptyTurns++;
      if (_emptyTurns < 2) setTimeout(listenTurn, 500);
      else { sessionOn = false; }
    }
  };
  recognition.onerror = (e) => {
    voiceActive = false;
    $('aicycle-float').classList.remove('listening');
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      sessionOn = false;
      _manualMode('Microphone is blocked — tap the field and type to me.');
    } else if (e.error === 'no-speech') {
      // handled by onend
    }
  };
}

function _manualMode(msg) {
  sessionOn = false;
  try { recognition?.stop(); } catch (_) {}
  appendAICycleMessage('ai', msg, 'astranov', '');
  speakAstranov(msg);
  $('aicycle-input')?.focus();
}

async function startVoiceSession() {
  if (!recognition) { _manualMode('Voice is not supported here — tap the field and type to me.'); return; }
  const ok = await _ensureMicMeter();
  if (!ok) { _manualMode('Microphone is blocked — tap the field and type to me.'); return; }
  sessionOn = true; _emptyTurns = 0;
  listenTurn();
}
function stopVoiceSession() {
  sessionOn = false;
  try { recognition?.stop(); } catch (_) {}
  try { window.speechSynthesis?.cancel(); } catch (_) {}
  _speaking = false;
  $('aicycle-float')?.classList.remove('listening', 'speaking');
}

async function listenTurn() {
  if (!sessionOn || voiceActive || _speaking) return;
  // Noise gate — if the room is loud, go manual instead of mis-hearing.
  const noise = await _measureNoise(450);
  if (noise > 0.16) { _manualMode('There is a lot of background noise — let us go manual. Tap the field and type to me.'); return; }
  _gotResult = false;
  // Listen in the user's chosen language (default browser language; e.g. el-GR).
  try { recognition.lang = window._astranovLang || navigator.language || 'en-US'; } catch (_) {}
  try { recognition.start(); voiceActive = true; $('aicycle-float').classList.add('listening'); }
  catch (_) { /* already running */ }
}

// Backward-compat: anything still calling toggleVoice toggles the session.
function toggleVoice() { if (sessionOn) stopVoiceSession(); else startVoiceSession(); }

/* ==============================================================
   8c. Video calling — 1:1 WebRTC over Supabase Realtime signaling
   ============================================================== */
// ICE servers for WebRTC (1:1 + circle mesh). STUN finds your public
// address; TURN relays media when both peers are behind strict NATs
// (e.g. two different cellular networks — the road-test case). The Open
// Relay TURN below is a free public relay; swap in dedicated TURN creds
// (window._TURN) for production scale + reliability.
const STUN_SERVERS = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' },
  { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
  { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
  { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' },
];
// Owner can inject dedicated TURN at runtime: window._TURN = [{urls,username,credential}]
if (Array.isArray(window._TURN)) STUN_SERVERS.push(...window._TURN);

async function _gcMakePeer(peerId, polite) {
  const pc = new RTCPeerConnection({ iceServers: STUN_SERVERS });
  if (_gc.localStream) _gc.localStream.getTracks().forEach(t => pc.addTrack(t, _gc.localStream));
  pc.onicecandidate = (e) => {
    if (e.candidate) _gc.channel.send({ type: 'broadcast', event: 'gc-ice', payload: { to: peerId, from: session.user.id, candidate: e.candidate } });
  };
  pc.ontrack = (e) => {
    const entry = _gc.peers.get(peerId) || {};
    entry.stream = e.streams[0];
    _gc.peers.set(peerId, { ...entry, pc, stream: e.streams[0] });
    _gcRenderGrid();
  };
  _gc.peers.set(peerId, { pc, stream: null });
  return pc;
}
window.startGroupCall = async function(circleId, circleName) {
  if (_gc.open) return toast('Already in a group call');
  try {
    _gc.localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch (e) { return toast('Camera/mic blocked: ' + e.message, 'err'); }
  _gc.circleId = circleId; _gc.open = true;
  closePanel();
  _gcOpenStage(circleName);
  _gc.channel = sb.channel('astranov:circle-call:' + circleId);
  _gc.channel
    .on('broadcast', { event: 'gc-join' }, async ({ payload }) => {
      if (payload.from === session.user.id) return;
      // Existing member offers to the newcomer.
      const pc = await _gcMakePeer(payload.from, false);
      const offer = await pc.createOffer(); await pc.setLocalDescription(offer);
      _gc.channel.send({ type: 'broadcast', event: 'gc-offer', payload: { to: payload.from, from: session.user.id, sdp: offer } });
    })
    .on('broadcast', { event: 'gc-offer' }, async ({ payload }) => {
      if (payload.to !== session.user.id) return;
      const pc = await _gcMakePeer(payload.from, true);
      await pc.setRemoteDescription(payload.sdp);
      const answer = await pc.createAnswer(); await pc.setLocalDescription(answer);
      _gc.channel.send({ type: 'broadcast', event: 'gc-answer', payload: { to: payload.from, from: session.user.id, sdp: answer } });
    })
    .on('broadcast', { event: 'gc-answer' }, async ({ payload }) => {
      if (payload.to !== session.user.id) return;
      const entry = _gc.peers.get(payload.from);
      if (entry && entry.pc) await entry.pc.setRemoteDescription(payload.sdp).catch(() => {});
    })
    .on('broadcast', { event: 'gc-ice' }, async ({ payload }) => {
      if (payload.to !== session.user.id) return;
      const entry = _gc.peers.get(payload.from);
      if (entry && entry.pc && payload.candidate) await entry.pc.addIceCandidate(payload.candidate).catch(() => {});
    })
    .on('broadcast', { event: 'gc-leave' }, ({ payload }) => {
      const entry = _gc.peers.get(payload.from);
      if (entry && entry.pc) { try { entry.pc.close(); } catch (_) {} }
      _gc.peers.delete(payload.from);
      _gcRenderGrid();
    })
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') {
        // Announce arrival → existing members will offer to me.
        _gc.channel.send({ type: 'broadcast', event: 'gc-join', payload: { from: session.user.id } });
      }
    });
  _gcRenderGrid();
};
function _gcOpenStage(circleName) {
  let stage = document.getElementById('gc-stage');
  if (stage) stage.remove();
  stage = document.createElement('div');
  stage.id = 'gc-stage';
  stage.innerHTML = `
    <div class="gc-bar">

      <button class="gc-end" onclick="endGroupCall()">Leave</button>
    </div>
    <div class="gc-grid" id="gc-grid"></div>`;
  document.body.appendChild(stage);
}
function _gcRenderGrid() {
  const grid = document.getElementById('gc-grid'); if (!grid) return;
  const tiles = [];
  // Self tile first.
  tiles.push({ id: 'self', stream: _gc.localStream, label: 'You', muted: true });
  for (const [pid, entry] of _gc.peers) tiles.push({ id: pid, stream: entry.stream, label: pid.slice(0, 8), muted: false });
  grid.innerHTML = '';
  for (const t of tiles) {
    const cell = document.createElement('div'); cell.className = 'gc-cell';
    const v = document.createElement('video'); v.autoplay = true; v.playsInline = true; v.muted = t.muted;
    if (t.stream) v.srcObject = t.stream;
    const lbl = document.createElement('div'); lbl.className = 'gc-label'; lbl.textContent = t.label;
    cell.appendChild(v); cell.appendChild(lbl); grid.appendChild(cell);
    v.play().catch(() => {});
  }

  const n = tiles.length;
  grid.style.gridTemplateColumns = `repeat(${n <= 1 ? 1 : n <= 4 ? 2 : 3}, 1fr)`;
}
window.endGroupCall = function() {
  if (_gc.channel) {
    try { _gc.channel.send({ type: 'broadcast', event: 'gc-leave', payload: { from: session.user.id } }); } catch (_) {}
    try { _gc.channel.unsubscribe(); } catch (_) {}
  }
  for (const [, entry] of _gc.peers) { try { entry.pc.close(); } catch (_) {} }
  _gc.peers.clear();
  if (_gc.localStream) { _gc.localStream.getTracks().forEach(t => t.stop()); _gc.localStream = null; }
  _gc.open = false; _gc.circleId = null; _gc.channel = null;
  const stage = document.getElementById('gc-stage'); if (stage) stage.remove();
};

    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch (e) {
    toast('Mic/cam blocked: ' + e.message, 'err');
    return;
  }

  // Create call row
  const { data: row, error } = await sb.from('calls').insert({
    caller_id: session.user.id, callee_id: peerId,
  }).select().single();
  if (error) {
    localStream.getTracks().forEach(t => t.stop()); localStream = null;
    return toast(error.message, 'err');
  }

  currentCall = { id: row.id, peerId, peerName: peerName || 'unknown',
                   role: 'caller', startedAt: Date.now() };

  // Build peer connection
  await buildPeerConnection();

  // Create offer first so we can send it immediately and resend on callee-ready
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  // Subscribe to per-call channel for answer + ICE + callee-ready
  callChannel = sb.channel(callChannelName(row.id));
  callChannel
    .on('broadcast', { event: 'answer'      }, ({ payload }) => onAnswer(payload))
    .on('broadcast', { event: 'ice'         }, ({ payload }) => onIce(payload))
    .on('broadcast', { event: 'bye'         }, () => endCall(true))
    .on('broadcast', { event: 'callee-ready'}, () => {
      // Callee woke up via push — resend offer so they can complete the handshake
      callChannel.send({ type: 'broadcast', event: 'offer', payload: { offer } }).catch(() => {});
    })
    .subscribe();

  // Send invite to peer's Realtime inbox
  const inviteChannel = sb.channel(userChannelName(peerId));
  await inviteChannel.subscribe();
  await inviteChannel.send({
    type: 'broadcast', event: 'call-invite',
    payload: {
      callId: row.id,
      caller: { id: session.user.id, name: profile?.display_name || session.user.email || 'unknown' },
      offer,
    },
  });
  setTimeout(() => inviteChannel.unsubscribe().catch(() => {}), 1000);

  // Push notification so callee is woken even if app is closed
  pushNotify(peerId, {
    type:       'call',
    title:      (profile?.display_name || 'Someone') + ' is calling…',
    body:       'Tap Accept to join the call.',
    tag:        'call-' + row.id,
    callId:     row.id,
    callerId:   session.user.id,
    callerName: profile?.display_name || '',
    requireInteraction: true,
  });

  showActiveCallUI('ringing');

  // 30s ring timeout → mark missed and clean up
  callRingTimeout = setTimeout(() => {
    if (currentCall && currentCall.id === row.id) {
      sb.from('calls').update({ status: 'missed', ended_at: new Date().toISOString() })
        .eq('id', row.id).then(() => {});
      endCall(false);
    }
  }, 30_000);
};

function onCallInvite({ callId, caller, offer }) {
  if (currentCall) return; // already busy; let it ring out
  currentCall = { id: callId, peerId: caller.id, peerName: caller.name,
                   role: 'callee', startedAt: Date.now(), pendingOffer: offer };
  $('call-incoming-name').textContent = caller.name || 'unknown';
  $('call-incoming').classList.add('visible');
}

async function acceptIncomingCall() {
  if (!currentCall || currentCall.role !== 'callee') return;
  $('call-incoming').classList.remove('visible');

  // Push-wakeup path: callChannel already subscribed in handleNotificationNav.
  // If no offer yet, wait up to 8s for the caller to resend via 'offer' event.
  if (!currentCall.pendingOffer) {
    await new Promise(resolve => {
      const maxWait = setTimeout(resolve, 8000);
      const check = setInterval(() => {
        if (currentCall?.pendingOffer) { clearTimeout(maxWait); clearInterval(check); resolve(); }
      }, 200);
    });
  }
  if (!currentCall?.pendingOffer) {
    toast('Call offer not received — try again', 'err');
    declineIncomingCall();
    return;
  }

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch (e) {
    toast('Mic/cam blocked: ' + e.message, 'err');
    declineIncomingCall();
    return;
  }

  await buildPeerConnection();
  await pc.setRemoteDescription(new RTCSessionDescription(currentCall.pendingOffer));

  // Subscribe to call channel (skip if already subscribed by push-wakeup path)
  if (!callChannel) {
    callChannel = sb.channel(callChannelName(currentCall.id));
    callChannel
      .on('broadcast', { event: 'ice' }, ({ payload }) => onIce(payload))
      .on('broadcast', { event: 'bye' }, () => endCall(true))
      .subscribe();
  }

  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);

  // Send answer over call channel
  await callChannel.send({
    type: 'broadcast', event: 'answer',
    payload: { fromId: session.user.id, answer },
  });

  await sb.from('calls').update({
    status: 'accepted', accepted_at: new Date().toISOString()
  }).eq('id', currentCall.id);

  showActiveCallUI('connecting');
}

async function declineIncomingCall() {
  if (!currentCall) return;
  await sb.from('calls').update({
    status: 'declined', ended_at: new Date().toISOString()
  }).eq('id', currentCall.id).catch(() => {});
  // Notify caller via call channel
  const ch = sb.channel(callChannelName(currentCall.id));
  await ch.subscribe();
  await ch.send({ type: 'broadcast', event: 'bye', payload: { reason: 'declined' } });
  setTimeout(() => ch.unsubscribe().catch(() => {}), 500);
  cleanupCall();
}

async function buildPeerConnection() {
  pc = new RTCPeerConnection({ iceServers: STUN_SERVERS });
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  pc.ontrack = (evt) => {
    const remoteVideo = $('call-remote-video');
    if (remoteVideo.srcObject !== evt.streams[0]) {
      remoteVideo.srcObject = evt.streams[0];
    }
    setCallStatus('CONNECTED');
    sb.from('calls').update({ status: 'connected' }).eq('id', currentCall.id).catch(() => {});
  };
  pc.onicecandidate = (evt) => {
    if (evt.candidate && callChannel) {
      callChannel.send({
        type: 'broadcast', event: 'ice',
        payload: { fromId: session.user.id, candidate: evt.candidate },
      });
    }
  };
  pc.onconnectionstatechange = () => {
    if (pc?.connectionState === 'failed') {
      setCallStatus('FAILED');
      sb.from('calls').update({ status: 'failed', ended_at: new Date().toISOString() })
        .eq('id', currentCall.id).catch(() => {});
      setTimeout(() => endCall(false), 1500);
    }
  };
  $('call-local-video').srcObject = localStream;
}

async function onAnswer({ answer }) {
  if (!pc) return;
  await pc.setRemoteDescription(new RTCSessionDescription(answer));
  clearTimeout(callRingTimeout);
  setCallStatus('CONNECTING');
}

async function onIce({ candidate, fromId }) {
  if (!pc || fromId === session?.user.id) return; // ignore own
  try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); }
  catch (e) { console.warn('[call] addIceCandidate failed:', e); }
}

function showActiveCallUI(statusText) {
  $('call-active').classList.add('visible');
  setCallStatus(statusText || 'CONNECTING');
}
function setCallStatus(s) { $('call-status').textContent = s; }

async function endCall(remote) {
  if (!currentCall) return;
  const callId = currentCall.id;
  const duration = Math.round((Date.now() - currentCall.startedAt) / 1000);

  if (!remote && callChannel) {
    await callChannel.send({ type: 'broadcast', event: 'bye', payload: {} }).catch(() => {});
  }
  if (sb && currentCall.role) {
    await sb.from('calls').update({
      status: 'ended', ended_at: new Date().toISOString(), duration_seconds: duration,
    }).eq('id', callId).catch(() => {});
  }
  cleanupCall();
}

function cleanupCall() {
  clearTimeout(callRingTimeout);
  if (callChannel)  { callChannel.unsubscribe().catch(() => {});  callChannel  = null; }
  if (guestChannel) { guestChannel.unsubscribe().catch(() => {}); guestChannel = null; }
  if (pc) { try { pc.close(); } catch (_) {} pc = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  $('call-local-video').srcObject  = null;
  $('call-remote-video').srcObject = null;
  $('call-active').classList.remove('visible');
  $('call-incoming').classList.remove('visible');
  const inv = document.getElementById('gcall-invite'); if (inv) inv.remove();
  currentCall = null;
}

/* ==============================================================
   Guest video call — shareable room link, no Astranov account needed
   Host (Astranov user) starts the room; guest opens the link in any browser.
   Signaling via Supabase Realtime broadcast; media P2P via STUN.
   ============================================================== */
let guestChannel = null;

async function startGuestCall(label) {
  if (currentCall) return toast('Already in a call');
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch (e) {
    toast('Camera / mic blocked: ' + e.message, 'err'); return;
  }
  localStream = stream;

  const roomId = (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2)).replace(/-/g,'').slice(0,12);
  const callLink = location.origin + '/?gcall=' + roomId;
  currentCall = { id: 'guest:' + roomId, peerId: null, peerName: label || 'guest',
                   role: 'host', startedAt: Date.now() };

  guestChannel = sb.channel('astranov:guest:' + roomId);
  guestChannel
    .on('broadcast', { event: 'guest-offer' }, async ({ payload }) => {
      if (pc) return;
      pc = new RTCPeerConnection({ iceServers: STUN_SERVERS });
      localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
      pc.ontrack = evt => {
        const rv = $('call-remote-video');
        if (rv.srcObject !== evt.streams[0]) rv.srcObject = evt.streams[0];
        setCallStatus('CONNECTED');
      };
      pc.onicecandidate = evt => {
        if (evt.candidate) guestChannel.send({ type: 'broadcast', event: 'host-ice', payload: { candidate: evt.candidate } }).catch(() => {});
      };
      pc.onconnectionstatechange = () => {
        if (pc?.connectionState === 'failed') { setCallStatus('FAILED'); setTimeout(() => endCall(false), 1500); }
      };
      await pc.setRemoteDescription(new RTCSessionDescription(payload.offer));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      await guestChannel.send({ type: 'broadcast', event: 'host-answer', payload: { answer } });
      const inv = document.getElementById('gcall-invite'); if (inv) inv.style.opacity = '0.25';
    })
    .on('broadcast', { event: 'guest-ice' }, async ({ payload }) => {
      if (pc) await pc.addIceCandidate(new RTCIceCandidate(payload.candidate)).catch(() => {});
    })
    .on('broadcast', { event: 'bye' }, () => endCall(true))
    .subscribe();

  $('call-local-video').srcObject = localStream;
  showActiveCallUI('WAITING FOR GUEST');
  _showGuestInviteOverlay(callLink, label);
}

function _showGuestInviteOverlay(link, label) {
  const old = document.getElementById('gcall-invite'); if (old) old.remove();
  const el = document.createElement('div');
  el.id = 'gcall-invite';
  el.style.cssText = 'position:absolute;top:8px;left:8px;right:8px;background:rgba(5,11,25,0.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(0,212,255,0.35);border-radius:14px;padding:14px;z-index:10';
  el.innerHTML = '<div style="font-size:9px;letter-spacing:0.18em;color:#00d4ff;margin-bottom:8px;text-transform:uppercase">Invite '
    + escapeHtml((label || 'guest').toUpperCase()) + ' to call</div>'
    + '<div style="font-size:10px;color:#7eb4ff;word-break:break-all;background:rgba(0,0,0,0.4);padding:8px;border-radius:8px;margin-bottom:10px;line-height:1.5;font-family:monospace">'
    + escapeHtml(link) + '</div>'
    + '<div style="display:flex;gap:8px">'
    + '<div id="gcall-copy" style="flex:1;text-align:center;padding:8px;border-radius:9px;border:1px solid rgba(0,212,255,0.45);color:#00d4ff;font-size:10px;letter-spacing:0.14em;cursor:pointer;transition:background 0.15s">COPY</div>'
    + '<div id="gcall-share" style="flex:1;text-align:center;padding:8px;border-radius:9px;border:1px solid rgba(126,180,255,0.3);color:#7eb4ff;font-size:10px;letter-spacing:0.14em;cursor:pointer;transition:background 0.15s">SHARE</div>'
    + '</div>';
  $('call-active').appendChild(el);
  document.getElementById('gcall-copy').onclick = () => {
    navigator.clipboard?.writeText(link).then(() => toast('Call link copied', ''));
  };
  document.getElementById('gcall-share').onclick = () => {
    if (navigator.share) navigator.share({ title: 'Astranov Video Call', text: 'Join — no account needed', url: link });
    else navigator.clipboard?.writeText(link).then(() => toast('Call link copied', ''));
  };
}

async function joinGuestCall(roomId) {
  if (currentCall) return toast('Already in a call');
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch (e) {
    toast('Camera / mic blocked: ' + e.message, 'err'); return;
  }
  localStream = stream;
  currentCall = { id: 'guest:' + roomId, peerId: null, peerName: 'host', role: 'guest', startedAt: Date.now() };

  $('call-local-video').srcObject = localStream;
  showActiveCallUI('JOINING');

  pc = new RTCPeerConnection({ iceServers: STUN_SERVERS });
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  pc.ontrack = evt => {
    const rv = $('call-remote-video');
    if (rv.srcObject !== evt.streams[0]) rv.srcObject = evt.streams[0];
    setCallStatus('CONNECTED');
  };
  pc.onconnectionstatechange = () => {
    if (pc?.connectionState === 'failed') { setCallStatus('FAILED'); setTimeout(() => endCall(false), 1500); }
  };

  guestChannel = sb.channel('astranov:guest:' + roomId);
  guestChannel
    .on('broadcast', { event: 'host-answer' }, async ({ payload }) => {
      if (pc) await pc.setRemoteDescription(new RTCSessionDescription(payload.answer));
    })
    .on('broadcast', { event: 'host-ice' }, async ({ payload }) => {
      if (pc) await pc.addIceCandidate(new RTCIceCandidate(payload.candidate)).catch(() => {});
    })
    .on('broadcast', { event: 'bye' }, () => endCall(true))
    .subscribe(async status => {
      if (status !== 'SUBSCRIBED') return;
      pc.onicecandidate = evt => {
        if (evt.candidate) guestChannel.send({ type: 'broadcast', event: 'guest-ice', payload: { candidate: evt.candidate } }).catch(() => {});
      };
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      await guestChannel.send({ type: 'broadcast', event: 'guest-offer', payload: { offer } });
    });
}

function checkGuestCallURL() {
  const roomId = new URLSearchParams(location.search).get('gcall');
  if (roomId && sb) setTimeout(() => joinGuestCall(roomId), 800);
}

/* ==============================================================
   9. Helpers
   ============================================================== */
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function formatRelative(iso) {
  const d = new Date(iso); const s = (Date.now() - d.getTime()) / 1000;
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

/* ==============================================================
   10. GFX — Canvas2D pixel shaders for corner gadgets
   Each gadget runs its own per-pixel animated shader on a shared RAF loop.
   State flags: window._gfxSignedIn, window._gfxThinking
   ============================================================== */
const GFX = (function() {
  'use strict';
  const PI2 = Math.PI * 2;
  const shaders = [];
  let rafId = 0;
  window._gfxSignedIn = false;
  window._gfxThinking = false;

  function register(canvasId, fn) {
    const canvas = $(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d', { willReadFrequently: false });
    const W = canvas.width, H = canvas.height;
    const img = ctx.createImageData(W, H);
    shaders.push({ ctx, W, H, fn, img });
  }

  function frame(ts) {
    const t = ts * 0.001;
    for (let s = 0; s < shaders.length; s++) {
      const sh = shaders[s];
      sh.fn(sh.img.data, sh.W, sh.H, t);
      sh.ctx.putImageData(sh.img, 0, 0);
    }
    rafId = requestAnimationFrame(frame);
  }

  function start() {
    if (!rafId) rafId = requestAnimationFrame(frame);
  }

  // ── DISCOVER shader — interference waves from 3 orbiting sources ──
  function shaderDiscover(d, W, H, t) {
    const cx = W * 0.5, cy = H * 0.5, R = cx * 0.98;
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const i4 = (y * W + x) << 2;
        const dx = x - cx, dy = y - cy;
        const dist2 = dx * dx + dy * dy;
        if (dist2 > R * R) { d[i4 + 3] = 0; continue; }
        const dist = Math.sqrt(dist2);
        const nr = dist / R;

        // 3 orbiting sources — interference pattern
        let wave = 0;
        const speed = t * 2.2;
        for (let s = 0; s < 3; s++) {
          const sa = (s / 3) * PI2 + t * (0.38 + s * 0.11);
          const ox = R * 0.52 * Math.cos(sa);
          const oy = R * 0.52 * Math.sin(sa);
          const sd = Math.sqrt((dx - ox) * (dx - ox) + (dy - oy) * (dy - oy));
          wave += Math.sin(sd * 0.32 - speed);
        }
        wave /= 3;

        // Radial standing wave from centre
        const radial = Math.sin(nr * 13 - t * 1.8) * (1.0 - nr * 0.6);
        let v = (wave * 0.55 + radial * 0.45) * 0.5 + 0.5;

        // Edge vignette
        const edge = Math.max(0, 1.0 - nr * nr * nr);
        const alpha = edge * v * 175;

        d[i4]     = Math.floor(v * 8);
        d[i4 + 1] = Math.floor(v * 165);
        d[i4 + 2] = Math.floor(255);
        d[i4 + 3] = Math.floor(alpha);
      }
    }
  }

  // ── ME shader — galaxy spiral, teal signed-in / violet signed-out ──
  function shaderMe(d, W, H, t) {
    const cx = W * 0.5, cy = H * 0.5, R = cx * 0.98;
    const signedIn = window._gfxSignedIn;
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const i4 = (y * W + x) << 2;
        const dx = x - cx, dy = y - cy;
        const dist2 = dx * dx + dy * dy;
        if (dist2 > R * R) { d[i4 + 3] = 0; continue; }
        const dist = Math.sqrt(dist2);
        const nr = dist / R;
        const angle = Math.atan2(dy, dx);

        // Spiral vortex: angle twisted by radius and time
        const twist = angle + nr * 4.5 + t * 1.6;
        const spiral = Math.sin(twist * 5) * 0.5 + 0.5;

        // Pulsing distance rings
        const rings = Math.sin(nr * 15 - t * 2.2) * 0.5 + 0.5;

        // Bright central star
        const star = Math.max(0, 1.0 - nr * 4.5);

        let v = spiral * 0.55 + rings * 0.35 + star * 0.10;

        const edge = Math.max(0, 1.0 - nr * nr);
        const alpha = edge * v * 165;

        if (signedIn) {
          d[i4]     = Math.floor(v * 8);
          d[i4 + 1] = Math.floor(v * 230);
          d[i4 + 2] = Math.floor(v * 170);
        } else {
          d[i4]     = Math.floor(v * 90);
          d[i4 + 1] = Math.floor(v * 55);
          d[i4 + 2] = Math.floor(v * 255);
        }
        d[i4 + 3] = Math.floor(alpha);
      }
    }
  }

  // ── LOCATE shader — sweeping radar arm + concentric range rings ──
  function shaderLocate(d, W, H, t) {
    const cx = W * 0.5, cy = H * 0.5, R = cx * 0.98;
    const sweep = (t * 1.5) % PI2;
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const i4 = (y * W + x) << 2;
        const dx = x - cx, dy = y - cy;
        const dist2 = dx * dx + dy * dy;
        if (dist2 > R * R) { d[i4 + 3] = 0; continue; }
        const dist = Math.sqrt(dist2);
        const nr = dist / R;
        const angle = Math.atan2(dy, dx);

        // Sweeping arm: trailing glow behind sweep angle
        let diff = angle - sweep;
        diff = ((diff % PI2) + PI2) % PI2;  // 0..2PI
        const arm = diff < 1.9 ? Math.pow(1.0 - diff / 1.9, 2.2) : 0;

        // Terrain grid: concentric rings + faint radial lines
        const rings = Math.pow(Math.max(0, Math.sin(nr * 10 + 0.3)), 4) * 0.55;
        const spokes = Math.pow(Math.max(0, Math.cos(angle * 8)), 10) * 0.12;

        let v = arm * 0.75 + rings * 0.20 + spokes * 0.05;
        v = Math.min(1.0, v);

        const edge = Math.max(0, 1.0 - nr * nr);
        const alpha = edge * v * 210;

        d[i4]     = Math.floor(v * 25);
        d[i4 + 1] = Math.floor(v * 240);
        d[i4 + 2] = Math.floor(v * 95);
        d[i4 + 3] = Math.floor(alpha);
      }
    }
  }

  // ── AI shader — neural field, blue at rest / amber while thinking ──
  function shaderAI(d, W, H, t) {
    const cx = W * 0.5, cy = H * 0.5, R = cx * 0.98;
    const thinking = window._gfxThinking;
    const speed = thinking ? t * 4.5 : t * 1.8;
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const i4 = (y * W + x) << 2;
        const dx = x - cx, dy = y - cy;
        const dist2 = dx * dx + dy * dy;
        if (dist2 > R * R) { d[i4 + 3] = 0; continue; }
        const dist = Math.sqrt(dist2);
        const nr = dist / R;
        const angle = Math.atan2(dy, dx);

        // Undulating neural waves
        const w1 = Math.sin(nr * 9 - speed);
        const w2 = Math.sin(angle * 3 + t * (thinking ? 2.5 : 0.9));
        let v = (w1 * 0.55 + w2 * 0.45) * 0.5 + 0.5;

        // Bright edge ring (the "border" visual)
        const edgeRing = Math.exp(-Math.pow((nr - 0.88) * 7, 2)) * 0.9;
        v = Math.min(1.0, v * 0.6 + edgeRing);

        const edge = Math.max(0, 1.0 - nr * 1.08);
        const alpha = edge * v * 150;

        if (thinking) {
          d[i4]     = Math.floor(v * 255);
          d[i4 + 1] = Math.floor(v * 140);
          d[i4 + 2] = Math.floor(v * 20);
        } else {
          d[i4]     = Math.floor(v * 15);
          d[i4 + 1] = Math.floor(v * 125);
          d[i4 + 2] = Math.floor(v * 255);
        }
        d[i4 + 3] = Math.floor(alpha);
      }
    }
  }

  return { register, start, shaderDiscover, shaderMe, shaderLocate, shaderAI };
})();

/* ==============================================================
   11. Boot
   ============================================================== */
window.addEventListener('load', () => {
  bootCesium();          // async, fires-and-forgets; sets viewer when ready
  bootSupabase();        // safe to call before viewer ready
  bootServiceWorker();   // register SW for push + offline shell
  checkGuestCallURL();   // auto-join if opened via ?gcall= invite link

  // Boot canvas shaders
  try {
    GFX.register('gfx-discover', GFX.shaderDiscover);
    GFX.register('gfx-me',       GFX.shaderMe);
    GFX.register('gfx-locate',   GFX.shaderLocate);
    GFX.register('gfx-ai',       GFX.shaderAI);
    GFX.start();
  } catch (e) {
    console.warn('[GFX] shader boot failed:', e);
  }
});

// Pause Cesium render when tab hidden (battery)
document.addEventListener('visibilitychange', () => {
  if (viewer) viewer.useDefaultRenderLoop = !document.hidden;
});
</script>
