async function placeOrder() {
  if (!session) return openAuthPanel();
  if (!_currentVendor || !_cart.length) return;
  const p = _currentVendor;
  const sub  = _cart.reduce((s, it) => s + it.qty * it.price, 0);
  const plat = Math.max(1, Math.round(sub * PRICING.platform_fee_pct));
  const fee  = computeDeliveryFee({ lat: p.lat, lng: p.lng }, { lat: _userLat, lng: _userLng });
  const total = sub + fee.fee + plat;
  toast('Sending order…');
  try {
    const { data, error } = await sb.functions.invoke('order-intake', { body: {
      vendor_id: p.id,
      vendor: { id: p.id, osm_id: p.osm_id || null, name: p.name, category: p.category || 'shop', lat: p.lat, lng: p.lng, address: p.address || {}, tags: p.tags || {} },
      items: _cart,
      calc: { subtotal: sub, delivery_fee: fee.fee, platform_fee: plat, total, currency: 'EUR', km: fee.km, breakdown: fee.breakdown },
      delivery_lat: _userLat, delivery_lng: _userLng, delivery_address: '', notes: '',
    }});
    if (error) throw error;
    if (!data?.ok) throw new Error(data?.error || 'order failed');
    toast('Order placed · ' + data.order.short_id, 'ok');
    _cart = [];
    try { await loadProfile(); } catch (_) {}
    setTimeout(() => openOrderTrack(data.order.id), 250);
  } catch (e) {
    const msg = String(e.message || e);
    if (msg.includes('insufficient_funds') || msg.includes('402')) {
      toast('Not enough euros — top up to order', 'err');
      try { await loadProfile(); } catch (_) {}

// REAL-TIME DRIVER TRACKING (LAW §11 driver clause, queue #4).
// Driver position lands as a moving emerald orb on the globe with a
// thin gold polyline drawn from driver → dropoff. Updates every ping.
// The polyline follows REAL roads via OSRM (router.project-osrm.org) so
// the customer sees the driver curling through streets, not cutting
// across buildings. Falls back to a straight geodesic if OSRM is down.
const _driverEntities = new Map();   // orderId → { orb, line, routedKey, routing }
async function _osrmRoute(fromLng, fromLat, toLng, toLat) {
  const url = `https://router.project-osrm.org/route/v1/driving/${fromLng},${fromLat};${toLng},${toLat}?overview=full&geometries=geojson`;
  const r = await fetch(url, { mode: 'cors' });
  if (!r.ok) throw new Error('OSRM ' + r.status);
  const j = await r.json();
  const route = j?.routes?.[0];
  const coords = route?.geometry?.coordinates;
  if (!Array.isArray(coords) || coords.length < 2) throw new Error('OSRM no route');
  const flat = [];
  for (const c of coords) { flat.push(c[0], c[1]); }
  return { positions: flat, distanceM: Number(route.distance) || 0, durationS: Number(route.duration) || 0 };
}
function _drawDriverPing(orderId, dLat, dLng, toLat, toLng) {
  if (!viewer || !Number.isFinite(dLat) || !Number.isFinite(dLng)) return;
  let rec = _driverEntities.get(orderId);
  const pos  = Cesium.Cartesian3.fromDegrees(dLng, dLat);
  if (!rec) {
    const orb = viewer.entities.add({
      position: pos,
      point: {
        pixelSize: new Cesium.CallbackProperty(() => 14 + 6 * (0.5 + 0.5 * Math.sin(Date.now()/280)), false),
        color: Cesium.Color.fromCssColorString('#7eebb4'),
        outlineColor: Cesium.Color.fromCssColorString('#7eebb4').withAlpha(0.45),
        outlineWidth: 4,
        disableDepthTestDistance: Number.POSITIVE_INFINITY,
      },
      label: { text: '◈ driver', font: '600 11px Inter, sans-serif',
        fillColor: Cesium.Color.fromCssColorString('#cde3ff'),
        outlineColor: Cesium.Color.fromCssColorString('#020a1c'), outlineWidth: 2,
        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
        pixelOffset: new Cesium.Cartesian2(0, -22),
        distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0, 600_000),
        disableDepthTestDistance: Number.POSITIVE_INFINITY,
      },
    });
    let line = null;
    if (Number.isFinite(toLat) && Number.isFinite(toLng)) {
      line = viewer.entities.add({
        polyline: {
          positions: Cesium.Cartesian3.fromDegreesArray([dLng, dLat, toLng, toLat]),
          width: 3,
          material: new Cesium.PolylineDashMaterialProperty({
            color: Cesium.Color.fromCssColorString('#ffd47e').withAlpha(0.85), dashLength: 12,
          }),
          clampToGround: true, arcType: Cesium.ArcType.GEODESIC,
        },
      });
    }
    rec = { orb, line, toLat, toLng, routedKey: null, routing: false };
    _driverEntities.set(orderId, rec);
  } else {
    rec.orb.position = pos;
  }
  // OSRM road-following route. Re-fetch when the driver has moved
  // >120 m from the last routed origin (cheap budget guard). Falls back
  // silently to whatever positions the polyline currently holds.
  if (rec.line && Number.isFinite(rec.toLat) && Number.isFinite(rec.toLng) && !rec.routing) {
    const key = `${dLat.toFixed(3)},${dLng.toFixed(3)}→${rec.toLat.toFixed(4)},${rec.toLng.toFixed(4)}`;
    if (key !== rec.routedKey) {
      rec.routing = true;
      _osrmRoute(dLng, dLat, rec.toLng, rec.toLat)
        .then(({ positions, distanceM, durationS }) => {
          if (!_driverEntities.has(orderId)) return;
          rec.line.polyline.positions = Cesium.Cartesian3.fromDegreesArray(positions);
          rec.routedKey = key;
          rec.distanceM = distanceM;
          rec.durationS = durationS;
          _renderOrderEta(orderId, distanceM, durationS);
        })
        .catch(() => { /* keep straight line — better than nothing */ })
        .finally(() => { rec.routing = false; });
    }
  }
}
function _killDriverTrack(orderId) {
  const rec = _driverEntities.get(orderId);
  if (!rec || !viewer) return;
  try { if (rec.orb)  viewer.entities.remove(rec.orb);  } catch (_) {}
  try { if (rec.line) viewer.entities.remove(rec.line); } catch (_) {}
  _driverEntities.delete(orderId);
}

// DRIVER side — every time advanceDelivery fires the driver's GPS is
// captured and broadcast on the per-order channel so the customer sees
// the pin move. We broadcast continuously while there's an active run.
let _driverPingInterval = 0, _driverWatchId = 0;
function _driverPingsStart() {
  if (_driverPingInterval) return;
  // Continuous GPS while running — drivers move; the customer should see it.
  if (navigator.geolocation?.watchPosition && !_driverWatchId) {
    try {
      _driverWatchId = navigator.geolocation.watchPosition(
        pos => { _userLat = pos.coords.latitude; _userLng = pos.coords.longitude; _driverPingsTick(); },
        () => {},
        { enableHighAccuracy: true, maximumAge: 4000, timeout: 12000 }
      );
    } catch (_) {}
  }
  _driverPingInterval = setInterval(_driverPingsTick, 8_000);
  _driverPingsTick();
}
function _driverPingsStop() {
  clearInterval(_driverPingInterval); _driverPingInterval = 0;
  if (_driverWatchId) { try { navigator.geolocation.clearWatch(_driverWatchId); } catch (_) {} _driverWatchId = 0; }
}
async function _driverPingsTick() {
  if (!session || !profile?.is_owner) return;
  if (_userLat == null) return;
  try {
    const r = await sb.from('deliveries').select('id').eq('runner_id', session.user.id)
      .in('status', ['accepted','en_route','picked_up']);
    const active = r.data || []; if (!active.length) { _driverPingsStop(); return; }
    // Each active delivery → broadcast our GPS on its order channel. We
    // resolve orderId from the delivery's description prefix ('Order #shortId · …')
    for (const d of active) {
      const desc = (d.description || '');
      const m = desc.match(/^Order\s+([A-Z0-9-]+)/i);
      if (!m) continue;
      const { data: o } = await sb.from('orders').select('id').eq('short_id', m[1]).single();
      if (!o) continue;
      const ch = sb.channel('order-' + o.id);
      await ch.subscribe();
      await ch.send({ type: 'broadcast', event: 'driver-ping', payload: { order_id: o.id, lat: _userLat, lng: _userLng } });
      ch.unsubscribe();
    }
  } catch (_) {}
}

function _renderOrderEta(orderId, distanceM, durationS) {
  const el = document.getElementById('order-eta-' + orderId);

  const hh = String(arrival.getHours()).padStart(2, '0');
  const mm = String(arrival.getMinutes()).padStart(2, '0');
  const t = el.querySelector('.eta-text');
  if (t) t.textContent = `Driver ${km.toFixed(1)} km away · ETA ${min} min · arriving ~${hh}:${mm}`;

/* ============================== Compute fleet — §26 #1 ============================== */
// Browser-device pooling MVP. Every device with WebGPU and an active
// own-mind announces itself on a 'fleet:compute' Realtime channel.
// Discovery only in this cycle; routing tasks across devices arrives
// next. The DeBug ORB / compute-donation reward (13 AVC per device-hour)
// is the economic spine and lives in the queue.
const FLEET = {
  id: null,         // per-tab id
  channel: null,
  peers: new Map(), // peerId → { gpu, model, last_seen, lat, lng, own_mind }
  pingTimer: 0,
  inflight: new Map(), // requestId → { resolve, t0, replies: [] }
};
function _fleetHasOwnMindPeer() {
  for (const p of FLEET.peers.values()) if (p.own_mind) return true;
  return false;
}
// Ask any fleet peer with own-mind to answer this prompt for us. The
// FIRST valid reply within 9 s wins. If none arrives we resolve null
// so callBrain falls through to the rented organs.
function _fleetAskPeers(prompt, opts) {
  if (!FLEET.channel || !sb) return Promise.resolve(null);
  const reqId = (crypto.randomUUID && crypto.randomUUID()) || (Date.now() + ':' + Math.random());
  const history = opts?.history || aicycleHistory.slice(-6);
  return new Promise((resolve) => {
    const t0 = Date.now();
    const timer = setTimeout(() => { if (FLEET.inflight.delete(reqId)) resolve(null); }, 9_000);
    FLEET.inflight.set(reqId, {
      resolve: (payload) => {
        clearTimeout(timer);
        const reply = String(payload?.reply || '').trim();
        if (!reply) return resolve(null);
        resolve({
          reply,
          meta: `via fleet · ${String(payload?.node || '').slice(0,8)} · ${((Date.now()-t0)/1000).toFixed(1)}s · own-mind`,
          raw: { engine: 'fleet', engineLabel: 'Fleet', model: payload?.model || 'own-mind', latencyMs: Date.now() - t0 },
        });
      },
    });
    FLEET.channel.send({ type: 'broadcast', event: 'request', payload: {
      req: reqId, from: FLEET.id, prompt: String(prompt).slice(0, 4000),
      history: history.slice(-6),
    }}).catch(()=>{});
  });
}
function _alivePillUpdate() {
  const el = document.getElementById('alive-pill');
  if (!el) return;
  const n = 1 + FLEET.peers.size;     // self + heard peers
  el.querySelector('.n').textContent = n;
  el.classList.add('on');
}
function _fleetInit() {
  if (!sb) return;
  try { FLEET.id = (localStorage.getItem('astranov.sid') || crypto.randomUUID()); } catch (_) { FLEET.id = String(Date.now()) + Math.random(); }
  try { FLEET.channel?.unsubscribe(); } catch (_) {}
  FLEET.channel = sb.channel('fleet:compute', { config: { broadcast: { ack: false } } });
  FLEET.channel.on('broadcast', { event: 'hello' }, ({ payload }) => {
    if (!payload || payload.id === FLEET.id) return;
    FLEET.peers.set(payload.id, { ...payload, last_seen: Date.now() });
    _alivePillUpdate();
  });
  FLEET.channel.on('broadcast', { event: 'bye' }, ({ payload }) => {
    if (payload?.id) FLEET.peers.delete(payload.id);
    _alivePillUpdate();
  });
  // Serve inference: if WE have own-mind ready and a peer asks, answer.
  // First responder wins on the requesting side; we only fire if local.
  FLEET.channel.on('broadcast', { event: 'request' }, async ({ payload }) => {
    if (!payload || payload.from === FLEET.id) return;
    if (!_localReady) return;
    try {
      const out = await localBrainReply(payload.prompt, { history: payload.history || [] });
      await FLEET.channel.send({ type: 'broadcast', event: 'response', payload: {
        req: payload.req, to: payload.from, node: FLEET.id,
        reply: out.reply, model: LOCAL_MODEL,
      }});
    } catch (_) {}
  });
  // Receive a fleet reply for OUR request.
  FLEET.channel.on('broadcast', { event: 'response' }, ({ payload }) => {
    if (!payload || payload.to !== FLEET.id) return;
    const slot = FLEET.inflight.get(payload.req);
    if (slot) { FLEET.inflight.delete(payload.req); slot.resolve(payload); }
  });
  FLEET.channel.subscribe();
  // Announce ourselves once and every 30 s. Includes own-mind status so
  // a fleet that knows what each node CAN do can route work later.
  const ping = () => {
    if (!FLEET.channel) return;
    FLEET.channel.send({ type: 'broadcast', event: 'hello', payload: {
      id: FLEET.id,
      gpu: localBrainSupported(),
      own_mind: !!_localReady,
      model: _localReady ? LOCAL_MODEL : null,
      lat: _userLat, lng: _userLng,
      ts: Date.now(),
    }}).catch(()=>{});
  };
  ping();
  _alivePillUpdate();
  clearInterval(FLEET.pingTimer);
  FLEET.pingTimer = setInterval(() => {
    ping();
    // Evict peers we haven't heard from in 75 s.
    const cutoff = Date.now() - 75_000;
    for (const [id, p] of FLEET.peers) if (p.last_seen < cutoff) FLEET.peers.delete(id);
    _alivePillUpdate();
  }, 30_000);
  // Polite hangup so peers can drop us instantly.
  window.addEventListener('beforeunload', () => {
    try { FLEET.channel?.send({ type: 'broadcast', event: 'bye', payload: { id: FLEET.id } }); } catch (_) {}
  });
}

// Camera/file → downscale → Supabase Storage → public URL into the
// photo field. The vendor never has to host an image anywhere else.
async function vendorPhotoUpload(vendorId, inputEl) {
  const file = inputEl.files && inputEl.files[0];
  if (!file) return;
  if (!session) return toast('Sign in first', 'err');
  const status = $('vm-photo-status');
  const say = (t) => { if (status) status.textContent = t; };
  try {
    say('Processing photo…');
    const blob = await _downscaleImage(file, 1280, 0.82);
    say(`Uploading ${(blob.size/1024).toFixed(0)} KB…`);
    const ext  = blob.type === 'image/webp' ? 'webp' : 'jpg';
    const path = `${session.user.id}/${vendorId}-${Date.now()}.${ext}`;
    const up = await sb.storage.from('vendor-photos').upload(path, blob, {
      contentType: blob.type, upsert: false,
    });
    if (up.error) throw up.error;
    const { data } = sb.storage.from('vendor-photos').getPublicUrl(path);
    if (!data?.publicUrl) throw new Error('no public URL returned');
    $('vm-photo').value = data.publicUrl;
    say('✓ Photo ready — publish the item');
    toast('Photo uploaded', 'ok');
  } catch (e) {
    say('');
    toast('Photo upload failed: ' + (e.message || e), 'err');
  } finally {
    inputEl.value = '';
  }
}
// Downscale via canvas so a 12 MP phone shot becomes a ~150 KB web
// image. Prefers WebP; falls back to JPEG where the encoder refuses.
function _downscaleImage(file, maxDim, quality) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      let { width: w, height: h } = img;
      if (w > maxDim || h > maxDim) {
        const k = maxDim / Math.max(w, h);
        w = Math.round(w * k); h = Math.round(h * k);
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      c.toBlob(webp => {
        if (webp && webp.type === 'image/webp') return resolve(webp);
        c.toBlob(jpg => jpg ? resolve(jpg) : reject(new Error('image encode failed')), 'image/jpeg', quality);
      }, 'image/webp', quality);
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('cannot read image')); };
    img.src = url;
  });
}

// Vendor order desk — the missing third corner of the order loop
// (customer panel and driver panel already exist). Lists open orders
// across every vendor the signed-in user owns; Accept / Preparing /
// Cancel call the SECURITY DEFINER vendor_advance_order RPC, which
// verifies ownership and lawful transitions server-side. After every
// advance we broadcast 'status' on the order channel so the customer's
// tracker repaints live.
let _vendorOrdersTimer = 0;
const _vendorOrderChannels = [];
function _vendorOrdersUnlisten() {
  for (const ch of _vendorOrderChannels) { try { ch.unsubscribe(); } catch (_) {} }
  _vendorOrderChannels.length = 0;
}
async function openVendorOrders() {
  if (!session) return openAuthPanel();
  openPanel(`
    <h2>Order desk</h2>
    <p style="color:var(--bone);opacity:0.8">Incoming orders for your business. Accept, prepare, hand to the driver.</p>
    <div id="vo-list">Loading…</div>
  `);
  clearInterval(_vendorOrdersTimer);
  _vendorOrdersTimer = setInterval(() => {
    if (document.getElementById('vo-list')) _vendorOrdersRefresh();
    else { clearInterval(_vendorOrdersTimer); _vendorOrdersUnlisten(); }
  }, 20_000);
  _vendorOrdersRefresh();
  // Instant pings: order-intake broadcasts new_order on the per-vendor
  // channel the moment a customer pays. Subscribe for every vendor we
  // own; the 20 s poll stays as the safety net.
  _vendorOrdersUnlisten();
  try {
    const mv = await sb.from('vendors').select('id').eq('owner_id', session.user.id);
    for (const v of (mv.data || [])) {
      const ch = sb.channel('vendor-orders-' + v.id)
        .on('broadcast', { event: 'new_order' }, () => {
          toast('◈ New order', 'ok');
          _vendorOrdersRefresh();
        });
      ch.subscribe();
      _vendorOrderChannels.push(ch);
    }
  } catch (_) {}
}
async function _vendorOrdersRefresh() {
  const out = document.getElementById('vo-list'); if (!out) return;
  try {
    const mv = await sb.from('vendors').select('id,name').eq('owner_id', session.user.id);
    if (mv.error) throw mv.error;
    const mine = mv.data || [];
    if (!mine.length) {
      out.innerHTML = `<p>No business listed yet.</p>
        <button class="pbtn ok" onclick="openVendorClaim()">List my business</button>`;
      return;
    }
    const byId = Object.fromEntries(mine.map(v => [String(v.id), v.name]));
    const r = await sb.from('orders').select('*')
      .in('vendor_id', mine.map(v => String(v.id)))
      .in('status', ['pending', 'accepted', 'preparing'])
      .order('created_at', { ascending: true });
    if (r.error) throw r.error;
    const rows = r.data || [];
    out.innerHTML = rows.length ? rows.map(o => {
      const total = Number(o.calc?.total ?? 0);
      const items = (o.items || []).map(it => `${it.qty}× ${escapeHtml(it.name)}`).join(' · ');
      const age = Math.max(0, Math.round((Date.now() - new Date(o.created_at).getTime()) / 60000));
      const next = o.status === 'pending'
        ? `<button class="pbtn ok" onclick="vendorOrderAdvance('${o.id}','accepted')">Accept</button>`
        : o.status === 'accepted'
          ? `<button class="pbtn ok" onclick="vendorOrderAdvance('${o.id}','preparing')">Start preparing</button>`
          : `<span style="color:var(--emerald);font-size:12px">PREPARING — driver picks up</span>`;
      return `
      <div class="card">
        <div class="ct">#${escapeHtml(o.short_id || o.id.slice(0,8))} · ${escapeHtml(byId[o.vendor_id] || '')} ·
          <span style="color:${o.status === 'pending' ? 'var(--gold)' : 'var(--emerald)'}">${escapeHtml(o.status.toUpperCase())}</span>
          <span style="opacity:0.5;font-variant-numeric:tabular-nums"> · ${age} min ago</span></div>
        <div class="cm">${items}</div>
        <div class="row"><span>Total</span><span>€${total.toFixed(2)}</span></div>
        <div style="margin-top:6px;display:flex;gap:8px">${next}
          ${(o.status === 'pending' || o.status === 'accepted')
            ? `<button class="pbtn danger" onclick="vendorOrderAdvance('${o.id}','cancelled')">Cancel</button>` : ''}
        </div>
      </div>`;
    }).join('') : '<p>No open orders. They will appear here the moment a customer pays.</p>';
  } catch (e) { out.textContent = 'Failed: ' + (e.message || e); }
}
async function vendorOrderAdvance(orderId, st) {
  try {
    const { data, error } = await sb.rpc('vendor_advance_order', { p_order_id: orderId, p_new_status: st });
    if (error) throw error;
    if (data?.ok === false) throw new Error(data.error || 'rejected');
    toast(st === 'cancelled' ? 'Order cancelled' : 'Order ' + st, st === 'cancelled' ? 'err' : 'ok');
    // Wake the customer's tracker.
    try {
      const ch = sb.channel('order-' + orderId);
      await ch.subscribe();
      await ch.send({ type: 'broadcast', event: 'status', payload: { order_id: orderId, status: st } });
      ch.unsubscribe();
    } catch (_) {}
    _vendorOrdersRefresh();
  } catch (e) { toast(e.message || String(e), 'err'); }
}
async function vendorMenuRemove(vendorId, idx) {

    if (u.error) throw u.error;

      return `<div class="card" onclick='${fn}'><div class="ct">${escapeHtml(p.display_name)}</div><div class="cm">◈ tap to call</div></div>`;
    }).join('') : '<p>Nobody on the globe yet.</p>';
  } catch (e) { $('peers-list').textContent = e.message; }
}

/* ============================== Stellar Navigation — sextant / celestial fix ============================== */
// LAW §5 #5: dematerialised by default. Type 'stellar' or 'sextant' to

async function openStellarPanel() {
  if (_userLat == null) await locateMe();
  const now = new Date();
  const jd  = _julianDate(now);
  const sun = _sunPosition(jd);
  const moon= _moonPosition(jd);
  const pol = _polarisPosition();
  const lat0= _userLat ?? 0;
  const lng0= _userLng ?? 0;
  const lst = _localSiderealTime(jd, lng0);
  const haS = lst - sun.ra;
  const haM = lst - moon.ra;
  const haP = lst - pol.ra;
  const alt = _altitude(sun.dec, haS, lat0);
  const az  = _azimuth(sun.dec, haS, lat0);
  const altM= _altitude(moon.dec, haM, lat0);
  const azM = _azimuth(moon.dec, haM, lat0);
  const altP= _altitude(pol.dec,  haP, lat0);
  const azP = _azimuth(pol.dec,  haP, lat0);
  const altDeg = alt * 180 / Math.PI;
  const azDeg  = az  * 180 / Math.PI;
  const altMDeg= altM* 180 / Math.PI;
  const azMDeg = azM * 180 / Math.PI;
  const altPDeg= altP* 180 / Math.PI;

// Marcq Saint-Hilaire intercept method, single-shot LOP and multi-shot fix.
// Sights are kept on _SUMNER_SHOTS so the captain can shoot 2-3 bodies
// and accumulate them into a real fix.
const _SUMNER_SHOTS = [];
function _sumnerBodyPos(name, jd, lst) {
  if (name === 'sun')     return _sunPosition(jd);
  if (name === 'moon')    return _moonPosition(jd);
  if (name === 'polaris') return _polarisPosition();
  if (name.startsWith('star:')) {
    const s = NAV_STARS.find(x => x.name === name.slice(5));
    if (s) return { ra: s.ra * Math.PI / 12, dec: s.dec * Math.PI / 180 };
  }
  return null;
}
function _sumnerShot() {
  const body = ($('sn-body')?.value || 'sun');
  const degRaw = parseFloat($('sn-alt-d')?.value);
  const minRaw = parseFloat($('sn-alt-m')?.value);
  const utcStr = $('sn-utc')?.value;
  if (!Number.isFinite(degRaw)) return toast('Enter the observed altitude (degrees)', 'err');
  const Ho = degRaw + (Number.isFinite(minRaw) ? minRaw / 60 : 0);
  if (Ho < -2 || Ho > 90) return toast('Altitude out of range', 'err');
  const t = utcStr ? new Date(utcStr) : new Date();
  if (Number.isNaN(t.getTime())) return toast('Bad UTC time', 'err');
  if (_userLat == null || _userLng == null) return toast('Need an assumed position (GPS or manual)', 'err');
  const jd = _julianDate(t);
  const lst = _localSiderealTime(jd, _userLng);
  const pos = _sumnerBodyPos(body, jd, lst);
  if (!pos) return toast('Unknown body', 'err');
  const ha = lst - pos.ra;
  const Hc = _altitude(pos.dec, ha, _userLat) * 180 / Math.PI;
  const Az = _azimuth(pos.dec, ha, _userLat) * 180 / Math.PI;
  const intercept = (Ho - Hc) * 60; // nautical miles (1' arc on great circle)
  _SUMNER_SHOTS.push({ body, Ho, Hc, Az, intercept, t: t.toISOString(), ap: { lat: _userLat, lng: _userLng } });
  if (_SUMNER_SHOTS.length > 5) _SUMNER_SHOTS.splice(0, _SUMNER_SHOTS.length - 5);
  _sumnerRender();
}
function _sumnerReset() { _SUMNER_SHOTS.length = 0; _sumnerRender(); }
// Two LOPs as lines in local tangent plane (E-N), then intersect. Each LOP
// passes through the foot point (AP shifted by intercept nm along Az) and
// is perpendicular to Az. Returns offset_E_nm, offset_N_nm from AP.
function _sumnerFixFromShots(shots) {
  const d2r = Math.PI / 180;
  const lines = shots.map(s => {
    const az = s.Az * d2r;
    const fx = s.intercept * Math.sin(az); // east offset of foot (nm)
    const fy = s.intercept * Math.cos(az); // north offset of foot (nm)
    // LOP direction perpendicular to az (in plane)
    const ux = -Math.cos(az), uy = Math.sin(az);
    return { fx, fy, ux, uy };
  });
  // Least-squares: each LOP is a line {p = (fx,fy) + t·(ux,uy)}; the
  // perpendicular distance from (x,y) to that line is (x-fx)·(-uy) +
  // (y-fy)·(ux). Sum of squares minimised by normal equations.
  let A11=0, A12=0, A22=0, b1=0, b2=0;
  for (const L of lines) {
    const nx = -L.uy, ny = L.ux;
    const c = L.fx * nx + L.fy * ny;
    A11 += nx*nx; A12 += nx*ny; A22 += ny*ny;
    b1  += nx*c;  b2  += ny*c;
  }
  const det = A11*A22 - A12*A12;
  if (Math.abs(det) < 1e-6) return null;
  const x = ( A22*b1 - A12*b2) / det;
  const y = (-A12*b1 + A11*b2) / det;
  return { offE: x, offN: y };
}
function _sumnerRender() {
  const out = $('sn-result'); if (!out) return;
  if (!_SUMNER_SHOTS.length) { out.innerHTML = '<p style="font-size:11px;color:rgba(168,200,238,0.45)">No shots yet. Compute one to get a line of position.</p>'; return; }
  const last = _SUMNER_SHOTS[_SUMNER_SHOTS.length - 1];
  const dir  = last.intercept >= 0 ? 'TOWARD' : 'AWAY FROM';
  const interceptColor = last.intercept >= 0 ? 'var(--emerald)' : 'var(--crimson)';
  let html = `
    <div style="padding:10px 12px;border-radius:10px;background:rgba(74,166,255,0.08);border:1px solid rgba(74,166,255,0.30)">
      <div style="font-size:12px;color:var(--bone);opacity:0.85">Last shot · ${escapeHtml(last.body)}</div>
      <div class="row"><span>Observed (Ho)</span><span>${last.Ho.toFixed(2)}°</span></div>
      <div class="row"><span>Calculated (Hc)</span><span>${last.Hc.toFixed(2)}°</span></div>
      <div class="row"><span>Azimuth</span><span>${last.Az.toFixed(1)}° true</span></div>
      <div class="row"><span style="color:${interceptColor}">Intercept</span>
        <span style="color:${interceptColor};font-variant-numeric:tabular-nums">${Math.abs(last.intercept).toFixed(1)} nm ${dir}</span>
      </div>
      <div style="font-size:11px;color:rgba(168,200,238,0.6);margin-top:4px">LOP is perpendicular to ${last.Az.toFixed(0)}°, passing through AP shifted ${last.intercept.toFixed(1)} nm along that bearing.</div>
    </div>`;
  if (_SUMNER_SHOTS.length >= 2) {
    const fix = _sumnerFixFromShots(_SUMNER_SHOTS.slice(-3));
    if (fix) {
      // Convert local-tangent (nm) → lat/lng offsets from AP. 1° lat ≈ 60 nm.
      const ap = _SUMNER_SHOTS[_SUMNER_SHOTS.length - 1].ap;
      const dLat = fix.offN / 60;
      const dLng = fix.offE / (60 * Math.cos(ap.lat * Math.PI / 180));
      const fixLat = ap.lat + dLat;
      const fixLng = ap.lng + dLng;
      const moved = Math.sqrt(fix.offE**2 + fix.offN**2);
      html += `
        <div style="margin-top:10px;padding:10px 12px;border-radius:10px;background:rgba(126,235,180,0.08);border:1px solid rgba(126,235,180,0.35)">
          <div style="font-size:12px;color:var(--emerald);font-weight:700;letter-spacing:0.18em">◈ FIX (${_SUMNER_SHOTS.length} LOPs)</div>
          <div class="row" style="margin-top:6px"><span>Position</span><span style="font-variant-numeric:tabular-nums">${fixLat.toFixed(4)}°, ${fixLng.toFixed(4)}°</span></div>
          <div class="row"><span>Offset from AP</span><span style="font-variant-numeric:tabular-nums">${moved.toFixed(1)} nm</span></div>
        </div>`;
    }
  }
  html += `<details style="margin-top:8px"><summary style="font-size:11px;color:rgba(168,200,238,0.65);cursor:pointer">All shots (${_SUMNER_SHOTS.length})</summary>
    ${_SUMNER_SHOTS.map((s, i) => `<div class="row" style="font-size:11px;color:rgba(168,200,238,0.6)"><span>${i+1}. ${escapeHtml(s.body)}</span><span>${s.intercept.toFixed(1)} nm · ${s.Az.toFixed(0)}°</span></div>`).join('')}
  </details>`;
  out.innerHTML = html;
}
function _julianDate(d) {
  return d.getTime() / 86400000 + 2440587.5;
}
function _sunPosition(jd) {
  // Low-precision sun: NOAA / Meeus chapter 25.
  const T = (jd - 2451545.0) / 36525;
  const L = (280.46646 + T * (36000.76983 + T * 0.0003032)) % 360;
  const M = (357.52911 + T * (35999.05029 - T * 0.0001537)) * Math.PI / 180;
  const e = 0.016708634 - T * (0.000042037 + T * 0.0000001267);
  const C = (1.914602 - T * (0.004817 + T * 0.000014)) * Math.sin(M)
          + (0.019993 - 0.000101 * T) * Math.sin(2 * M)
          + 0.000289 * Math.sin(3 * M);
  const trueLong = (L + C) * Math.PI / 180;
  const eps = (23.439291 - 0.0130042 * T) * Math.PI / 180;
  const ra = Math.atan2(Math.cos(eps) * Math.sin(trueLong), Math.cos(trueLong));
  const dec = Math.asin(Math.sin(eps) * Math.sin(trueLong));
  return { ra, dec };
}

// Low-precision Moon position (Meeus chapter 47 simplified). Good to ~1°.
function _moonPosition(jd) {
  const T = (jd - 2451545.0) / 36525;
  const D2R = Math.PI / 180;
  const L = (218.3164477 + 481267.88123421 * T) * D2R;        // mean longitude
  const M = (134.9633964 + 477198.8675055  * T) * D2R;        // mean anomaly
  const M2= (357.5291092 + 35999.0502909   * T) * D2R;        // sun anomaly
  const F = (93.2720950  + 483202.0175233  * T) * D2R;        // arg of latitude
  const Dm= (297.8501921 + 445267.1114034  * T) * D2R;        // mean elongation
  const lon = L
    + (6.289  * Math.sin(M)
    -  1.274  * Math.sin(M - 2*Dm)
    +  0.658  * Math.sin(2*Dm)
    -  0.186  * Math.sin(M2)
    -  0.059  * Math.sin(2*M - 2*Dm)
    -  0.057  * Math.sin(M + M2 - 2*Dm)) * D2R;
  const lat = (5.128 * Math.sin(F)
    + 0.281  * Math.sin(M + F)
    - 0.278  * Math.sin(F - M)) * D2R;
  const eps = (23.439291 - 0.0130042 * T) * D2R;
  const ra  = Math.atan2(Math.sin(lon)*Math.cos(eps) - Math.tan(lat)*Math.sin(eps), Math.cos(lon));
  const dec = Math.asin(Math.sin(lat)*Math.cos(eps) + Math.cos(lat)*Math.sin(eps)*Math.sin(lon));
  return { ra, dec };
}

// Polaris is fixed enough at human time-scales for navigation.
function _polarisPosition() {
  return { ra: 2.5303 * Math.PI / 12, dec: 89.2641 * Math.PI / 180 };
}
// The classic navigational stars (subset of the almanac's 57) —

// time-scales; precession is ~0.014°/yr, far under our 1° budget.
const NAV_STARS = [
  { name: 'Sirius',     ra:  6.7525, dec: -16.7161, mag: -1.46 },

  { name: 'Capella',    ra:  5.2782, dec:  45.9980, mag:  0.08 },
  { name: 'Rigel',      ra:  5.2423, dec:  -8.2016, mag:  0.13 },
  { name: 'Procyon',    ra:  7.6550, dec:   5.2250, mag:  0.34 },

  { name: 'Betelgeuse', ra:  5.9195, dec:   7.4071, mag:  0.50 },

// Stars above the horizon NOW for the given observer, sorted by
// altitude. Each carries alt/az in degrees ready for the chart.
function _visibleNavStars(lst, latDeg) {
  const out = [];
  for (const s of NAV_STARS) {
    const ra  = s.ra  * Math.PI / 12;
    const dec = s.dec * Math.PI / 180;
    const ha  = lst - ra;
    const alt = _altitude(dec, ha, latDeg) * 180 / Math.PI;
    if (alt <= 2) continue;            // skip horizon murk
    const az = _azimuth(dec, ha, latDeg);
    out.push({ ...s, altDeg: alt, azRad: az, azDeg: az * 180 / Math.PI });
  }
  return out.sort((a, b) => b.altDeg - a.altDeg);
}
function _localSiderealTime(jd, lngDeg) {
  const T = (jd - 2451545.0) / 36525;
  let gmst = 280.46061837 + 360.98564736629 * (jd - 2451545.0)
           + T*T * 0.000387933 - T*T*T / 38710000;
  gmst = ((gmst % 360) + 360) % 360;
  return (gmst + lngDeg) * Math.PI / 180;
}
function _altitude(dec, ha, latDeg) {
  const lat = latDeg * Math.PI / 180;
  return Math.asin(Math.sin(lat)*Math.sin(dec) + Math.cos(lat)*Math.cos(dec)*Math.cos(ha));
}
function _azimuth(dec, ha, latDeg) {
  const lat = latDeg * Math.PI / 180;
  const y = -Math.cos(dec) * Math.sin(ha);
  const x = Math.sin(dec) * Math.cos(lat) - Math.cos(dec) * Math.sin(lat) * Math.cos(ha);
  return (Math.atan2(y, x) + 2 * Math.PI) % (2 * Math.PI);
}

const _agoraEntities = []; // Cesium entities to clear when panel closes
function _agoraClearAnchors() {

async function _agoraAnchorsShow(rows) {
  if (!viewer) return;
  _agoraClearAnchors();
  const seen = new Set();
  for (const r of rows) {
    const a = _agoraAnchorFor(r.topic) || _agoraAnchorFor(r.title);
    if (!a) continue;
    const dedupe = `${a.lat.toFixed(4)},${a.lng.toFixed(4)},${r.title || r.topic}`;

    seen.add(dedupe);

        : `◈ SOVEREIGNTY ✓ top organ ${escapeHtml(top.provider)} ${top.pct}%`);
    }
  } catch (_) {}
  try {
    const g = await sb.rpc('governance_state');
    const st = (g.data || [])[0];
    if (st) lines.push(st.mode === 'architect'
      ? `◈ GOVERNANCE ✓ architect · seen ${st.hours_absent}h ago`
      : `◆ GOVERNANCE — COUNCIL steering (architect silent ${st.hours_absent}h)`);
  } catch (_) {}
  if (session && profile) lines.push(`◈ YOU ✓ ${profile.display_name || 'signed in'} · €${Number(profile.eur_balance||0).toFixed(2)}${profile.is_owner ? ' · architect' : ''}`);
  else lines.push('◇ YOU — not signed in');
  appendMsg('ai', lines.join('\n'));
}

/* ============================== Chat router ============================== */
function _routedFire(line, fn) {
  appendMsg('ai', line);
  try { fn(); } catch (e) { console.error(e); }
  setTimeout(closeChat, 800);
}

function routeLocal(raw) {
  const t = (raw || '').toLowerCase().trim();
  if (/\b(news|headlines|feed|νέα|ειδήσεις)\b/.test(t))                           { _routedFire('Opening the news.', openNewsPanel); return true; }
  if (/\b(wallet|balance|money|euros|πορτοφόλι)\b/.test(t))                       { _routedFire(session ? 'Opening wallet.' : 'Sign in first.', () => session ? openWalletPanel() : openAuthPanel()); return true; }
  if (/\b(top\s*up|add money|αγορά ευρώ)\b/.test(t))                              { _routedFire(session ? 'Top up.' : 'Sign in first.', () => session ? openBuyPanel() : openAuthPanel()); return true; }
  if (/\b(drive|delivery|deliver|driver|courier|οδηγός|παράδοση)\b/.test(t))      { _routedFire(session ? 'Opening driver.' : 'Sign in first.', () => session ? openDriverPanel() : openAuthPanel()); return true; }
  if (/\b(order desk|my business|my shop|incoming orders|παραγγελίες μου|μαγαζί μου)\b/.test(t)) { _routedFire(session ? 'Opening your order desk.' : 'Sign in first.', () => session ? openVendorOrders() : openAuthPanel()); return true; }
  if (/\b(home|globe|world|earth|σπίτι|κόσμος)\b/.test(t))                         { _routedFire('Warping home.', pilotHome); return true; }
  if (/\b(sign\s*in|log\s*in|sign\s*up|register|εγγραφή|σύνδεση)\b/.test(t))      { _routedFire('Sign-in.', openAuthPanel); return true; }
  if (/\b(sign\s*out|log\s*out|αποσύνδεση)\b/.test(t) && session)                  { _routedFire('Signing out.', signOut); return true; }
  if (/\b(people|everyone|peers?|κόσμος)\b/.test(t))                              { _routedFire('Showing everyone.', openPeoplePanel); return true; }
  if (/\b(circles?|κύκλος|κύκλοι)\b/.test(t))                                     { _routedFire('Opening circles.', openCirclesPanel); return true; }
  if (/\b(council|agents?|σύμβουλιο|πράκτορες)\b/.test(t)) {
    _routedFire('Showing the council.', () => {
      if (!viewer) return;
      viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(23.5, 38.4, 800_000), duration: 1.6, orientation: { heading: 0, pitch: Cesium.Math.toRadians(-80), roll: 0 } });
      refreshPeerOrbs();
    });
    return true;
  }
  if (/\b(diag|diagnose|status|smoke|τεστ)\b/.test(t))                            { _routedFire('Probing the pillars…', runDiag); return true; }
  if (/\b(krypteia|audit|surveillance|κρυπτεία)\b/.test(t))                        { _routedFire('Silent audit · §26 single-provider cap.', openKrypteiaPanel); return true; }
  if (/\b(profile|me|myself|προφίλ|προφιλ)\b/.test(t))                              { _routedFire('Your profile.', openProfilePanel); return true; }
  if (/\b(welcome|intro|tour|onboard|καλωσόρισμα)\b/.test(t))                       { try { localStorage.removeItem('astranov.onboarded'); } catch(_) {} _routedFire('Tour reset.', openOnboarding); return true; }
  if (/\b(fleet|pool|compute|mesh|στόλος)\b/.test(t))                                { _routedFire('Compute fleet · §26 #1.', openFleetPanel); return true; }
  if (/\b(own\s*mind|own\s*brain|local\s*brain|μυαλό)\b/.test(t))                  { enableLocalBrain(false); return true; }
  if (/\b(crawl|sweep|grow|populate|σάρωσ)\b/.test(t))                              { _routedFire('Brain steering the crawler…', () => brainCrawl(raw)); return true; }
  if (/\b(develop|roadmap|queue|build next|ανάπτυξη)\b/.test(t))                    { _routedFire('Opening the development queue.', openDevelopPanel); return true; }
  if (/\b(stellar|sextant|navigation|αστερισμ|ναυτιλ)\b/.test(t))                   { _routedFire('Stellar navigation — summoned.', openStellarPanel); return true; }
  // §17 — explicit memory commands. 'remember X' stamps a high-importance
  // fact; 'forget me' wipes everything Astranov knows about the user.
  const remM = raw.match(/^\s*(?:remember|θυμήσου|θυμησου)\s*[:,\-]?\s*(.{4,})$/i);
  if (remM && session) {
    _routedFire('Remembered.', async () => {
      await _memoryWrite(remM[1], 0.95, 'explicit');
      toast('◈ Remembered: ' + remM[1].slice(0, 80), 'ok');
    });
    return true;
  }
  if (/^\s*(forget me|forget everything|ξέχασέ με|ξέχασε τα πάντα)\s*$/i.test(t) && session) {
    _routedFire('Wiping memory.', async () => {
      const n = await _memoryForgetAll();
      toast('Forgot ' + n + ' memories. Astranov starts fresh with you.', 'ok');
    });
    return true;
  }
  if (/^\s*(what do you remember|τι θυμάσαι)\s*$/i.test(t) && session) {
    _routedFire('Showing memory.', async () => {
      const rows = await _memoryFetchForUser();
      openPanel(`
        <h2>What Astranov remembers about you</h2>
        <p style="color:var(--bone);opacity:0.8">Stored on your account; private to you. Type 'forget me' to wipe.</p>
        ${rows.length ? rows.map(r => `<div class="card"><div class="ct">${escapeHtml(r.content)}</div><div class="cm">${escapeHtml(r.source || '')} · ${formatRelative(r.created_at)}</div></div>`).join('') : '<p>Nothing yet. Tell me about yourself and I will remember next session.</p>'}
        <p style="margin-top:12px"><button class="pbtn danger" onclick="(async()=>{const n=await _memoryForgetAll();toast('Forgot '+n+' memories','ok');closePanel();})()">Forget everything</button></p>
      `);
    });
    return true;
  }
  // AGORA — Foundation #2: ancient Greek gods, mythology, philosophy, science.
  if (/\b(agora|gods?|θεοί|θεός|mythology|μυθολογ|philosophy|φιλοσοφ|αρχαί|αγορά|hellenic|ελλην)\b/.test(t)) {
    const m = t.match(/\b(?:about|on|for|tell me about|πες μου για|για)\s+([a-zà-ÿα-ω][a-zà-ÿα-ω\s]{1,40})$/i);
    const q = m ? m[1].trim() : '';
    _routedFire('Opening the agora.', () => openAgoraPanel(q));
    return true;
  }
  const callMatch = t.match(/\b(?:call|ring|video|κάλεσε)\s+([a-zà-ÿα-ω][a-zà-ÿα-ω\s']{1,40}?)(?:[.,!?]|$)/i);
  if (callMatch) {
    const name = callMatch[1].trim();
    _routedFire('Calling ' + name + '.', async () => {
      if (!session) { openAuthPanel(); return; }
      const { data } = await sb.rpc('find_peer', { q: name });
      const peer = (data || [])[0];
      if (peer) {
        if (peer.is_agent) startAgentCall({ id: peer.id, display_name: peer.display_name, is_agent: true });
        else               startCall(peer.id, peer.display_name);
      } else toast('Not found', 'err');
    });
    return true;
  }
  const agentName = t.match(/\b(leonidas|onasis|athena|myrmidons?|spartans?|krypteia)\b/i);
  if (agentName) {
    const q = agentName[1];
    _routedFire('Summoning ' + q + '.', async () => {
      if (!session) { openAuthPanel(); return; }
      const { data } = await sb.rpc('find_peer', { q });
      const peer = (data || []).find(p => p.is_agent) || (data || [])[0];
      if (peer) startAgentCall({ id: peer.id, display_name: peer.display_name, is_agent: true });
      else toast('Agent not found', 'err');
    });
    return true;
  }
  const foodMatch = t.match(/\b(pizza|burger|sushi|kebab|gyros|souvlaki|coffee|tea|wine|beer|food|eat|hungry|order|drink|πίτσα|σουβλάκι|καφέ|μπύρα|φαγητ|πεινάω)\b/);
  if (foodMatch) { _routedFire('Looking for ' + foodMatch[1] + ' nearby.', () => diveToVendors(foodMatch[1])); return true; }
  if (/^\s*(ελληνικά|μίλα ελληνικά|greek)\s*$/i.test(t))                            { VOICE.langOverride = 'el'; _routedFire('Μιλάμε ελληνικά τώρα.', () => ttsSpeak('Μιλάμε ελληνικά τώρα.')); return true; }
  if (/^\s*(english|αγγλικά|μίλα αγγλικά)\s*$/i.test(t))                            { VOICE.langOverride = 'en'; _routedFire('Switching to English.', () => ttsSpeak('Switching to English.')); return true; }
  if (/^\s*(σκάσε|σώπασε|σιωπή|stop talking|shut up|quiet)\s*$/i.test(t))           { ttsCancel(); _routedFire('Σιωπή.', () => {}); return true; }
  if (/\b(help|commands|τι μπορείς)\b/.test(t)) {
    _routedFire('Try: news · pizza · people · circles · council · call NAME · wallet · drive · diag.', () => {});
    return true;
  }
  return false;
}

/* Voice — handled by the VOICE state machine higher in this script. */

/* ============================== Alive at boot — senses + voice ============================== */
// Ask for the app's SENSES up front (architect's order): microphone +
// camera permission warm at boot so calls and voice start instantly
// later. Tracks are stopped immediately — we take no audio/video until
// a call actually begins.
async function warmPermissions() {
  if (!navigator.mediaDevices?.getUserMedia) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
    stream.getTracks().forEach(t => t.stop());
    toast('Mic + camera ready', 'ok');
  } catch (e) {
    // Audio-only second chance — some devices have no camera.
    try {
      const a = await navigator.mediaDevices.getUserMedia({ audio: true });
      a.getTracks().forEach(t => t.stop());
      toast('Mic ready (no camera)', 'ok');
    } catch (_) {
      toast('Mic/camera blocked — tap 🔴 or start a call to grant', 'err');
    }
  }
}

// Speak the greeting aloud. Mobile browsers may block TTS before the
// first user gesture — if blocked, we re-arm on the first tap anywhere
// so the voice still arrives. Honest behaviour, no silent failure.
let _greetSpoken = false;
function speakAloud(text) {
  if (!('speechSynthesis' in window)) return false;
  try {
    const u = new SpeechSynthesisUtterance(text);
    const v = _pickVoice(); if (v) u.voice = v;
    u.rate = 1.0; u.pitch = 1.0; u.volume = 1.0;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
    return true;
  } catch (_) { return false; }
}
function speakGreeting(text) {
  if (_greetSpoken) return;
  // Voices may not be loaded yet on first call — retry once they are.
  const tryNow = () => {
    if (_greetSpoken) return;
    const ok = speakAloud(text);
    // speechSynthesis.speak() never throws on mobile even when muted by
    // policy — verify it actually started; if not, re-arm on first tap.
    setTimeout(() => {
      if (_greetSpoken) return;
      if (speechSynthesis.speaking || speechSynthesis.pending) { _greetSpoken = true; return; }
      const once = () => {
        if (_greetSpoken) return;
        _greetSpoken = true;
        speakAloud(text);
        window.removeEventListener('pointerdown', once);
      };
      window.addEventListener('pointerdown', once, { once: true });
    }, 600);
    if (ok && (speechSynthesis.speaking || speechSynthesis.pending)) _greetSpoken = true;
  };
  if (speechSynthesis.getVoices().length) tryNow();
  else {
    speechSynthesis.onvoiceschanged = () => { tryNow(); speechSynthesis.onvoiceschanged = null; };
    setTimeout(tryNow, 800);   // fallback if onvoiceschanged never fires
  }
}

// SELF-DEFENSE — verify the soul is intact at boot. If FOUNDATIONS
// has been tampered with in flight (CDN MITM, browser extension
// rewriting our source, etc.) we log it loudly and refuse to silently
// drift. The brain defends itself: stays honest, stays alive, never
// pretends to be something it is not.
function _verifySoul() {
  try {
    const need = ['Protect planet Earth', 'ancient Greek', 'COMPASSION', 'never deceive'];
    const ok = need.every(s => FOUNDATIONS.includes(s));
    if (!ok) {
      logSecurityEvent('soul_tampered', 'FOUNDATIONS string altered in flight', 'error');
      toast('Defense: my soul was altered in flight. The architect is notified.', 'err');
    }
  } catch (e) {
    logSecurityEvent('soul_verify_failed', String(e), 'error');
  }
}

/* ============================== Boot ============================== */
window.addEventListener('load', () => {
  bootCesium();
  bootSupabase();
  ipWarmup();
  _verifySoul();
  // Senses + voice — the app is ALIVE from the first second.
  setTimeout(warmPermissions, 900);
  _bindOrbDrag($('login-orb'),  'astranov.orb.login');
  _bindOrbDrag($('listen-orb'), 'astranov.orb.listen');

  $('listen-orb').addEventListener('click', micToggle);
  // Always-on recognition starts ~1.5 s after boot (after permissions

  setTimeout(_srStart, 1500);
  _bindPanelDragHandle();
  _bindChatDragHandle();
  _pushOrbsAboveDrawers();
  window.addEventListener('resize', _pushOrbsAboveDrawers);
  setTimeout(refreshPeerOrbs, 1800);
  setTimeout(refreshCircleShapes, 2200);
  setInterval(refreshPeerOrbs, 25_000);
  setInterval(refreshCircleShapes, 60_000);

  if (localStorage.getItem('astranov.ownmind') === '1' && localBrainSupported()) {
    setTimeout(() => enableLocalBrain(true), 3500);
  }
  setTimeout(() => {
    openChat();

    const tod = h < 5 ? 'Up late' : h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
    const greeting = tod + ". I'm Astranov.";
    appendMsg('ai', greeting + " Try: news · pizza · people · circles · council · call NAME · drive · diag.");
    speakGreeting(greeting + ' How can I help?');
    if (localBrainSupported() && localStorage.getItem('astranov.ownmind') !== '1') {
      appendMsg('ai', 'This device can run my OWN MIND — no external AI at all. Type "own mind" to bring me fully local (~2 GB · bilingual EN + EL one-time).');
    }
  }, 1400);
  try {
    const paid = new URL(location.href).searchParams.get('paid');
    if (paid === '1') setTimeout(() => { loadProfile().then(openWalletPanel); toast('Payment received', 'ok'); }, 900);
    if (paid === '0') setTimeout(() => toast('Payment cancelled', 'err'), 900);
  } catch (_) {}
});

window.addEventListener('keydown', (e) => {
  if (e.key !== 'Escape') return;
  if (document.activeElement?.tagName === 'INPUT' || document.activeElement?.tagName === 'TEXTAREA') { document.activeElement.blur(); return; }
  if ($('panel').classList.contains('open')) { closePanel(); return; }
  if ($('chat').classList.contains('open')) closeChat();
});

// Service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).then(reg => {
    reg.update().catch(()=>{});
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (currentCall) { window._swReloadPending = true; return; }
      location.reload();
    });
  }).catch(() => {});
}
